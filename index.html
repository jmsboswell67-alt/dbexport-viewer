  if (state.selectedDevice && state.selectedDevice !== "__diff_all__") {
    const prefix = state.selectedDevice;
    rows = filterDiffByPrefix(diff, prefix);
  } else {
    rows = [
      ...diff.added.map(x => ({ kind: "added", ref: x.ref, obj: x.obj })),
      ...diff.removed.map(x => ({ kind: "removed", ref: x.ref, obj: x.obj })),
      ...diff.changed.map(x => ({ kind: "changed", ref: x.ref, obj: x.b, propChanges: x.propChanges })),
    ];
  }
  rows.sort((x, y) => x.ref.localeCompare(y.ref));

  // Search filter
  if (state.objSearch) {
    const q = state.objSearch.toLowerCase();
    rows = rows.filter(r => r.ref.toLowerCase().includes(q));
  }

  // Summary pills
  const summary = document.createElement("div");
  summary.className = "diff-summary";
  summary.innerHTML = `
    <span class="diff-pill added"><span class="num">${diff.added.length}</span> added</span>
    <span class="diff-pill removed"><span class="num">${diff.removed.length}</span> removed</span>
    <span class="diff-pill changed"><span class="num">${diff.changed.length}</span> changed</span>
    <span class="diff-pill same"><span class="num">${diff.same.length.toLocaleString()}</span> unchanged</span>
  `;
  body.appendChild(summary);

  // Cross-site detection + stats panel. When two archives barely share any
  // refs (i.e. they're snapshots of different sites, not snapshots of the
  // same site at different times), per-object diff is meaningless. We surface
  // a structural side-by-side comparison instead, and warn the user that
  // ref-based diff isn't the right tool for that workload.
  const totalRefs = diff.added.length + diff.removed.length + diff.changed.length + diff.same.length;
  const overlap = totalRefs > 0 ? (diff.changed.length + diff.same.length) / totalRefs : 0;
  const looksLikeDifferentSites = overlap < 0.1 && diff.added.length > 100 && diff.removed.length > 100;

  if (looksLikeDifferentSites && !state.selectedDevice) {
    const banner = document.createElement("div");
    banner.style.background = "var(--info-soft)";
    banner.style.borderLeft = "4px solid var(--accent)";
    banner.style.padding = "10px 16px";
    banner.style.margin = "0 0 16px 0";
    banner.style.borderRadius = "var(--radius)";
    banner.innerHTML = `
      <div style="font-family: var(--sans); font-weight: 600; margin-bottom: 4px;">📊 Cross-site comparison detected</div>
      <div style="font-size: 12px; color: var(--ink-soft);">
        These two archives share less than 10% of their object refs — they look like snapshots of <strong>different sites</strong>, not different versions of the same site.
        Ref-based diff isn't the right tool here. The structural comparison below shows what to look at instead.
      </div>
    `;
    body.appendChild(banner);
  }
  // Always show stats panel — it's useful regardless of whether it's same-site or cross-site
  body.appendChild(renderArchiveComparisonStats(a, b));

  if (!rows.length) {
    body.appendChild(makeEmpty("No differences", state.selectedDevice ? "This device is identical between the two archives." : "Try a different filter."));
    return;
  }

  const tbl = document.createElement("table");
  tbl.className = "objs";
  tbl.innerHTML = `<thead><tr><th>Change</th><th>Reference</th><th>Class</th><th>Properties affected</th></tr></thead>`;
  const tbody = document.createElement("tbody");

  const cappedRows = rows.slice(0, 2000);
  for (const r of cappedRows) {
    const tr = document.createElement("tr");
    tr.className = r.kind;
    const refParts = r.ref.split(/[\.:\/]/);
    const leaf = refParts[refParts.length - 1] || r.ref;
    const path = r.ref.slice(0, r.ref.length - leaf.length);
    tr.innerHTML = `
      <td><span class="diffbadge ${r.kind}">${r.kind}</span></td>
      <td class="ref"><span class="path">${escapeHtml(path)}</span><span class="leaf">${escapeHtml(leaf)}</span></td>
      <td class="cid"><span class="name">${escapeHtml(classLabel(r.obj.classid))}</span></td>
      <td class="cid">${r.propChanges ? r.propChanges.length + " changed" : "—"}</td>
    `;
    tr.addEventListener("click", () => {
      state.selectedObject = r.ref;
      renderDetail();
    });
    tbody.appendChild(tr);
  }
  tbl.appendChild(tbody);

  if (rows.length > cappedRows.length) {
    const note = document.createElement("div");
    note.style.padding = "8px 16px";
    note.style.fontSize = "12px";
    note.style.color = "var(--ink-dim)";
    note.style.background = "var(--bg-alt)";
    note.textContent = `Showing first ${cappedRows.length} of ${rows.length} changes.`;
    body.appendChild(note);
  }
  body.appendChild(tbl);
}

function filterDiffByPrefix(diff, prefix) {
  // prefix is a device ref like "DACC-ADX-02:DACC-NAE35-BCC"
  const test = (ref) => ref.startsWith(prefix) || ref.startsWith(prefix.replace(":", "/"));
  return [
    ...diff.added.filter(x => test(x.ref)).map(x => ({ kind: "added", ref: x.ref, obj: x.obj })),
    ...diff.removed.filter(x => test(x.ref)).map(x => ({ kind: "removed", ref: x.ref, obj: x.obj })),
    ...diff.changed.filter(x => test(x.ref)).map(x => ({ kind: "changed", ref: x.ref, obj: x.b, propChanges: x.propChanges })),
  ];
}

function renderDiffObjectDetail(body, crumb, diff) {
  const ref = state.selectedObject;
  const added = diff.added.find(x => x.ref === ref);
  const removed = diff.removed.find(x => x.ref === ref);
  const changed = diff.changed.find(x => x.ref === ref);
  const a = state.archives[0], b = state.archives[1];

  crumb.innerHTML = `<a href="#" id="backLink" style="color: var(--accent); text-decoration: none; margin-right: 8px;">← back</a><strong>${escapeHtml(a.name)}</strong> → <strong>${escapeHtml(b.name)}</strong> / ${escapeHtml(ref.split(/[\.:\/]/).pop())}`;
  setTimeout(() => {
    document.getElementById("backLink")?.addEventListener("click", (e) => {
      e.preventDefault();
      state.selectedObject = null;
      renderDetail();
    });
  }, 0);

  const wrap = document.createElement("div");
  wrap.className = "obj-detail";

  let badge = "", obj;
  if (added) { badge = `<span class="diffbadge added">added</span>`; obj = added.obj; }
  else if (removed) { badge = `<span class="diffbadge removed">removed</span>`; obj = removed.obj; }
  else if (changed) { badge = `<span class="diffbadge changed">changed</span>`; obj = changed.b; }
  else { obj = null; }

  if (!obj) {
    wrap.innerHTML = `<div class="empty"><div class="small">No diff for this object.</div></div>`;
    body.appendChild(wrap);
    return;
  }

  wrap.innerHTML = `
    <h2>${badge} ${escapeHtml(ref)}</h2>
    <div class="meta">
      <span>Class: <strong>${escapeHtml(classLabel(obj.classid))}</strong></span>
      ${obj.objectid ? `<span>Object ID: <strong>${obj.objectid}</strong></span>` : ""}
    </div>
    <div class="props" id="propList"></div>
  `;
  body.appendChild(wrap);

  const list = wrap.querySelector("#propList");

  if (changed) {
    // Show only changed properties with old/new
    for (const c of changed.propChanges) {
      const div = document.createElement("div");
      div.className = "prop diff-changed";
      div.innerHTML = `
        <div class="pname">${escapeHtml(propLabel(c.pid))}<span class="pid">id ${c.pid}</span></div>
        <div>
          <div class="pval old">${escapeHtml(decodeValue(c.old)) || "(empty)"}</div>
          <div class="pval new">${escapeHtml(decodeValue(c.new)) || "(empty)"}</div>
        </div>
      `;
      list.appendChild(div);
    }
    // Plus the unchanged ones, collapsed
    const unchanged = Object.keys(changed.b.properties).filter(p => !changed.propChanges.find(c => c.pid === p));
    if (unchanged.length) {
      const note = document.createElement("div");
      note.className = "prop";
      note.style.color = "var(--ink-dim)";
      note.innerHTML = `<div class="pname">${unchanged.length} unchanged properties</div><div class="pval" style="color: var(--ink-dim)">${unchanged.map(p => `id ${p}`).join(", ")}</div>`;
      list.appendChild(note);
    }
  } else {
    // added or removed — show all props
    const propIds = Object.keys(obj.properties).map(Number).sort((a, b) => a - b);
    for (const pid of propIds) {
      const div = document.createElement("div");
      div.className = "prop";
      const val = decodeValue(obj.properties[String(pid)]);
      div.innerHTML = `
        <div class="pname">${escapeHtml(propLabel(String(pid)))}<span class="pid">id ${pid}</span></div>
        <div class="pval">${escapeHtml(val) || "<span style='color:var(--ink-dim)'>(empty)</span>"}</div>
      `;
      list.appendChild(div);
    }
  }
}

// ============ Export ============
function collectObjectsUnder(node, into) {
  if (node.obj) into.push(node.obj);
  for (const [_, child] of node.children) collectObjectsUnder(child, into);
}

function objectsFromScope(arc) {
  // Returns array of objects in the current scope:
  // - if a node is selected, all objects under that node
  // - else all objects in the archive
  if (state.selectedNode) {
    const node = findNodeByKey(arc, state.selectedNode);
    if (node) {
      const list = [];
      collectObjectsUnder(node, list);
      return { list, scopeLabel: state.selectedNode.replace(/#/g, "/") };
    }
  }
  const list = [];
  for (const dev of arc.devices) for (const o of dev.objects) list.push(o);
  return { list, scopeLabel: "all" };
}

function csvEscape(v) {
  if (v == null) return "";
  const s = String(v);
  if (/[",\n\r]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
  return s;
}

function buildCsv(rows, columns) {
  const header = columns.map(c => csvEscape(c.header)).join(",");
  const body = rows.map(r => columns.map(c => csvEscape(c.get(r))).join(",")).join("\n");
  return header + "\n" + body + "\n";
}

function decodedProps(obj, ids) {
  const out = {};
  for (const id of ids) out[id] = decodeValue(obj.properties[String(id)] || "");
  return out;
}

function parseRefForCsv(ref) {
  const p = parseRef(ref);
  // Identify field bus, equipment, point name from segments
  let bus = "", equipment = "", name = "";
  if (p.segments.length === 1) {
    name = p.segments[0];
  } else if (p.segments.length >= 2) {
    bus = p.segments[0];
    equipment = p.segments.length >= 3 ? p.segments.slice(1, -1).join(".") : "";
    name = p.segments[p.segments.length - 1];
  }
  return { engine: p.engine, bus, equipment, name };
}

function isPointClass(cid) {
  const c = parseInt(cid, 10);
  if (c >= 0 && c <= 25) return true;
  if (c >= 500 && c <= 606) return true;
  if (c >= 147 && c <= 152) return true;
  return false;
}

function exportPoints(arc) {

  const rows = list.filter(o => isPointClass(o.classid));
  const cols = [
    { header: "ref",          get: o => o.ref },

    { header: "name",         get: o => parseRefForCsv(o.ref).name },
    { header: "classid",      get: o => o.classid },
    { header: "class",        get: o => classLabel(o.classid) },
    { header: "object_id",    get: o => o.objectid || "" },

// ============ Vendor-neutral point list ============
// A clean point-list CSV that any other BMS (Niagara, Desigo, EBI, etc.)
// can ingest. Only the columns operators actually need: ref, friendly name,
// description, type, units, default value, alarm config. No JCI-specific
// property IDs.
function exportVendorNeutralPointList(arc) {
  // Point classes per JCI dictionary: BACnet std AI/AO/AV/BI/BO/BV/MI/MV
  // plus JCI native FEC point types (500-606, 599-606 specifically)
  const POINT_CLASSES = new Set([
    "0","1","2","3","4","5",                      // BACnet std AI/AO/AV/BI/BO/BV
    "13","19",                                     // MI/MV
    "165","174","175","176",                       // JCI Analog/Binary/Multistate Value
    "500","501","502","503","504","505",           // BACnet point variants
    "513","514","515",                             // BACnet MI/MO/Notification
    "599","600","601","602","603","604","605","606", // FEC point types
    "628",                                          // Net Sensor AI (tcollins2)
    "670","671","672","673","674",                  // Remote I/O: RIO DEV, RAI, RAO, RBI, RBO (tcollins2)
  ]);
  const rows = [];
  for (const dev of arc.devices) {
    for (const obj of dev.objects) {
      if (!POINT_CLASSES.has(obj.classid)) continue;
      const desc = extractPropString(obj, "28");
      const name = extractPropString(obj, "2390");
      const units = extractPropEnum(obj, "117");
      const defaultVal = decodePropValue(obj, "104");      // Relinquish Default
      const minVal = decodePropValue(obj, "136");
      const maxVal = decodePropValue(obj, "135");
      const eventEnable = decodePropValue(obj, "35");
      const refParts = parseRef(obj.ref);
      rows.push({
        adx: refParts.adx,
        engine: refParts.engine,
        path: refParts.path,
        full_ref: obj.ref,
        name,
        description: desc,
        point_type: pointTypeLabel(obj.classid),
        bacnet_object_type: obj.bacnetclassid || "",
        object_id: obj.objectid || "",
        units,
        default_value: defaultVal,
        min_value: minVal,
        max_value: maxVal,
        alarms_enabled: eventEnable,
      });
    }
  }
  const header = ["ADX","Engine","Path","Full Reference","Name","Description","Point Type","BACnet Object Type","Object ID","Units","Default Value","Min","Max","Alarms Enabled"];
  const lines = [
    `# Vendor-neutral point list from ${arc.name} — generated ${new Date().toISOString()}`,
    `# ${rows.length} points across ${arc.devices.length} controllers`,
    `# Columns: ${header.join(", ")}`,
    csvRow(header),
    ...rows.map(r => csvRow([r.adx, r.engine, r.path, r.full_ref, r.name, r.description, r.point_type, r.bacnet_object_type, r.object_id, r.units, r.default_value, r.min_value, r.max_value, r.alarms_enabled])),
  ];
  downloadBlob(`point_list_vendor_neutral_${cleanFilename(arc.name)}.csv`, "text/csv;charset=utf-8", lines.join("\n") + "\n");
}

function extractPropString(obj, pid) {
  const raw = obj.properties?.[pid];
  if (!raw) return "";
  const m = raw.match(/<string>([^<]*)<\/string>/);
  return m ? m[1] : "";
}

function extractPropEnum(obj, pid) {
  const raw = obj.properties?.[pid];
  if (!raw) return "";
  const m = raw.match(/<enum[^>]*set="(\d+)"[^>]*>(\d+)<\/enum>/);
  return m ? `enum[${m[1]}]=${m[2]}` : "";
}

function decodePropValue(obj, pid) {
  const raw = obj.properties?.[pid];
  if (!raw) return "";
  return decodeValue(raw);
}

function pointTypeLabel(classid) {
  const label = CLASS_NAMES[classid] || `Class ${classid}`;
  // Strip "JCI" prefix and "Object" suffix for cleaner vendor-neutral output
  return label.replace(/^JCI\s+/, "").replace(/\s+Object$/, "");
}

// ============ As-Built Documentation generator ============
// Opens a new browser tab with a long, print-formatted HTML document covering
// the archive's site topology, device inventory, point lists, schedules, and
// alarm configurations. User hits Ctrl+P to save as PDF — typical output is a
// 30-100 page PDF that replaces the commissioning consultant's deliverable.
function openAsBuiltDoc(arc) {
  const html = buildAsBuiltHTML(arc);
  // Open in a new tab. Some browsers block this if the click handler chain
  // is too deep; fall back to a blob URL if it is.
  let win = window.open("", "_blank");
  if (!win) {
    // Popup blocked — fall back to opening via blob URL
    const blob = new Blob([html], { type: "text/html" });
    const url = URL.createObjectURL(blob);
    win = window.open(url, "_blank");
    if (!win) {
      alert("Popup blocked. Please allow popups for this site, or use a blob URL fallback (coming soon).");
      return;
    }
  } else {
    win.document.open();
    win.document.write(html);
    win.document.close();
  }
}

function buildAsBuiltHTML(arc) {
  const date = new Date().toLocaleDateString(undefined, { year: "numeric", month: "long", day: "numeric" });
  const totalObjects = arc.devices.reduce((s, d) => s + d.objects.length, 0);
  const totalPoints = arc.devices.reduce((s, d) =>
    s + d.objects.filter(o => /^(0|1|2|3|4|5|13|19|165|17[4-6]|50[0-5]|51[3-5]|5(9[9])|60[0-6]|628|67[0-4])$/.test(o.classid)).length, 0);
  const totalSchedules = arc.devices.reduce((s, d) =>
    s + d.objects.filter(o => o.classid === "17" || o.classid === "263").length, 0);
  const totalAlarms = arc.devices.reduce((s, d) =>
    s + d.objects.filter(o => /Alarm|alarm/.test(classLabel(o.classid))).length, 0);
  const totalGraphics = arc.devices.reduce((s, d) =>
    s + d.objects.filter(o => o.classid === "344" || o.classid === "357").length, 0);

  // Get audit findings if already computed
  const audit = arc._auditAnalysis;

  // CSS for print + screen
  const css = `
    @page { size: letter; margin: 0.6in 0.75in; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: #1a1a1a; line-height: 1.5; max-width: 7.5in; margin: 0 auto; padding: 0.5in; font-size: 11pt; }
    h1 { font-size: 24pt; margin: 0 0 0.2in 0; color: #1a1a1a; }
    h2 { font-size: 16pt; margin: 0.4in 0 0.15in 0; padding-bottom: 6px; border-bottom: 2px solid #c87f0a; page-break-after: avoid; }
    h3 { font-size: 13pt; margin: 0.2in 0 0.1in 0; color: #c87f0a; page-break-after: avoid; }
    h4 { font-size: 11pt; margin: 0.12in 0 0.08in 0; color: #444; page-break-after: avoid; }
    table { width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 9.5pt; }
    th { background: #f5e6d0; text-align: left; padding: 4px 6px; border-bottom: 1px solid #c87f0a; font-weight: 600; }
    td { padding: 3px 6px; border-bottom: 1px solid #ddd; vertical-align: top; }
    tr:nth-child(even) td { background: #fafafa; }
    .cover { text-align: center; padding: 1in 0; page-break-after: always; }
    .cover h1 { font-size: 32pt; margin-bottom: 12px; }
    .cover .subtitle { font-size: 14pt; color: #666; margin-bottom: 0.4in; }
    .cover .stats { display: inline-block; margin-top: 0.5in; text-align: left; padding: 20px 40px; background: #f5e6d0; border: 1px solid #c87f0a; border-radius: 8px; }
    .cover .stats div { margin: 6px 0; font-size: 11pt; }
    .cover .stats strong { color: #c87f0a; }
    .toc { page-break-after: always; }
    .toc ul { list-style: none; padding: 0; }
    .toc li { padding: 4px 0; }
    .toc a { color: #1a1a1a; text-decoration: none; }
    .section { page-break-before: always; }
    .section:first-of-type { page-break-before: avoid; }
    .meta-line { color: #666; font-size: 9pt; }
    .ref { font-family: "Consolas", "Monaco", monospace; font-size: 9pt; word-break: break-all; }
    .small { font-size: 9pt; color: #666; }
    .pill { display: inline-block; padding: 1px 7px; border-radius: 10px; background: #f5e6d0; color: #c87f0a; font-size: 9pt; margin-right: 4px; }
    .warn { color: #b85c00; }
    .bad { color: #b00020; }
    .print-controls { background: #1a1a1a; color: #fff; padding: 10px 20px; position: sticky; top: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center; }
    .print-controls button { background: #c87f0a; color: #fff; border: none; padding: 8px 16px; font-size: 13pt; border-radius: 4px; cursor: pointer; font-weight: 600; }
    .print-controls button:hover { background: #a36608; }
    @media print { .print-controls { display: none !important; } }
  `;

  // Build each section
  const sectionToC = buildToC();
  const sectionTopology = buildTopologySection(arc);
  const sectionDevices = buildDeviceInventorySection(arc);
  const sectionPoints = buildPointListSection(arc);
  const sectionSchedules = buildScheduleSection(arc);
  const sectionAlarms = buildAlarmSection(arc);
  const sectionAudit = buildAuditSection(arc);

  return `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>As-Built — ${escapeHtml(arc.name)}</title>
  <style>${css}</style>
</head>
<body>
  <div class="print-controls">
    <div>As-Built — <strong>${escapeHtml(arc.name)}</strong></div>
    <button onclick="window.print()">🖨 Print / Save as PDF</button>
  </div>

  <div class="cover">
    <h1>${escapeHtml(arc.name.replace(/\.dbexport$/i, ""))}</h1>
    <div class="subtitle">Building Automation System — As-Built Documentation</div>
    <div class="stats">
      <div><strong>${arc.devices.length}</strong> controllers</div>
      <div><strong>${totalObjects.toLocaleString()}</strong> total objects</div>
      <div><strong>${totalPoints.toLocaleString()}</strong> data points (AI/AO/AV/BI/BO/BV/MI/MV/FEC)</div>
      <div><strong>${totalSchedules.toLocaleString()}</strong> schedules</div>
      <div><strong>${totalAlarms.toLocaleString()}</strong> alarm definitions</div>
      <div><strong>${totalGraphics.toLocaleString()}</strong> graphics</div>
      <div style="margin-top: 10px; font-size: 9pt; color: #666;">
        Generated ${escapeHtml(date)} · Source: <code>${escapeHtml(arc.name)}</code>
      </div>
    </div>
    <div style="margin-top: 0.5in; font-size: 9pt; color: #999;">
      Generated locally by Metasys Archive Viewer — no data was uploaded.
    </div>
  </div>

  ${sectionToC}
  ${sectionTopology}
  ${sectionDevices}
  ${sectionPoints}
  ${sectionSchedules}
  ${sectionAlarms}
  ${sectionAudit}
</body>
</html>`;
}

function buildToC() {
  return `<div class="toc section">
    <h2>Contents</h2>
    <ul>
      <li><strong>§1</strong> Site Topology</li>
      <li><strong>§2</strong> Device Inventory</li>
      <li><strong>§3</strong> Point List</li>
      <li><strong>§4</strong> Schedules</li>
      <li><strong>§5</strong> Alarm Definitions</li>
      <li><strong>§6</strong> Audit Findings</li>
    </ul>
  </div>`;
}

function buildTopologySection(arc) {
  const rows = arc.devices.map(dev => {
    const root = dev.objects.find(o => !o.ref.includes("/")) || dev.objects[0];
    const folder = dev.folder || "";
    const refParts = root ? parseRef(root.ref) : { adx: "", engine: folder };
    const model = root ? extractPropString(root, "70") : "";
    const desc = root ? extractPropString(root, "28") : "";
    const ip = root ? extractPropString(root, "44") : "";
    return { adx: refParts.adx, engine: refParts.engine, model, desc, ip, objectCount: dev.objects.length };
  });
  const adxes = [...new Set(rows.map(r => r.adx))].filter(Boolean);

  let html = `<div class="section"><h2>§1 Site Topology</h2>`;
  html += `<p class="meta-line">ADX server${adxes.length === 1 ? "" : "s"}: ${adxes.map(a => `<span class="pill">${escapeHtml(a)}</span>`).join(" ")}</p>`;
  html += `<table><thead><tr><th>ADX</th><th>Engine</th><th>Model</th><th>Description</th><th>IP</th><th style="text-align:right;">Objects</th></tr></thead><tbody>`;
  for (const r of rows) {
    html += `<tr><td class="ref">${escapeHtml(r.adx)}</td><td class="ref">${escapeHtml(r.engine)}</td><td>${escapeHtml(r.model)}</td><td>${escapeHtml(r.desc)}</td><td class="ref">${escapeHtml(r.ip)}</td><td style="text-align:right;">${r.objectCount.toLocaleString()}</td></tr>`;
  }
  html += `</tbody></table></div>`;
  return html;
}

function buildDeviceInventorySection(arc) {
  let html = `<div class="section"><h2>§2 Device Inventory</h2>`;
  html += `<p class="small">Detailed view of every controller in the archive, with model, firmware, and key configuration properties.</p>`;
  for (const dev of arc.devices) {
    const root = dev.objects.find(o => !o.ref.includes("/")) || dev.objects[0];
    if (!root) continue;
    const refParts = parseRef(root.ref);
    const model = extractPropString(root, "70");
    const firmware = extractPropString(root, "12");
    const desc = extractPropString(root, "28");
    const ip = extractPropString(root, "44");
    html += `<h3>${escapeHtml(refParts.engine)} <span class="small" style="font-weight: normal;">(${dev.objects.length.toLocaleString()} objects)</span></h3>`;
    html += `<table><tbody>`;
    html += `<tr><th style="width: 30%;">ADX</th><td class="ref">${escapeHtml(refParts.adx)}</td></tr>`;
    html += `<tr><th>Engine</th><td class="ref">${escapeHtml(refParts.engine)}</td></tr>`;
    if (model) html += `<tr><th>Model</th><td>${escapeHtml(model)}</td></tr>`;
    if (firmware) html += `<tr><th>Firmware / Comment</th><td>${escapeHtml(firmware)}</td></tr>`;
    if (desc) html += `<tr><th>Description</th><td>${escapeHtml(desc)}</td></tr>`;
    if (ip) html += `<tr><th>IP Address</th><td class="ref">${escapeHtml(ip)}</td></tr>`;
    html += `<tr><th>Class</th><td>${escapeHtml(classLabel(root.classid))} (cid ${root.classid})</td></tr>`;
    html += `</tbody></table>`;
  }
  html += `</div>`;
  return html;
}

function buildPointListSection(arc) {
  // Includes 628 (Net Sensor AI) and 670-674 (RIO DEV, RAI, RAO, RBI, RBO)
  // from the tcollins2 dictionary harvest — remote I/O is real points and
  // should appear in the as-built point list.
  const POINT_CLASSES = new Set(["0","1","2","3","4","5","13","19","165","174","175","176","500","501","502","503","504","505","513","514","515","599","600","601","602","603","604","605","606","628","670","671","672","673","674"]);
  let html = `<div class="section"><h2>§3 Point List</h2>`;
  html += `<p class="small">Every input, output, value, and multistate point in the archive, organized by controller.</p>`;
  for (const dev of arc.devices) {
    const root = dev.objects.find(o => !o.ref.includes("/")) || dev.objects[0];
    const refParts = root ? parseRef(root.ref) : { engine: "Unknown" };
    const points = dev.objects.filter(o => POINT_CLASSES.has(o.classid));
    if (points.length === 0) continue;
    html += `<h3>${escapeHtml(refParts.engine)} <span class="small" style="font-weight: normal;">(${points.length.toLocaleString()} points)</span></h3>`;
    html += `<table><thead><tr><th>Reference Path</th><th>Description</th><th>Type</th><th>Units</th><th>Default</th></tr></thead><tbody>`;
    // Sort by ref for predictable order
    points.sort((a, b) => a.ref.localeCompare(b.ref, undefined, { numeric: true }));
    for (const p of points) {
      const desc = extractPropString(p, "28");
      const units = extractPropEnum(p, "117");
      const defaultVal = decodePropValue(p, "104");
      const path = parseRef(p.ref).path || "(engine root)";
      html += `<tr><td class="ref">${escapeHtml(path)}</td><td>${escapeHtml(desc)}</td><td>${escapeHtml(pointTypeLabel(p.classid))}</td><td>${escapeHtml(units)}</td><td>${escapeHtml(defaultVal)}</td></tr>`;
    }
    html += `</tbody></table>`;
  }
  html += `</div>`;
  return html;
}

function buildScheduleSection(arc) {
  const schedules = arc.devices.flatMap(dev => dev.objects.filter(o => o.classid === "17" || o.classid === "263"));
  let html = `<div class="section"><h2>§4 Schedules</h2>`;
  if (schedules.length === 0) {
    html += `<p class="small">No schedule objects found in this archive.</p></div>`;
    return html;
  }
  html += `<p class="small">${schedules.length.toLocaleString()} schedule${schedules.length === 1 ? "" : "s"} defined across the site.</p>`;
  html += `<table><thead><tr><th>Reference</th><th>Description</th><th>Default</th></tr></thead><tbody>`;
  schedules.sort((a, b) => a.ref.localeCompare(b.ref, undefined, { numeric: true }));
  for (const s of schedules) {
    const desc = extractPropString(s, "28");
    const defaultVal = decodePropValue(s, "104");
    html += `<tr><td class="ref">${escapeHtml(s.ref)}</td><td>${escapeHtml(desc)}</td><td>${escapeHtml(defaultVal)}</td></tr>`;
  }
  html += `</tbody></table></div>`;
  return html;
}

function buildAlarmSection(arc) {
  // Alarm extensions and notification class objects
  const alarms = arc.devices.flatMap(dev => dev.objects.filter(o => /Alarm|alarm/.test(classLabel(o.classid))));
  let html = `<div class="section"><h2>§5 Alarm Definitions</h2>`;
  if (alarms.length === 0) {
    html += `<p class="small">No alarm objects detected.</p></div>`;
    return html;
  }
  html += `<p class="small">${alarms.length.toLocaleString()} alarm-related object${alarms.length === 1 ? "" : "s"}, grouped by class.</p>`;
  // Group by class
  const byClass = new Map();
  for (const a of alarms) {
    if (!byClass.has(a.classid)) byClass.set(a.classid, []);
    byClass.get(a.classid).push(a);
  }
  for (const [cid, list] of [...byClass.entries()].sort((a, b) => b[1].length - a[1].length)) {
    html += `<h3>${escapeHtml(classLabel(cid))} <span class="small" style="font-weight: normal;">(${list.length.toLocaleString()})</span></h3>`;
    html += `<table><thead><tr><th>Reference</th><th>Description</th><th>Event Enable</th></tr></thead><tbody>`;
    list.sort((a, b) => a.ref.localeCompare(b.ref, undefined, { numeric: true }));
    for (const a of list.slice(0, 200)) {
      const desc = extractPropString(a, "28");
      const eeRaw = a.properties?.["35"] || "";
      const eeMatch = eeRaw.match(/<bits[^>]*>(\d+)<\/bits>/);
      const eeBits = eeMatch ? eeMatch[1] : "—";
      const eeFlag = (eeMatch && eeMatch[1] !== "111") ? `<span class="warn">suppressed</span>` : "fully enabled";
      html += `<tr><td class="ref">${escapeHtml(a.ref)}</td><td>${escapeHtml(desc)}</td><td>${escapeHtml(eeBits)} — ${eeFlag}</td></tr>`;
    }
    html += `</tbody></table>`;
    if (list.length > 200) html += `<p class="small">…and ${(list.length - 200).toLocaleString()} more (truncated for printability)</p>`;
  }
  html += `</div>`;
  return html;
}

function buildAuditSection(arc) {
  let html = `<div class="section"><h2>§6 Audit Findings</h2>`;
  const audit = arc._auditAnalysis;
  if (!audit) {
    html += `<p class="small">Audit not run on this archive. Open the Audit tab in the viewer and the findings will be included in the next export.</p></div>`;
    return html;
  }
  html += `<p class="small">Snapshot of findings from the archive's audit pass at generation time.</p>`;
  html += `<h3>Suppressed alarms <span class="small" style="font-weight: normal;">(${audit.suppressedAlarms.length.toLocaleString()})</span></h3>`;
  if (audit.suppressedAlarms.length === 0) {
    html += `<p class="small">None — Event Enable is fully on for every object.</p>`;
  } else {
    const byClass = new Map();
    for (const r of audit.suppressedAlarms) {
      if (!byClass.has(r.classid)) byClass.set(r.classid, 0);
      byClass.set(r.classid, byClass.get(r.classid) + 1);
    }
    html += `<table><thead><tr><th>Object class</th><th style="text-align:right;">Suppressed count</th></tr></thead><tbody>`;
    for (const [cid, cnt] of [...byClass.entries()].sort((a, b) => b[1] - a[1])) {
      html += `<tr><td>${escapeHtml(classLabel(cid))}</td><td style="text-align:right;">${cnt.toLocaleString()}</td></tr>`;
    }
    html += `</tbody></table>`;
  }
  html += `<h3>Duplicate descriptions <span class="small" style="font-weight: normal;">(${audit.duplicateDescriptions.length.toLocaleString()} groups)</span></h3>`;
  if (audit.duplicateDescriptions.length === 0) {
    html += `<p class="small">No duplicates found.</p>`;
  } else {
    const crossEngine = audit.duplicateDescriptions.filter(g => g.engineCount > 1).length;
    html += `<p class="small">${crossEngine.toLocaleString()} groups span multiple engines (likely copy-paste artifacts); ${(audit.duplicateDescriptions.length - crossEngine).toLocaleString()} are within-engine duplicates (usually intentional).</p>`;
    html += `<table><thead><tr><th>Description</th><th style="text-align:right;">Copies</th><th style="text-align:right;">Engines</th></tr></thead><tbody>`;
    for (const g of audit.duplicateDescriptions.slice(0, 50)) {
      const flag = g.engineCount > 1 ? `<span class="warn">cross-engine</span> ` : "";
      html += `<tr><td>${flag}${escapeHtml(g.description)}</td><td style="text-align:right;">${g.count.toLocaleString()}</td><td style="text-align:right;">${g.engineCount}</td></tr>`;
    }
    html += `</tbody></table>`;
    if (audit.duplicateDescriptions.length > 50) html += `<p class="small">…top 50 of ${audit.duplicateDescriptions.length.toLocaleString()} shown.</p>`;
  }
  html += `</div>`;
  return html;
}

function cleanFilename(s) {
  return String(s).replace(/[^a-zA-Z0-9._-]+/g, "_").slice(0, 80);
}

function downloadCsv(name, csv) {
  downloadBlob(name, "text/csv;charset=utf-8", csv);
}

function downloadBlob(name, type, content) {
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = name;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// ============ Helpers ============
function escapeHtml(s) {
  return String(s ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
}
function makeEmpty(big, small) {
  const div = document.createElement("div");
  div.className = "empty";
  div.innerHTML = `<div class="big">${escapeHtml(big)}</div><div class="small">${escapeHtml(small)}</div>`;
  return div;
}
function updateFooter() {
  const stats = document.getElementById("footerStats");
  const arcs = state.archives.filter(Boolean);
  if (!arcs.length) { stats.textContent = ""; return; }
  stats.textContent = arcs.map((a, i) => `${i === 0 ? "A" : "B"}: ${a.objectCount.toLocaleString()} objs · ${a.devices.length} devices`).join("  ·  ");
}

// ============ Page-level drag & drop ============
const overlay = document.getElementById("dropOverlay");
let dragDepth = 0;
window.addEventListener("dragenter", (e) => {
  e.preventDefault();
  if (e.dataTransfer?.types?.includes("Files")) {
    dragDepth++;
    overlay.classList.add("active");
  }
});
window.addEventListener("dragleave", (e) => {
  e.preventDefault();
  dragDepth--;
  if (dragDepth <= 0) {
    dragDepth = 0;
    overlay.classList.remove("active");
  }
});
window.addEventListener("dragover", (e) => e.preventDefault());
window.addEventListener("drop", (e) => {
  e.preventDefault();
  dragDepth = 0;
  overlay.classList.remove("active");
  if (e.target.closest(".slot")) return; // slot drop already handled
  const f = e.dataTransfer.files[0];
  if (!f) return;
  const targetSlot = state.archives[0] ? 1 : 0;
  loadFile(f, targetSlot);
});

// ============ Wire up ============
setupSlot(0);
setupSlot(1);
document.querySelectorAll(".modes button").forEach(b => {
  b.addEventListener("click", () => { if (!b.disabled) setMode(b.dataset.mode); });
});
document.getElementById("treeSearch").addEventListener("input", (e) => {
  state.treeFilter = e.target.value;
  renderTree();
});
document.getElementById("classFilter").addEventListener("change", (e) => {
  state.classFilter = e.target.value;
  renderDetail();
});
document.getElementById("objSearch").addEventListener("input", (e) => {
  state.objSearch = e.target.value;
  renderDetail();
});

// Export menu
const exportBtn = document.getElementById("exportBtn");
const exportMenu = document.getElementById("exportMenu");
exportBtn.addEventListener("click", (e) => {
  e.stopPropagation();
  // Update scope hint each time the menu opens
  const arc = state.archives[state.selectedSlot] || state.archives[0];
  const scopeEl = document.getElementById("exportScope");
  if (scopeEl && arc) {
    const { list, scopeLabel } = objectsFromScope(arc);
    scopeEl.innerHTML = `<strong>Scope:</strong> ${escapeHtml(scopeLabel)} <span style="color:var(--ink-dim)">(${list.length.toLocaleString()} objects)</span>`;
  }
  exportMenu.style.display = exportMenu.style.display === "block" ? "none" : "block";
});
document.addEventListener("click", () => { exportMenu.style.display = "none"; });
exportMenu.addEventListener("click", (e) => e.stopPropagation());
exportMenu.querySelectorAll("button[data-fmt]").forEach(btn => {
  btn.addEventListener("click", () => {
    const arc = state.archives[state.selectedSlot] || state.archives[0];
    if (!arc) return;
    const fmt = btn.dataset.fmt;
    if (fmt === "csv-points") exportPoints(arc);
    else if (fmt === "csv-all") exportAll(arc);
    else if (fmt === "csv-schedules") exportSchedules(arc);
    else if (fmt === "csv-trends") exportTrends(arc);
    else if (fmt === "csv-vendor-neutral") exportVendorNeutralPointList(arc);
    else if (fmt === "json") exportJson(arc);
    else if (fmt === "as-built") openAsBuiltDoc(arc);
    exportMenu.style.display = "none";
  });
});

// When user adds a second file, invalidate diff cache
const origLoad = loadFile;
