// ============ XML parsing ============
const NS = "http://johnsoncontrols.com/MetasysIII/2002/3/Core";

function parseXML(text) {
  return new DOMParser().parseFromString(text, "application/xml");
}

function localNames(el, name) {
  // Children with given local name, ignoring namespace
  const out = [];
  for (const c of el.children) if (c.localName === name) out.push(c);
  return out;
}

function parseNavtree(xml) {
  // Returns flattened list of nodes: { label, ref, type, classid, depth, parentRef }
  const root = xml.documentElement;
  const out = [];
  function walk(el, depth, parentRef) {
    for (const node of localNames(el, "node")) {
      const entry = {
        label: node.getAttribute("label") || "",
        ref: node.getAttribute("reference") || "",
        type: node.getAttribute("type") || "",
        classid: node.getAttribute("classid") || "",
        depth,
        parentRef,
      };
      out.push(entry);
      walk(node, depth + 1, entry.ref);
    }
  }
  walk(root, 0, null);
  return out;
}

function parseArchive(xml) {
  // Returns list of { ref, classid, bacnetclassid, objectid, properties: { propId: rawXml } }
  const root = xml.documentElement;
  const objects = [];
  for (const obj of localNames(root, "object")) {
    const props = {};
    for (const p of localNames(obj, "property")) {
      const id = p.getAttribute("id");
      const data = localNames(p, "data")[0];
      // Stringify the inner content for diff + display
      props[id] = data ? Array.from(data.childNodes).map(serializeNode).join("") : "";
    }
    objects.push({
      ref: obj.getAttribute("ref") || "",
      classid: obj.getAttribute("classid") || "",
      bacnetclassid: obj.getAttribute("bacnetclassid") || "",
      objectid: obj.getAttribute("objectid") || "",
      properties: props,
    });
  }
  return objects;
}

function serializeNode(node) {
  if (node.nodeType === Node.TEXT_NODE) return node.nodeValue.trim();
  if (node.nodeType !== Node.ELEMENT_NODE) return "";
  const tag = node.localName;
  const attrs = Array.from(node.attributes || []).map(a => ` ${a.name}="${a.value}"`).join("");
  const children = Array.from(node.childNodes).map(serializeNode).join("");
  if (!children) return `<${tag}${attrs}/>`;
  return `<${tag}${attrs}>${children}</${tag}>`;
}

function decodeValue(rawXml) {
  // Render a property's raw XML payload as readable text.
  if (!rawXml) return "";
  // Common scalar tags: string, int, unsignedInt, real, boolean, date, time, enum, BACoid
  const doc = parseXML(`<root>${rawXml}</root>`);
  const root = doc.documentElement;
  function render(el) {
    if (el.nodeType === Node.TEXT_NODE) return el.nodeValue.trim();
    if (el.nodeType !== Node.ELEMENT_NODE) return "";
    const tag = el.localName;
    const text = el.textContent.trim();
    if (["string","int","unsignedInt","unsignedLong","unsignedShort","unsignedByte","real","double","float","boolean","BACoid"].includes(tag)) {
      return text || "(empty)";
    }
    if (tag === "date") {
      // 2025.10.28.2  -> 2025-10-28
      return text.split(".").slice(0,3).join("-");
    }
    if (tag === "time") {
      // 15.49.52.36 -> 15:49:52
      return text.split(".").slice(0,3).join(":");
    }
    if (tag === "enum") {
      const set = el.getAttribute("set") || "?";
      return `enum[${set}]=${text}`;
    }
    if (tag === "listof") {
      if (!el.children.length) return "(empty list)";
      return "[ " + Array.from(el.children).map(render).join(", ") + " ]";
    }
    if (tag === "struct" || tag === "structElement") {
      return "{ " + Array.from(el.children).map(render).join(", ") + " }";
    }
    if (tag === "array") {
      return "[" + Array.from(el.children).map(render).join(",") + "]";
    }
    // Fallback
    return text;
  }
  const parts = Array.from(root.childNodes).map(render).filter(Boolean);
  return parts.join(" ");
}

function classLabel(cid) {
  return CLASS_NAMES[cid] || `Class ${cid}`;
}
function propLabel(pid) {
  return PROP_NAMES[pid] || `Property ${pid}`;
}

// ============ File loading ============
async function loadFile(file, slot) {
  setSlotLoading(slot, file.name);
  try {
    // Detect CSV (Unbound References export) before trying ZIP
    if (/\.csv$/i.test(file.name)) {
      const text = await file.text();
      const rows = parseUnboundCsv(text);
      if (!rows) throw new Error("CSV doesn't match Metasys Unbound References format (need columns: Archive, Reference Type, Referring Item, Referring Attribute, Referenced Item, Referenced Attribute)");
      state.archives[slot] = {
        name: file.name,
        kind: "unbound",
        unbound: rows,
        objectCount: rows.length,
        navtree: [],
        devices: [],
      };
      setSlotLoaded(slot, file.name, rows.length);
      updateModeAvailability();
      if (state.archives[0] && state.archives[0].kind === "unbound") {
        state.selectedSlot = slot;
      }
      // If no archive is loaded, default to unbound mode
      const hasArchive = state.archives.some(a => a && a.kind !== "unbound");
      if (!hasArchive) setMode("unbound");
      updateFooter();
      return;
    }

    const zip = await JSZip.loadAsync(file);

    // Detect format:
    //   .dbexport — has archiveobject.xml + navtree.xml + per-device folders
    //   .caf       — has one *.caf.xml at root (CCT control logic for a single controller)
    const archiveObj = zip.file("archiveobject.xml");
    const navtreeFile = zip.file("navtree.xml");

    let navtree, devices;

    if (archiveObj && navtreeFile) {
      // === .dbexport path ===
      const navtreeXml = parseXML(await navtreeFile.async("string"));
      navtree = parseNavtree(navtreeXml);

      devices = [];
      const deviceFolders = new Set();
      zip.forEach((path, entry) => {
        if (path.endsWith("/archive.xml") || path.endsWith("\\archive.xml")) {
          const folder = path.replace(/[\\\/]archive\.xml$/, "");
          if (folder) deviceFolders.add(folder);
        }
      });
      for (const folder of deviceFolders) {
        const f = zip.file(`${folder}/archive.xml`) || zip.file(`${folder}\\archive.xml`);
        if (!f) continue;
        const xml = parseXML(await f.async("string"));
        devices.push({ folder, objects: parseArchive(xml) });
      }
    } else {
      // === .caf path === single XML containing one controller's logic
      let cafEntry = null;
      zip.forEach((path, entry) => {
        if (!cafEntry && /\.caf\.xml$/i.test(path)) cafEntry = entry;
      });
      if (!cafEntry) {
        throw new Error("Not a Metasys .dbexport or .caf (no archiveobject.xml, navtree.xml, or *.caf.xml found)");
      }
      const xml = parseXML(await cafEntry.async("string"));
      const objects = parseArchive(xml);
      // The first object (or shortest ref) is the controller root
      const root = objects.find(o => !o.ref.includes("/")) || objects[0];
      const rootLabel = root?.ref || file.name.replace(/\.caf$/i, "");

      // Synthesize navtree with a single "device" so the rest of the UI works unchanged
      navtree = [{
        label: rootLabel,
        ref: rootLabel,
        type: "device",
        classid: root?.classid || "",
        depth: 0,
        parentRef: null,
        itemName: cafEntry.name.replace(/\.caf\.xml$/i, ""),
      }];
      devices = [{ folder: rootLabel, objects }];
    }

    const total = devices.reduce((a, d) => a + d.objects.length, 0);

    state.archives[slot] = {
      name: file.name,
      navtree,
      devices,
      objectCount: total,
      _zip: zip,   // preserved so we can write a modified archive back
    };

    setSlotLoaded(slot, file.name, total);
    updateModeAvailability();
    if (slot === 0 || state.selectedSlot === slot) {
      state.selectedSlot = slot;
      renderTree();
      renderDetail();
    }
    updateFooter();
  } catch (e) {
    console.error(e);
    setSlotError(slot, e.message);
  }
}

// ============ Slot UI ============
function setupSlot(slot) {
  const el = document.getElementById(`slot-${slot}`);
  const input = el.querySelector("input[type=file]");
  const clearBtn = el.querySelector(".clear");

  input.addEventListener("change", (e) => {
    const f = e.target.files[0];
    if (f) loadFile(f, slot);
    input.value = "";
  });
  el.addEventListener("dragenter", (e) => { e.preventDefault(); el.classList.add("drag"); });
  el.addEventListener("dragover", (e) => { e.preventDefault(); el.classList.add("drag"); });
  el.addEventListener("dragleave", () => el.classList.remove("drag"));
  el.addEventListener("drop", (e) => {
    e.preventDefault();
    e.stopPropagation();
    el.classList.remove("drag");
    const f = e.dataTransfer.files[0];
    if (f) loadFile(f, slot);
  });
  clearBtn.addEventListener("click", (e) => {
    e.preventDefault();
    e.stopPropagation();
    state.archives[slot] = null;
    setSlotEmpty(slot);
    updateModeAvailability();
    if (state.mode === "diff") setMode("browse");
    renderTree();
    renderDetail();
    updateFooter();
  });
}

function setSlotEmpty(slot) {
  const el = document.getElementById(`slot-${slot}`);
  el.classList.remove("loaded");
  el.querySelector(".name").textContent = slot === 0 ? "drop a .dbexport here" : "(optional, for diff)";
  el.querySelector(".count").textContent = "";
  el.querySelector(".clear").style.display = "none";
}
function setSlotLoading(slot, name) {
  const el = document.getElementById(`slot-${slot}`);
  el.classList.add("loaded");
  el.querySelector(".name").textContent = name;
  el.querySelector(".count").textContent = "loading…";
  el.querySelector(".clear").style.display = "none";
}
function setSlotLoaded(slot, name, count) {
  const el = document.getElementById(`slot-${slot}`);
  el.classList.add("loaded");
  el.querySelector(".name").textContent = name;
  el.querySelector(".count").textContent = `${count.toLocaleString()} objs`;
  el.querySelector(".clear").style.display = "inline-block";
}
function setSlotError(slot, msg) {
  const el = document.getElementById(`slot-${slot}`);
  el.classList.remove("loaded");
  el.querySelector(".name").textContent = `error: ${msg}`;
  el.querySelector(".count").textContent = "";
}

// ============ Mode switching ============
function setMode(mode) {
  state.mode = mode;
  document.querySelectorAll(".modes button").forEach(b => {
    b.classList.toggle("active", b.dataset.mode === mode);
  });
  state.selectedObject = null;
  state.selectedDevice = null;
  renderTree();
  renderDetail();
}

function updateModeAvailability() {
  const a = state.archives[0], b = state.archives[1];
  const bothArchives = a && b && a.kind !== "unbound" && b.kind !== "unbound";
  // Unbound mode is available when: a CSV is loaded, an archive has been
  // scanned already, OR an archive is loaded that we can scan natively.
  const hasUnbound = state.archives.some(x => x && (x.kind === "unbound" || x.unbound || (x._zip && x.kind !== "unbound")));
  const hasGraphics = state.archives.some(x => x && x._zip && x.kind !== "unbound");
  document.querySelector('[data-mode="diff"]').disabled = !bothArchives;
  document.querySelector('[data-mode="unbound"]').disabled = !hasUnbound;
  // Audit mode lights up whenever any scannable archive is loaded — the
  // suppressed-alarm and duplicate-description checks run on parsed objects
  // alone; orphaned-graphics piggybacks on the reverse-lookup index.
  const hasScannableForAudit = state.archives.some(x => x && x.devices && x.kind !== "unbound");
  const auditBtn = document.querySelector('[data-mode="audit"]');
  if (auditBtn) auditBtn.disabled = !hasScannableForAudit;
  document.querySelector('[data-mode="graphics"]').disabled = !hasGraphics;
  // Logic mode needs the zip to look for Programming/System Programs files inside
  document.querySelector('[data-mode="logic"]').disabled = !hasGraphics;
}

// ============ Tree rendering ============
function renderTree() {
  const root = document.getElementById("treeRoot");
  root.innerHTML = "";

  const arc = state.archives[state.selectedSlot] || state.archives[0] || state.archives[1];
  if (!arc) return;

  const q = state.treeFilter ? state.treeFilter.toLowerCase() : "";

  if (state.mode === "unbound") {
    return renderUnboundTree(root);
  }

  if (state.mode === "audit") {
    return renderAuditTree(root);
  }

  if (state.mode === "graphics") {
    return renderGraphicsTree(root);
  }

  if (state.mode === "logic") {
    return renderLogicTree(root);
  }

  if (state.mode === "diff" && state.archives[0] && state.archives[1]) {
    // In diff mode, render union of devices from both archives (flat list — diff is summary-style)
    const devices = new Map();
    for (const slot of [0, 1]) {
      for (const node of state.archives[slot].navtree) {
        if (node.type === "device") devices.set(node.ref, node);
      }
    }
    addSectionTitle(root, "Devices (union)");
    for (const dev of devices.values()) {
      if (q && !(dev.label.toLowerCase().includes(q) || dev.ref.toLowerCase().includes(q))) continue;
      addTreeNode(root, dev.label, () => selectDevice(dev.ref), {
        selected: state.selectedDevice === dev.ref,
        icon: "▣",
      });
    }
    addSectionTitle(root, "Summary");
    addTreeNode(root, "All changes", () => { state.selectedDevice = "__diff_all__"; renderDetail(); }, {
      selected: state.selectedDevice === "__diff_all__",
      icon: "Δ",
    });
    return;
  }

  // Browse mode: hierarchical tree
  const hier = getHierarchy(arc);
  addSectionTitle(root, arc.name);

  const sortedEngines = [...hier.entries()].sort((a, b) => a[0].localeCompare(b[0]));
  for (const [engineName, engineNode] of sortedEngines) {
    if (q && !nodeMatchesFilter(engineNode, q, /*deep*/ false)) continue;
    renderHierarchyNode(engineNode, root, 0);
  }
}

function nodeMatchesFilter(node, q, deep) {
  if (node.label.toLowerCase().includes(q)) return true;
  if (node.key.toLowerCase().includes(q)) return true;
  if (deep) {
    for (const [_, c] of node.children) if (nodeMatchesFilter(c, q, true)) return true;
  }
  return false;
}

function renderHierarchyNode(node, parent, depth) {
  const isExpanded = state.expandedNodes.has(node.key);
  const hasChildren = node.children.size > 0;
  const isSelected = state.selectedNode === node.key;

  const el = document.createElement("div");
  el.className = "tree-node" + (isSelected ? " selected" : "") + (node.kind === "engine" ? " engine" : "");
  if (["fieldbus","n2trunk","programming","sysprograms","schedules","graphics","site","generic","category"].includes(node.kind)) {
    el.classList.add("category");
  }
  el.style.paddingLeft = (8 + depth * 14) + "px";

  const chevron = document.createElement("span");
  chevron.className = "chevron";
  chevron.textContent = hasChildren ? (isExpanded ? "▾" : "▸") : "";
  if (hasChildren) {
    chevron.addEventListener("click", (e) => {
      e.stopPropagation();
      if (isExpanded) state.expandedNodes.delete(node.key);
      else state.expandedNodes.add(node.key);
      renderTree();
    });
  }
  el.appendChild(chevron);

  const icon = document.createElement("span");
  icon.className = "kind-icon";
  icon.textContent = kindIcon(node.kind);
  el.appendChild(icon);

  const name = document.createElement("span");
  name.className = "name";
  name.textContent = node.label;
  el.appendChild(name);

  if (node.totalCount > 0 && (hasChildren || node.totalCount > 1)) {
    const c = document.createElement("span");
    c.className = "count";
    c.textContent = node.totalCount.toLocaleString();
    el.appendChild(c);
  }

  el.addEventListener("click", () => {
    state.selectedNode = node.key;
    state.selectedObject = null;
    if (hasChildren && !isExpanded) state.expandedNodes.add(node.key);
    renderTree();
    renderDetail();
  });
  parent.appendChild(el);

  if (isExpanded && hasChildren) {
    const sorted = [...node.children.values()].sort((a, b) => {
      const oa = KIND_ORDER[a.kind] ?? 99;
      const ob = KIND_ORDER[b.kind] ?? 99;
      if (oa !== ob) return oa - ob;
      return a.label.localeCompare(b.label, undefined, { numeric: true });
    });
    for (const child of sorted) renderHierarchyNode(child, parent, depth + 1);
  }
}

function addSectionTitle(parent, text) {
  const el = document.createElement("div");
  el.className = "tree-section-title";
  el.textContent = text;
  parent.appendChild(el);
}
function addTreeNode(parent, label, onClick, opts = {}) {
  const el = document.createElement("div");
  el.className = "tree-node" + (opts.selected ? " selected" : "") + (opts.indent ? ` indent-${opts.indent}` : "");
  el.innerHTML = `<span class="icon">${opts.icon || ""}</span><span class="name"></span>`;
  el.querySelector(".name").textContent = label;
  el.addEventListener("click", onClick);
  parent.appendChild(el);
  return el;
}
function addTreeNodeWithCount(parent, label, count, onClick, opts = {}) {
  const el = addTreeNode(parent, label, onClick, opts);
  const c = document.createElement("span");
  c.className = "count";
  c.textContent = count.toLocaleString();
  el.appendChild(c);
  return el;
}

// ============ Navigation helpers ============
function findDevice(arc, ref) {
  // The folder names look like "DACC-ADX-02DACC-NAE35-BCC" — the ref is "DACC-ADX-02:DACC-NAE35-BCC"
  // Match by folder containing the same suffix
  const suffix = ref.split(":").join("");
  return arc.devices.find(d => d.folder === suffix || d.folder.endsWith(ref.replace(":", "")) || d.folder === ref);
}

function selectDevice(ref) {
  state.selectedDevice = ref;
  state.selectedObject = null;
  state.classFilter = "";
  state.objSearch = "";
  renderTree();
  renderDetail();
}
function selectByRef(ref) {
  state.selectedDevice = ref;
  state.selectedObject = null;
  renderTree();
  renderDetail();
}

// ============ Detail rendering ============
function renderDetail() {
  const body = document.getElementById("detailBody");
  const crumb = document.getElementById("crumb");
  const classSel = document.getElementById("classFilter");
  const objSearch = document.getElementById("objSearch");
  const exportWrap = document.querySelector(".export-wrap");

  body.innerHTML = "";

  if (state.mode === "diff") {
    if (exportWrap) exportWrap.style.display = "none";
    return renderDiffDetail(body, crumb, classSel, objSearch);
  }

  if (state.mode === "unbound") {
    if (exportWrap) exportWrap.style.display = "none";
    return renderUnboundDetail(body, crumb, classSel, objSearch);
  }

  if (state.mode === "audit") {
    if (exportWrap) exportWrap.style.display = "none";
    return renderAuditDetail(body, crumb, classSel, objSearch);
  }

  if (state.mode === "graphics") {
    if (exportWrap) exportWrap.style.display = "none";
    return renderGraphicsDetail(body, crumb, classSel, objSearch);
  }

  if (state.mode === "logic") {
    if (exportWrap) exportWrap.style.display = "none";
    return renderLogicDetail(body, crumb, classSel, objSearch);
  }

  const arc = state.archives[state.selectedSlot] || state.archives[0];
  if (!arc) {
    crumb.textContent = "Drop a Metasys .dbexport file to begin.";
    classSel.style.display = "none";
    objSearch.style.display = "none";
    if (exportWrap) exportWrap.style.display = "none";
    body.innerHTML = `<div class="empty"><div class="big">No archive loaded</div><div class="small">Drag a <code>.dbexport</code> file anywhere on this page, or click slot A above.</div></div>`;
    return;
  }

  if (exportWrap) exportWrap.style.display = "";

  if (state.selectedObject) {
    return renderObjectDetail(body, crumb, classSel, objSearch);
  }

  if (!state.selectedNode) {
    // Site overview
    crumb.innerHTML = `<strong>${escapeHtml(arc.name)}</strong>`;
    classSel.style.display = "none";
    objSearch.style.display = "none";
    body.appendChild(renderSiteOverview(arc));
    return;
  }

  const node = findNodeByKey(arc, state.selectedNode);
  if (!node) {
    crumb.innerHTML = `<strong>${escapeHtml(arc.name)}</strong>`;
    classSel.style.display = "none";
    objSearch.style.display = "none";
    body.innerHTML = `<div class="empty"><div class="small">Selection not found in this archive.</div></div>`;
    return;
  }

  renderNodeDetail(body, crumb, classSel, objSearch, arc, node);
}

function renderBreadcrumb(crumb, arc, node) {
  const parts = node.key.split("#");
  const links = parts.map((p, i) => {
    const key = parts.slice(0, i + 1).join("#");
    const last = i === parts.length - 1;
    return last
      ? `<strong>${escapeHtml(p)}</strong>`
      : `<a href="#" data-key="${escapeHtml(key)}" style="color: var(--accent); text-decoration: none;">${escapeHtml(p)}</a>`;
  });
  crumb.innerHTML = `<strong>${escapeHtml(arc.name)}</strong> / ` + links.join(' <span style="color:var(--ink-dim)">/</span> ');
  crumb.querySelectorAll("a[data-key]").forEach(a => {
    a.addEventListener("click", e => {
      e.preventDefault();
      state.selectedNode = a.dataset.key;
      state.selectedObject = null;
      renderTree();
      renderDetail();
    });
  });
}

function renderControllerCard(node) {
  if (!node.obj) return null;
  const props = node.obj.properties;
  const model = decodeValue(props["70"] || "");
  const fw = decodeValue(props["12"] || "");
  const desc = decodeValue(props["28"] || "");
  const ip = decodeValue(props["44"] || "");
  const oid = node.obj.objectid || "";
  if (!model && !fw && !desc && !ip) return null;
  const card = document.createElement("div");
  card.className = "controller-card";
  const className = classLabel(node.obj.classid);
  card.innerHTML = `
    <div class="cc-header">Controller identity</div>
    <div class="cc-title">${escapeHtml(node.label)}</div>
    <div class="cc-grid">
      ${model && model !== "(empty)" ? `<div class="cc-cell"><span class="cc-label">Model</span><span class="cc-value">${escapeHtml(model)}</span></div>` : ""}
      ${fw && fw !== "(empty)" ? `<div class="cc-cell"><span class="cc-label">Firmware</span><span class="cc-value">${escapeHtml(fw)}</span></div>` : ""}
      ${ip && ip !== "(empty)" ? `<div class="cc-cell"><span class="cc-label">IP Address</span><span class="cc-value">${escapeHtml(ip)}</span></div>` : ""}
      ${oid ? `<div class="cc-cell"><span class="cc-label">Object ID</span><span class="cc-value">${escapeHtml(oid)}</span></div>` : ""}
      <div class="cc-cell"><span class="cc-label">Class</span><span class="cc-value">${escapeHtml(className)} <span style="color:var(--ink-dim)">(cid ${escapeHtml(node.obj.classid)})</span></span></div>
      ${desc && desc !== "(empty)" ? `<div class="cc-cell full"><span class="cc-label">Description</span><span class="cc-value">${escapeHtml(desc)}</span></div>` : ""}
    </div>
  `;
  return card;
}

function renderNodeDetail(body, crumb, classSel, objSearch, arc, node) {
  renderBreadcrumb(crumb, arc, node);

  // Controller identity card — prominent header for engine / controller roots
  // (especially useful for .caf files where the user wants to know "what is this?")
  if (node.kind === "engine" && node.obj) {
    const card = renderControllerCard(node);
    if (card) body.appendChild(card);
  }

  const hasObj = !!node.obj;
  const hasChildren = node.children.size > 0;

  // Pure leaf with an attached object — render full object detail
  if (hasObj && !hasChildren) {
    classSel.style.display = "none";
    objSearch.style.display = "none";
    body.appendChild(renderObjectPropsDom(node.obj, false));
    // Reverse lookup: same panel as renderObjectDetail uses, wired into the
    // tree-leaf path so left-tree clicks (which set selectedNode, not
    // selectedObject) get it too.
    renderReferencedByPanel(body, arc, node.obj);
    return;
  }

  // Intermediate node — show children, optionally with object header
  classSel.style.display = "";
  objSearch.style.display = "";
  objSearch.value = state.objSearch;

  // Class filter populated from descendants
  const classCounts = nodeAggregateClassCounts(node);
  classSel.innerHTML = '<option value="">All classes</option>';
  for (const [cid, n] of [...classCounts.entries()].sort((a, b) => b[1] - a[1])) {
    const opt = document.createElement("option");
    opt.value = cid;
    opt.textContent = `${classLabel(cid)} — ${n}`;
    classSel.appendChild(opt);
  }
  classSel.value = state.classFilter;

  // Header card
  const header = document.createElement("div");
  header.className = "obj-detail";
  const cidLabel = node.classid ? classLabel(node.classid) : kindIcon(node.kind) + " " + node.kind;
  header.innerHTML = `
    <h2 style="font-family: var(--sans); word-break: normal;">${kindIcon(node.kind)} ${escapeHtml(node.label)}</h2>
    <div class="meta">
      ${node.classid ? `<span>Class: <strong>${escapeHtml(classLabel(node.classid))}</strong> (cid ${node.classid})</span>` : `<span>Kind: <strong>${escapeHtml(node.kind)}</strong></span>`}
      ${node.obj?.objectid ? `<span>Object ID: <strong>${escapeHtml(node.obj.objectid)}</strong></span>` : ""}
      <span>Direct children: <strong>${node.children.size.toLocaleString()}</strong></span>
      <span>Descendants: <strong>${node.totalCount.toLocaleString()}</strong></span>
    </div>
  `;
  body.appendChild(header);

  // If the node itself has properties, show them in a collapsed panel
  if (hasObj) {
    const propsCard = document.createElement("div");
    propsCard.className = "obj-detail";
    propsCard.style.paddingTop = "0";
    propsCard.innerHTML = `<h3 style="margin: 0 0 8px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--ink-soft);">Own properties</h3>`;
    propsCard.appendChild(propsListDom(node.obj));
    body.appendChild(propsCard);
  }

  // Children table
  body.appendChild(renderChildrenTable(node));
}

function renderChildrenTable(node) {
  let children = [...node.children.values()];

  if (state.classFilter) {
    children = children.filter(c => c.classid === state.classFilter ||
      [...nodeAggregateClassCounts(c).keys()].includes(state.classFilter));
  }
  if (state.objSearch) {
    const q = state.objSearch.toLowerCase();
    children = children.filter(c => c.label.toLowerCase().includes(q) || (c.obj?.ref || "").toLowerCase().includes(q));
  }

  children.sort((a, b) => {
    const oa = KIND_ORDER[a.kind] ?? 99;
    const ob = KIND_ORDER[b.kind] ?? 99;
    if (oa !== ob) return oa - ob;
    return a.label.localeCompare(b.label, undefined, { numeric: true });
  });

  const wrap = document.createElement("div");
  const capped = children.slice(0, 2000);

  if (children.length > capped.length) {
    const note = document.createElement("div");
    note.style.padding = "8px 16px";
    note.style.fontSize = "12px";
    note.style.color = "var(--ink-dim)";
    note.style.background = "var(--bg-alt)";
    note.style.borderBottom = "1px solid var(--line)";
    note.textContent = `Showing first ${capped.length.toLocaleString()} of ${children.length.toLocaleString()} children. Use the filter to narrow.`;
    wrap.appendChild(note);
  }

  const tbl = document.createElement("table");
  tbl.className = "objs";
  tbl.innerHTML = `<thead><tr><th>Name</th><th>Type</th><th>Class</th><th style="text-align:right;">Items</th></tr></thead>`;
  const tbody = document.createElement("tbody");

  for (const c of capped) {
    const tr = document.createElement("tr");
    const cidLabel = c.classid ? classLabel(c.classid) : "—";
    tr.innerHTML = `
      <td class="ref"><span class="leaf">${kindIcon(c.kind)} ${escapeHtml(c.label)}</span></td>
      <td class="cid">${escapeHtml(c.kind)}</td>
      <td class="cid"><span class="name">${escapeHtml(cidLabel)}</span></td>
      <td class="cid" style="text-align:right; font-variant-numeric: tabular-nums;">${c.totalCount.toLocaleString()}</td>
    `;
    tr.addEventListener("click", () => {
      state.selectedNode = c.key;
      state.selectedObject = null;
      if (c.children.size > 0 && !state.expandedNodes.has(c.key)) {
        // Also expand the parent so the user sees where they landed
        state.expandedNodes.add(node.key);
        state.expandedNodes.add(c.key);
      }
      renderTree();
      renderDetail();
    });
    tbody.appendChild(tr);
  }
  tbl.appendChild(tbody);
  wrap.appendChild(tbl);
  return wrap;
}

function displayRef(ref) {
  // Strip redundant doubled prefix: "ADX:ADX/path" -> "ADX / path"
  // Common Metasys pattern where the ADX appears twice.
  const colon = ref.indexOf(":");
  if (colon < 0) return ref;
  const adx = ref.slice(0, colon);
  const after = ref.slice(colon + 1);
  const slash = after.indexOf("/");
  if (slash < 0) return ref;
  const engine = after.slice(0, slash);
  const path = after.slice(slash + 1);
  if (engine === adx) {
    return `${adx} / ${path}`;
  }
  return `${adx} / ${engine} / ${path}`;
}

function renderObjectPropsDom(obj, compact) {
  const wrap = document.createElement("div");
  wrap.className = "obj-detail";
  wrap.innerHTML = `
    <h2>${escapeHtml(displayRef(obj.ref))}</h2>
    <div class="meta">
      <span>Class: <strong>${escapeHtml(classLabel(obj.classid))}</strong> (cid ${obj.classid})</span>
      ${obj.bacnetclassid ? `<span>BACnet class: <strong>${escapeHtml(obj.bacnetclassid)}</strong></span>` : ""}
      ${obj.objectid ? `<span>Object ID: <strong>${escapeHtml(obj.objectid)}</strong></span>` : ""}
      <span>Properties: <strong>${Object.keys(obj.properties).length}</strong></span>
    </div>
  `;
  wrap.appendChild(propsListDom(obj));
  return wrap;
}

// Properties that should always show first (in this order) when present.
// Identity & most-asked attributes lead; everything else is sorted by name.
const PRIORITY_PROP_ORDER = [
  28,    // Description
  77,    // Object Name
  2390,  // User Name
  32527, // Item Reference
  85,    // Present Value
  70,    // Model Name
  44,    // Firmware Version / IP
  12,    // Comment
  103,   // Reliability
  131,   // Reliability (BACnet)
  75,    // Object Identifier (Metasys-internal DB id)
  32589, // BACnet Instance Number (point number on FEC/BACnet controllers)
  808,   // N2 Point Address (point number on N2 controllers)
  806,   // Net N2 Address (device address on the N2 trunk)
  117,   // Units
  79,    // Object Type
];
const PRIORITY_PROP_INDEX = new Map(PRIORITY_PROP_ORDER.map((p, i) => [String(p), i]));

function isEmptyValueText(s) {
  if (s == null) return true;
  const t = String(s).trim();
  return t === "" || t === "(empty)" || t === "(empty list)";
}

function propsListDom(obj) {
  const list = document.createElement("div");
  list.className = "props";

  const allIds = Object.keys(obj.properties);
  const decoded = new Map();
  for (const pid of allIds) decoded.set(pid, decodeValue(obj.properties[pid] || ""));

  const priority = [];
  const named = [];
  const unnamed = [];
  for (const pid of allIds) {
    const label = propLabel(pid);
    const isUnnamed = /^Property \d+$/.test(label);
    if (PRIORITY_PROP_INDEX.has(pid)) priority.push(pid);
    else if (isUnnamed) unnamed.push(pid);
    else named.push(pid);
  }
  priority.sort((a, b) => PRIORITY_PROP_INDEX.get(a) - PRIORITY_PROP_INDEX.get(b));
  named.sort((a, b) => propLabel(a).localeCompare(propLabel(b)));
  unnamed.sort((a, b) => parseInt(a, 10) - parseInt(b, 10));

  const ALWAYS_SHOW_EVEN_IF_EMPTY = new Set(["28", "77", "85"]);
  const finalPriority = priority.filter(pid => ALWAYS_SHOW_EVEN_IF_EMPTY.has(pid) || !isEmptyValueText(decoded.get(pid)));
  const finalNamed = named.filter(pid => !isEmptyValueText(decoded.get(pid)));

  function makeRow(pid, opts = {}) {
    const div = document.createElement("div");
    div.className = "prop" + (opts.unnamed ? " unnamed" : "");
    const val = decoded.get(pid) || "";
    if (isEmptyValueText(val)) div.classList.add("empty");
    div.innerHTML = `
      <div class="pname">${escapeHtml(propLabel(pid))}<span class="pid">id ${pid}</span></div>
      <div class="pval">${val === "" ? "(empty)" : escapeHtml(val)}</div>
    `;
    return div;
  }

  for (const pid of finalPriority) list.appendChild(makeRow(pid));
  for (const pid of finalNamed) list.appendChild(makeRow(pid));

  const hiddenNamedEmpty = named.length - finalNamed.length;
  if (hiddenNamedEmpty > 0) {
    const det = document.createElement("details");
    det.className = "unnamed-group";
    det.innerHTML = `<summary>${hiddenNamedEmpty} named properties with empty/default values</summary>`;
    for (const pid of named) {
      if (!isEmptyValueText(decoded.get(pid))) continue;
      det.appendChild(makeRow(pid));
    }
    list.appendChild(det);
  }

  if (unnamed.length > 0) {
    const nonEmpty = unnamed.filter(pid => !isEmptyValueText(decoded.get(pid)));
    const det = document.createElement("details");
    det.className = "unnamed-group";
    det.innerHTML = `<summary>${unnamed.length} unnamed properties (${nonEmpty.length} with values) — click to expand</summary>`;
    for (const pid of unnamed) det.appendChild(makeRow(pid, { unnamed: true }));
    list.appendChild(det);
  }

  return list;
}

function renderSiteOverview(arc) {
  const wrap = document.createElement("div");
  wrap.className = "obj-detail";
  const totalByClass = new Map();
  for (const d of arc.devices) {
    for (const o of d.objects) totalByClass.set(o.classid, (totalByClass.get(o.classid) || 0) + 1);
  }
  const ranked = [...totalByClass.entries()].sort((a, b) => b[1] - a[1]);

  wrap.innerHTML = `
    <h2 style="font-family: var(--sans); word-break: normal;">${escapeHtml(arc.name)}</h2>
    <div class="meta">
      <span>Devices: <strong>${arc.devices.length}</strong></span>
      <span>Objects: <strong>${arc.objectCount.toLocaleString()}</strong></span>
      <span>Distinct classes: <strong>${totalByClass.size}</strong></span>
    </div>
    <h3 style="margin: 24px 0 8px; font-size: 13px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--ink-soft);">Object inventory</h3>
    <div class="props">
      ${ranked.slice(0, 30).map(([cid, n]) => `
        <div class="prop">
          <div class="pname">${escapeHtml(classLabel(cid))}<span class="pid">cid ${cid}</span></div>
          <div class="pval" style="font-variant-numeric: tabular-nums;">${n.toLocaleString()}</div>
        </div>
      `).join("")}
    </div>
  `;
  return wrap;
}

function renderObjectTable(objects) {
  // Apply filters
  let rows = objects;
  if (state.classFilter) rows = rows.filter(o => o.classid === state.classFilter);
  if (state.objSearch) {
    const q = state.objSearch.toLowerCase();
    rows = rows.filter(o => o.ref.toLowerCase().includes(q));
  }
  // Cap render to first 2000 for performance
  const capped = rows.slice(0, 2000);

  const tbl = document.createElement("table");
  tbl.className = "objs";
  tbl.innerHTML = `<thead><tr><th>Reference</th><th>Class</th><th>BACnet ID</th></tr></thead>`;
  const tbody = document.createElement("tbody");
  for (const o of capped) {
    const tr = document.createElement("tr");
    const refParts = o.ref.split(/[\.:\/]/);
    const leaf = refParts[refParts.length - 1] || o.ref;
    const path = o.ref.slice(0, o.ref.length - leaf.length);
    tr.innerHTML = `
      <td class="ref"><span class="path">${escapeHtml(path)}</span><span class="leaf">${escapeHtml(leaf)}</span></td>
      <td class="cid"><span class="name">${escapeHtml(classLabel(o.classid))}</span> <span style="color: var(--ink-dim);">${o.classid}</span></td>
      <td class="cid">${escapeHtml(o.objectid || "—")}</td>
    `;
    tr.addEventListener("click", () => {
      state.selectedObject = o.ref;
      renderDetail();
    });
    tbody.appendChild(tr);
  }
  tbl.appendChild(tbody);

  const wrap = document.createElement("div");
  if (rows.length > capped.length) {
    const note = document.createElement("div");
    note.style.padding = "8px 16px";
    note.style.fontSize = "12px";
    note.style.color = "var(--ink-dim)";
    note.style.background = "var(--bg-alt)";
    note.style.borderBottom = "1px solid var(--line)";
    note.textContent = `Showing first ${capped.length.toLocaleString()} of ${rows.length.toLocaleString()} matches. Use the filter to narrow.`;
    wrap.appendChild(note);
  }
  wrap.appendChild(tbl);
  return wrap;
}

function renderObjectDetail(body, crumb, classSel, objSearch) {
  classSel.style.display = "none";
  objSearch.style.display = "none";

  const arc = state.archives[state.selectedSlot] || state.archives[0];
  const dev = findDevice(arc, state.selectedDevice);
  const obj = dev?.objects.find(o => o.ref === state.selectedObject);

  if (!obj) {
    body.innerHTML = `<div class="empty"><div class="small">Object not found.</div></div>`;
    return;
  }

  crumb.innerHTML = `<a href="#" id="backLink" style="color: var(--accent); text-decoration: none; margin-right: 8px;">← back</a><strong>${escapeHtml(arc.name)}</strong> / <strong>${escapeHtml(state.selectedDevice)}</strong> / ${escapeHtml(obj.ref.split(/[\.:\/]/).pop())}`;
  setTimeout(() => {
    document.getElementById("backLink")?.addEventListener("click", (e) => {
      e.preventDefault();
      state.selectedObject = null;
      renderDetail();
    });
  }, 0);

  const wrap = document.createElement("div");
  wrap.className = "obj-detail";
  wrap.innerHTML = `
    <h2>${escapeHtml(obj.ref)}</h2>
    <div class="meta">
      <span>Class: <strong>${escapeHtml(classLabel(obj.classid))}</strong> (cid ${obj.classid})</span>
      ${obj.bacnetclassid ? `<span>BACnet class: <strong>${obj.bacnetclassid}</strong></span>` : ""}
      ${obj.objectid ? `<span>Object ID: <strong>${obj.objectid}</strong></span>` : ""}
      <span>Properties: <strong>${Object.keys(obj.properties).length}</strong></span>
    </div>
    <div class="props" id="propList"></div>
  `;
  body.appendChild(wrap);

  const list = wrap.querySelector("#propList");
  const propIds = Object.keys(obj.properties).map(Number).sort((a, b) => a - b);
  for (const pid of propIds) {
    const div = document.createElement("div");
    div.className = "prop";
    const val = decodeValue(obj.properties[String(pid)]);
    div.innerHTML = `
      <div class="pname">${escapeHtml(propLabel(String(pid)))}<span class="pid">id ${pid}</span></div>
      <div class="pval">${escapeHtml(val) || "<span style='color:var(--ink-dim)'>(empty)</span>"}</div>
    `;
    list.appendChild(div);
  }

  // ===== Referenced by panel =====
  // Reverse lookup: every graphic / program / schedule / user tree in the
  // archive that points at this object. The data comes from arc._refIndex
  // which is built as a side effect of the unbound scan; if the scan hasn't
  // run yet, we offer to kick it off (same scan, same cost).
  renderReferencedByPanel(body, arc, obj);
}

function categorizeReferringItem(item) {
  const slashIdx = item.indexOf("/");
  const tail = slashIdx >= 0 ? item.slice(slashIdx + 1) : item;
  if (tail.startsWith("$site.UserTrees")) return { kind: "userTree", label: "User trees", emoji: "🗂" };
  if (tail.startsWith("Graphics."))       return { kind: "graphic", label: "Graphics", emoji: "🖼" };
  if (tail.startsWith("Programming."))    return { kind: "programming", label: "Programming logic", emoji: "⚙" };
  if (tail.startsWith("System Programs.")) return { kind: "sysProgram", label: "System programs", emoji: "⚙" };
  if (tail.startsWith("Schedule"))        return { kind: "schedule", label: "Schedules", emoji: "📅" };
  if (tail.startsWith("$site.SummaryDefs")) return { kind: "summary", label: "Summary definitions", emoji: "📊" };
  // No path tail = the engine itself; or some other object
  return { kind: "object", label: "Objects (property values)", emoji: "•" };
}

function renderReferencedByPanel(body, arc, obj) {
  const section = document.createElement("div");
  section.className = "obj-detail";
  section.style.marginTop = "8px";
  section.style.borderTop = "1px solid var(--line)";
  section.style.paddingTop = "20px";

  if (!arc._refIndex) {
    // Index not yet built — offer to kick off the scan.
    section.innerHTML = `
      <h2 style="font-family: var(--sans); word-break: normal;">Referenced by</h2>
      <p style="color: var(--ink-soft); max-width: 780px; margin-bottom: 12px;">
        Find every graphic, program, schedule, and user tree that references this object. Useful before deleting a point ("what'll break?"), for commissioning audits ("what does this sensor actually drive?"), and for figuring out cascade behavior in complex control sequences.
      </p>
      <p style="color: var(--ink-soft); max-width: 780px; font-size: 13px; margin-bottom: 16px;">
        Requires a one-time scan of the archive (same walk used to find unbound refs — running it here also enables the Unbound Refs mode for this archive).
      </p>
      <button class="btn btn-primary" id="buildRefIndex" style="font-size: 14px;">⚡ Build reference index</button>
      <span id="refIndexStatus" style="margin-left: 12px; color: var(--muted); font-family: var(--sans);"></span>
    `;
    body.appendChild(section);
    setTimeout(() => {
      const btn = section.querySelector("#buildRefIndex");
      const status = section.querySelector("#refIndexStatus");
      btn?.addEventListener("click", async () => {
        // Snapshot the user's current selection so the scan's async wait
        // can't be hijacked by stray clicks elsewhere — when the scan
        // finishes we restore what they were looking at.
        const savedDevice = state.selectedDevice;
        const savedObject = state.selectedObject;
        btn.disabled = true;
        btn.textContent = "Scanning…";
        try {
          await analyzeArchiveForUnbound(arc, msg => { status.textContent = msg; });
          state.selectedDevice = savedDevice;
          state.selectedObject = savedObject;
          renderDetail();
        } catch (e) {
          console.error(e);
          status.textContent = "Scan failed: " + e.message;
          btn.textContent = "⚡ Build reference index";
          btn.disabled = false;
        }
      });
    }, 0);
    return;
  }

  // Index is built — show the references (if any)
  const entries = arc._refIndex.get(obj.ref) || [];
  const totalCount = entries.length;

  // Group by category for readability
  const groups = new Map();
  for (const entry of entries) {
    const cat = categorizeReferringItem(entry.referringItem);
    if (!groups.has(cat.kind)) groups.set(cat.kind, { meta: cat, items: new Map() });
    const g = groups.get(cat.kind);
    // Dedup at referring-item level within a group (one row per item, listing all attrs it references through)
    if (!g.items.has(entry.referringItem)) {
      g.items.set(entry.referringItem, { attrs: new Set(), source: entry.source });
    }
    g.items.get(entry.referringItem).attrs.add(entry.referringAttr);
  }
  // Sort groups by typical interest (user trees / programs / graphics first)
  const order = ["userTree", "programming", "sysProgram", "graphic", "schedule", "summary", "object"];
  const sortedGroups = [...groups.entries()].sort((a, b) => order.indexOf(a[0]) - order.indexOf(b[0]));

  const uniqueItemCount = sortedGroups.reduce((s, [, g]) => s + g.items.size, 0);

  section.innerHTML = `
    <h2 style="font-family: var(--sans); word-break: normal;">Referenced by <span style="color:var(--ink-soft); font-weight: normal;">(${uniqueItemCount.toLocaleString()} item${uniqueItemCount === 1 ? "" : "s"}, ${totalCount.toLocaleString()} use${totalCount === 1 ? "" : "s"})</span></h2>
  `;

  if (totalCount === 0) {
    const empty = document.createElement("p");
    empty.style.color = "var(--ink-soft)";
    empty.style.fontStyle = "italic";
    empty.style.maxWidth = "780px";
    empty.textContent = "No references found. Nothing in this archive's graphics, programs, user trees, or schedules points at this object — it's likely safe to delete, or this object is purely an endpoint (an input from a physical sensor, etc.).";
    section.appendChild(empty);
    body.appendChild(section);
    return;
  }

  for (const [kind, group] of sortedGroups) {
    const block = document.createElement("div");
    block.style.marginBottom = "16px";
    const itemsArr = [...group.items.entries()];
    // Show up to 50 per group, with a count if truncated
    const cap = 50;
    const visible = itemsArr.slice(0, cap);
    const truncated = itemsArr.length > cap;
    block.innerHTML = `
      <div style="font-family: var(--sans); font-size: 14px; font-weight: 600; color: var(--ink); margin: 8px 0 6px 0;">
        ${group.meta.emoji} ${escapeHtml(group.meta.label)} <span style="color: var(--ink-soft); font-weight: normal;">(${itemsArr.length.toLocaleString()})</span>
      </div>
      <div style="display: flex; flex-direction: column; gap: 4px;">
        ${visible.map(([item, info]) => {
          const leaf = item.split(/[\.:\/]/).pop();
          const attrs = [...info.attrs].filter(a => a && a !== "(file content)" && a !== "(logic / graphic binding)").join(", ");
          return `<div style="font-family: var(--mono); font-size: 12px; padding: 6px 10px; border: 1px solid var(--line); border-radius: var(--radius); background: var(--bg-alt);">
            <div style="font-weight: 600; color: var(--accent);">${escapeHtml(leaf)}</div>
            <div style="color: var(--ink-soft); font-size: 11px;">${escapeHtml(item)}</div>
            ${attrs ? `<div style="font-size: 11px; color: var(--ink-dim); margin-top: 2px;">via attr: ${escapeHtml(attrs)}</div>` : ""}
            <div style="font-size: 10px; color: var(--ink-dim); margin-top: 2px;">source: ${escapeHtml(info.source)}</div>
          </div>`;
        }).join("")}
        ${truncated ? `<div style="font-size: 12px; color: var(--ink-dim); padding: 6px 10px; font-style: italic;">…and ${(itemsArr.length - cap).toLocaleString()} more in this category</div>` : ""}
      </div>
    `;
    section.appendChild(block);
  }
  body.appendChild(section);
}

// ============ Audit reports ============
// Three findings that operators / consultants typically pay big consulting hours
// to discover manually. All three run purely on parsed archive data — no scan
// required for suppressed-alarms and duplicate-descriptions; orphaned-graphics
// uses the reverse-lookup index built by the unbound scanner.

// Event Enable (property 35) is a 3-bit bitstring: to-offnormal, to-fault,
// to-normal. "111" = fully enabled. Anything else = some transition suppressed.
// Decode each value into a human-readable list of what's disabled.
function decodeEventEnableSuppression(bits) {
  // Bits come left-to-right: position 0 = to-offnormal, 1 = to-fault, 2 = to-normal
  const labels = ["to-offnormal", "to-fault", "to-normal"];
  const disabled = [];
  for (let i = 0; i < Math.min(3, bits.length); i++) {
    if (bits[i] === "0") disabled.push(labels[i]);
  }
  return disabled;
}

function analyzeArchiveForAudit(arc) {
  if (arc._auditAnalysis) return arc._auditAnalysis;

  // ===== 1. Suppressed alarms =====
  // Event Enable (prop 35) is a bitstring. "111" = fully enabled. Any zero bit
  // = the corresponding alarm transition is intentionally disabled. We pick
  // those out, decode which transitions are off, and group by object class
  // so the tech can scan by equipment type.
  const suppressedAlarms = [];
  // ===== 2. Duplicate descriptions =====
  // Group objects by Description (prop 28). Multiple distinct refs sharing
  // a non-empty description = either intentional (multiple zone temps named
  // "Zone Temp") or a copy-paste artifact that confuses operators. We surface
  // groups of 2+ and let the tech judge.
  const descriptionGroups = new Map();  // description -> [{ ref, classid, classLabel, source }]

  for (const dev of arc.devices) {
    for (const obj of dev.objects) {
      // -- Event Enable check --
      const eeRaw = obj.properties?.["35"];
      if (eeRaw) {
        // Extract the bitstring from `<bits set="525">111</bits>` (or similar)
        const m = eeRaw.match(/<bits[^>]*>(\d+)<\/bits>/);
        if (m && m[1] !== "111" && /^[01]+$/.test(m[1])) {
          const disabled = decodeEventEnableSuppression(m[1]);
          if (disabled.length > 0) {
            // Pull Description and Name for readability
            const descRaw = obj.properties?.["28"] || "";
            const nameRaw = obj.properties?.["2390"] || "";
            const descMatch = descRaw.match(/<string>([^<]*)<\/string>/);
            const nameMatch = nameRaw.match(/<string>([^<]*)<\/string>/);
            suppressedAlarms.push({
              ref: obj.ref,
              classid: obj.classid,
              classLabel: classLabel(obj.classid),
              eventEnable: m[1],
              disabledTransitions: disabled,
              description: descMatch ? descMatch[1] : "",
              name: nameMatch ? nameMatch[1] : "",
            });
          }
        }
      }

      // -- Description grouping --
      const descRaw = obj.properties?.["28"];
      if (descRaw) {
        const m = descRaw.match(/<string>([^<]*)<\/string>/);
        if (m && m[1].trim()) {
          const desc = m[1].trim();
          if (!descriptionGroups.has(desc)) descriptionGroups.set(desc, []);
          descriptionGroups.get(desc).push({
            ref: obj.ref,
            classid: obj.classid,
            classLabel: classLabel(obj.classid),
          });
        }
      }
    }
  }

  // Filter to groups with 2+ entries
  const duplicateDescriptions = [];
  for (const [desc, refs] of descriptionGroups.entries()) {
    if (refs.length >= 2) {
      // Count distinct engines so we can surface cross-engine duplicates
      // (more suspicious than within-engine duplicates which are usually fine)
      const engines = new Set();
      for (const r of refs) {
        const colonIdx = r.ref.indexOf(":");
        const slashIdx = r.ref.indexOf("/", colonIdx + 1);
        if (colonIdx >= 0) {
          engines.add(r.ref.slice(colonIdx + 1, slashIdx >= 0 ? slashIdx : undefined));
        }
      }
      duplicateDescriptions.push({ description: desc, count: refs.length, engineCount: engines.size, refs });
    }
  }
  // Sort: cross-engine duplicates first (more suspicious), then by count
  duplicateDescriptions.sort((a, b) => {
    if (a.engineCount !== b.engineCount) return b.engineCount - a.engineCount;
    return b.count - a.count;
  });

  // ===== 3. Orphaned graphics =====
  // Graphics files in the zip that nothing references. Requires the reverse-
  // lookup index (built by the unbound scan). If the index isn't built yet,
  // we return a placeholder and the UI offers to build it.
  let orphanedGraphics = null;
  if (arc._refIndex && arc._zip) {
    orphanedGraphics = [];
    // The graphic's "ref" is "<ADX>:<engine>/<filestem>" — same shape we
    // synthesize for non-archive.xml file Referring Items. Use that as the
    // lookup key.
    // We need to enumerate zip files; this requires arc._zip which is async.
    // Since the audit analysis is synchronous, this branch leaves the work
    // to renderAuditDetail when the user opens that category.
  }

  arc._auditAnalysis = {
    suppressedAlarms,
    duplicateDescriptions,
    orphanedGraphicsReady: !!arc._refIndex,  // whether we can compute it
  };
  return arc._auditAnalysis;
}

// Orphaned graphics requires async zip enumeration — built lazily when the
// category is opened.
async function computeOrphanedGraphics(arc) {
  if (arc._orphanedGraphicsCache) return arc._orphanedGraphicsCache;
  if (!arc._zip || !arc._refIndex) throw new Error("Reference index not built yet — open the Unbound Refs or Browse object panel to build it first.");

  // Build folder-to-context lookup again (mirrors what the scanner does)
  const folderToDeviceCtx = new Map();
  for (const dev of arc.devices) {
    for (const obj of dev.objects) {
      if (!obj.ref) continue;
      const colonIdx = obj.ref.indexOf(":");
      if (colonIdx < 0) continue;
      const slashIdx = obj.ref.indexOf("/", colonIdx + 1);
      const adx = obj.ref.slice(0, colonIdx);
      const engine = slashIdx >= 0 ? obj.ref.slice(colonIdx + 1, slashIdx) : obj.ref.slice(colonIdx + 1);
      const ctx = adx + ":" + engine;
      if (dev.folder) {
        folderToDeviceCtx.set(dev.folder, ctx);
        folderToDeviceCtx.set(dev.folder.replace(/\\/g, "/"), ctx);
      }
      break;  // first one is enough
    }
  }

  const buf = await arc._zip.generateAsync({ type: "uint8array" });
  const zip = await JSZip.loadAsync(buf);
  const orphans = [];
  zip.forEach((path, entry) => {
    if (entry.dir) return;
    if (!/\.xml$/i.test(path)) return;
    // Only care about graphics files inside device folders
    const norm = path.replace(/\\/g, "/");
    const stem = norm.replace(/^.*\//, "").replace(/\.xml$/i, "");
    if (!stem.startsWith("Graphics.")) return;
    const folder = norm.replace(/\/[^/]+$/, "");
    const ctx = folderToDeviceCtx.get(folder);
    if (!ctx) return;
    const graphicRef = ctx + "/" + stem;
    const refs = arc._refIndex.get(graphicRef) || [];
    if (refs.length === 0) {
      orphans.push({ ref: graphicRef, source: path });
    }
  });
  // Sort by name for predictable display
  orphans.sort((a, b) => a.ref.localeCompare(b.ref));
  arc._orphanedGraphicsCache = orphans;
  return orphans;
}

function getAuditArchive() {
  // Same fallback chain as getUnboundArchive — prefer the slot the user is
  // looking at, fall back to any scannable archive.
  const slots = [state.selectedSlot, 0, 1];
  for (const s of slots) {
    const a = state.archives[s];
    if (a && a.devices && a.kind !== "unbound") return a;
  }
  return null;
}

function renderAuditTree(root) {
  const arc = getAuditArchive();
  if (!arc) return;
  const an = analyzeArchiveForAudit(arc);
  addSectionTitle(root, arc.name);

  const categories = [
    {
      key: "suppressed",
      label: "🔕 Suppressed alarms",
      count: an.suppressedAlarms.length,
      hint: "Event Enable bit not 111",
    },
    {
      key: "duplicates",
      label: "👥 Duplicate descriptions",
      count: an.duplicateDescriptions.length,
      hint: "same description, multiple refs",
    },
    {
      key: "orphans",
      label: "🗑 Orphaned graphics",
      count: arc._orphanedGraphicsCache?.length ?? (arc._refIndex ? "?" : "scan needed"),
      hint: "graphics with 0 incoming refs",
    },
  ];

  for (const c of categories) {
    const el = document.createElement("div");
    el.className = "tree-node" + (state.auditCategory === c.key ? " selected" : "");
    el.style.paddingLeft = "12px";
    const countText = typeof c.count === "number" ? c.count.toLocaleString() : c.count;
    el.innerHTML = `<span class="chevron"></span><span class="kind-icon">▸</span><span class="name"></span><span class="count">${escapeHtml(String(countText))}</span>`;
    el.querySelector(".name").textContent = c.label;
    el.title = c.hint;
    el.addEventListener("click", () => {
      state.auditCategory = c.key;
      renderTree();
      renderDetail();
    });
    root.appendChild(el);
  }
}

async function renderAuditDetail(body, crumb, classSel, objSearch) {
  classSel.style.display = "none";
  objSearch.style.display = "";
  objSearch.placeholder = "Filter rows…";
  objSearch.value = state.objSearch || "";

  const arc = getAuditArchive();
  if (!arc) {
    crumb.textContent = "Drop a .dbexport to begin.";
    body.innerHTML = `<div class="empty"><div class="big">No archive loaded</div><div class="small">Drop a .dbexport — the audit reports run on the parsed objects directly.</div></div>`;
    return;
  }

  const an = analyzeArchiveForAudit(arc);
  crumb.innerHTML = `<strong>${escapeHtml(arc.name)}</strong> · Audit`;

  const cat = state.auditCategory;
  if (!cat) {
    body.innerHTML = `<div class="empty"><div class="big">Pick an audit category from the left</div><div class="small">Three checks: suppressed alarms (intentional, suspicious, or forgotten?), duplicate descriptions (copy-paste artifacts that confuse operators), and orphaned graphics (cleanup candidates).</div></div>`;
    return;
  }

  if (cat === "suppressed") return renderSuppressedAlarms(body, arc, an);
  if (cat === "duplicates") return renderDuplicateDescriptions(body, arc, an);
  if (cat === "orphans") return renderOrphanedGraphics(body, arc, an);
}

function renderSuppressedAlarms(body, arc, an) {
  const wrap = document.createElement("div");
  wrap.className = "obj-detail";
  const q = (state.objSearch || "").toLowerCase();
  let rows = an.suppressedAlarms;
  if (q) {
    rows = rows.filter(r =>
      r.ref.toLowerCase().includes(q) ||
      r.description.toLowerCase().includes(q) ||
      r.classLabel.toLowerCase().includes(q)
    );
  }
  // Group by class for readability
  const byClass = new Map();
  for (const r of rows) {
    if (!byClass.has(r.classid)) byClass.set(r.classid, []);
    byClass.get(r.classid).push(r);
  }
  const groups = [...byClass.entries()].sort((a, b) => b[1].length - a[1].length);

  wrap.innerHTML = `
    <h2 style="font-family: var(--sans); word-break: normal;">🔕 Suppressed alarms <span style="color:var(--ink-soft); font-weight: normal;">(${rows.length.toLocaleString()})</span></h2>
    <p style="color: var(--ink-soft); max-width: 780px; margin-bottom: 16px;">
      Objects whose Event Enable property has at least one alarm transition disabled. "to-offnormal" disabled means going-into-alarm won't notify. "to-fault" disabled means sensor failure won't notify. "to-normal" disabled means recovery won't clear. Some suppressions are intentional (a noisy sensor producing nuisance alarms); others are forgotten technician overrides that hide real problems.
    </p>
  `;
  body.appendChild(wrap);

  if (rows.length === 0) {
    const empty = document.createElement("p");
    empty.style.color = "var(--ink-soft)";
    empty.style.fontStyle = "italic";
    empty.textContent = "No suppressed alarms found — Event Enable is fully on for every object in this archive.";
    wrap.appendChild(empty);
    return;
  }

  // Export button
  const exportBar = document.createElement("div");
  exportBar.style.marginBottom = "12px";
  exportBar.innerHTML = `<button class="export-btn" id="dlSuppressed">Download report (CSV)</button>`;
  wrap.appendChild(exportBar);
  setTimeout(() => {
    exportBar.querySelector("#dlSuppressed")?.addEventListener("click", () => {
      const header = ["Class", "Object Ref", "Description", "Name", "Event Enable Bits", "Disabled Transitions"];
      const lines = [csvRow(header), ...rows.map(r => csvRow([r.classLabel, r.ref, r.description, r.name, r.eventEnable, r.disabledTransitions.join("; ")]))].join("\n") + "\n";
      downloadBlob(`audit_suppressed_alarms_${rows.length}.csv`, "text/csv;charset=utf-8", lines);
    });
  }, 0);

  for (const [cid, items] of groups) {
    const block = document.createElement("div");
    block.style.marginBottom = "20px";
    block.innerHTML = `<h3 style="font-family: var(--sans); font-size: 14px; margin: 12px 0 8px;">${escapeHtml(classLabel(cid))} <span style="color:var(--ink-soft); font-weight: normal;">(${items.length.toLocaleString()})</span></h3>`;
    const tbl = document.createElement("table");
    tbl.className = "objs";
    tbl.innerHTML = `<thead><tr><th>Description</th><th>Reference</th><th>Bits</th><th>Disabled</th></tr></thead>`;
    const tbody = document.createElement("tbody");
    const cap = 100;
    for (const r of items.slice(0, cap)) {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${escapeHtml(r.description || r.name || "(no description)")}</td>
        <td class="ref"><span class="path" style="font-size:11px;">${escapeHtml(r.ref)}</span></td>
        <td class="cid"><code>${escapeHtml(r.eventEnable)}</code></td>
        <td style="color: var(--bad);">${escapeHtml(r.disabledTransitions.join(", "))}</td>
      `;
      tbody.appendChild(tr);
    }
    tbl.appendChild(tbody);
    block.appendChild(tbl);
    if (items.length > cap) {
      const note = document.createElement("div");
      note.style.fontSize = "12px";
      note.style.color = "var(--ink-dim)";
      note.style.padding = "8px";
      note.style.fontStyle = "italic";
      note.textContent = `…and ${(items.length - cap).toLocaleString()} more. Export CSV for the full list.`;
      block.appendChild(note);
    }
    wrap.appendChild(block);
  }
}

function renderDuplicateDescriptions(body, arc, an) {

    <p style="color: var(--ink-soft); max-width: 780px; margin-bottom: 16px;">

    exportBar.querySelector("#dlDupes")?.addEventListener("click", () => {
      const header = ["Description", "Count", "Engine Count", "Refs (semicolon separated)"];

  const cap = 200;
  for (const g of groups.slice(0, cap)) {

    const sampleRefs = g.refs.slice(0, 3).map(r => `<div style="font-family: var(--mono); font-size: 11px; color: var(--ink-soft);">${escapeHtml(r.ref)}</div>`).join("");
    const more = g.refs.length > 3 ? `<div style="font-size: 11px; color: var(--ink-dim); font-style: italic;">…and ${g.refs.length - 3} more</div>` : "";
    tr.innerHTML = `

    note.style.color = "var(--ink-dim)";
    note.style.padding = "8px";
    note.style.fontStyle = "italic";
    note.textContent = `…and ${(groups.length - cap).toLocaleString()} more groups. Export CSV for the full list.`;
    wrap.appendChild(note);
  }
}

async function renderOrphanedGraphics(body, arc, an) {
  const wrap = document.createElement("div");
  wrap.className = "obj-detail";
  wrap.innerHTML = `
    <h2 style="font-family: var(--sans); word-break: normal;">🗑 Orphaned graphics</h2>
    <p style="color: var(--ink-soft); max-width: 780px; margin-bottom: 16px;">
      Graphics files where nothing in the archive points at them — not a user tree, not another graphic, not a button. They're rendering but unreachable through normal navigation. Common causes: graphics for decommissioned equipment, "scratch" copies left by previous techs, or graphics whose linking user-tree node got deleted.
    </p>
  `;
  body.appendChild(wrap);

  if (!arc._refIndex) {
    const cta = document.createElement("div");
    cta.innerHTML = `
      <p style="color: var(--ink-soft); margin-bottom: 12px;">Requires the reference index. Same scan used for Unbound Refs.</p>
      <button class="btn btn-primary" id="buildIdxFromAudit">⚡ Build reference index</button>
      <span id="auditIdxStatus" style="margin-left: 12px; color: var(--muted); font-family: var(--sans);"></span>
    `;
    wrap.appendChild(cta);
    setTimeout(() => {
      const btn = cta.querySelector("#buildIdxFromAudit");
      const status = cta.querySelector("#auditIdxStatus");
      btn.addEventListener("click", async () => {
        btn.disabled = true;
        btn.textContent = "Scanning…";
        try {
          await analyzeArchiveForUnbound(arc, msg => { status.textContent = msg; });
          delete arc._auditAnalysis;  // re-run so the orphan count updates
          renderTree();
          renderDetail();
        } catch (e) {
          status.textContent = "Scan failed: " + e.message;
          btn.textContent = "⚡ Build reference index";
          btn.disabled = false;
        }
      });
    }, 0);
    return;
  }

  // Compute orphans (cached on second visit)
  let orphans;
  try {
    orphans = await computeOrphanedGraphics(arc);
  } catch (e) {
    const err = document.createElement("p");
    err.style.color = "var(--bad)";
    err.textContent = "Could not compute orphans: " + e.message;
    wrap.appendChild(err);
    return;
  }

  const q = (state.objSearch || "").toLowerCase();
  const filtered = q ? orphans.filter(o => o.ref.toLowerCase().includes(q)) : orphans;

  const header = document.createElement("h3");
  header.style.fontFamily = "var(--sans)";
  header.style.fontSize = "16px";
  header.innerHTML = `Found <strong>${filtered.length.toLocaleString()}</strong> orphaned graphic${filtered.length === 1 ? "" : "s"}${q ? " matching filter" : ""}.`;
  wrap.appendChild(header);

  if (filtered.length === 0) {
    const empty = document.createElement("p");
    empty.style.color = "var(--ink-soft)";
    empty.style.fontStyle = "italic";
    empty.textContent = orphans.length === 0
      ? "Every graphic in the archive is referenced by something. Either nothing's been decommissioned without cleanup, or the cleanup was thorough."
      : "No orphans match the current filter.";
    wrap.appendChild(empty);
    return;
  }

  // Export + Apply delete buttons
  const actionBar = document.createElement("div");
  actionBar.style.marginBottom = "12px";
  actionBar.style.display = "flex";
  actionBar.style.gap = "8px";
  actionBar.innerHTML = `
    <button class="export-btn" id="dlOrphans">Download report (CSV)</button>
    <button class="export-btn" id="deleteOrphans" style="border-color: var(--accent); color: var(--accent); font-weight: 600;">Apply delete to archive — remove all orphans (.dbexport)</button>
  `;
  wrap.appendChild(actionBar);
  setTimeout(() => {
    actionBar.querySelector("#dlOrphans")?.addEventListener("click", () => {
      const header = ["Orphaned Graphic Ref", "Source File"];
      const lines = [csvRow(header), ...filtered.map(o => csvRow([o.ref, o.source]))].join("\n") + "\n";
      downloadBlob(`audit_orphaned_graphics_${filtered.length}.csv`, "text/csv;charset=utf-8", lines);
    });
    actionBar.querySelector("#deleteOrphans")?.addEventListener("click", () => {
      // Synthesize unbound-style rows so exportAppliedDeleteArchive can categorize
      // and route them through the same confirm dialog + zip-write pipeline.
      // Each orphan needs a _source for the file-level deletion logic.
      // Stash these rows on arc.unbound so the delete pipeline finds them.
      // To avoid corrupting an existing unbound scan, append rather than replace.
      if (!arc.unbound) arc.unbound = [];
      for (const o of filtered) {
        // Only push if not already present
        if (!arc.unbound.some(r => r["Referring Item"] === o.ref && r._source === o.source)) {
          arc.unbound.push({
            "Archive": arc.name,
            "Reference Type": "Audit-orphaned",
            "Referring Item": o.ref,
            "Referring Attribute": "(orphaned graphic)",
            "Referenced Item": "",
            "Referenced Attribute": "",
            "_source": o.source,
          });
        }
      }
      const synth = filtered.map(o => ({ "Referring Item": o.ref }));
      exportAppliedDeleteArchive(synth, `orphaned_graphics_${filtered.length}`);
    });
  }, 0);

  // Table
  const tbl = document.createElement("table");
  tbl.className = "objs";
  tbl.innerHTML = `<thead><tr><th>Graphic</th><th>Source file</th></tr></thead>`;
  const tbody = document.createElement("tbody");
  for (const o of filtered.slice(0, 500)) {
    const tr = document.createElement("tr");
    const leaf = o.ref.split("/").pop();
    tr.innerHTML = `
      <td class="ref"><div class="leaf">${escapeHtml(leaf)}</div><div class="path" style="font-size:11px;">${escapeHtml(o.ref)}</div></td>
      <td style="font-family: var(--mono); font-size: 11px; color: var(--ink-dim);">${escapeHtml(o.source)}</td>
    `;
    tbody.appendChild(tr);
  }
  tbl.appendChild(tbody);
  wrap.appendChild(tbl);
  if (filtered.length > 500) {
    const note = document.createElement("div");
    note.style.fontSize = "12px";
    note.style.color = "var(--ink-dim)";
    note.style.padding = "8px";
    note.style.fontStyle = "italic";
    note.textContent = `Showing first 500 of ${filtered.length.toLocaleString()}. Export CSV for the full list.`;
    wrap.appendChild(note);
  }
}

// ============ Diff ============
function computeDiff() {
  const a = state.archives[0], b = state.archives[1];
  const map = (arc) => {
    const m = new Map();
    for (const dev of arc.devices) {
      for (const o of dev.objects) m.set(o.ref, o);
    }
    return m;
  };
  const ma = map(a), mb = map(b);
  const added = [], removed = [], changed = [], same = [];
  const allRefs = new Set([...ma.keys(), ...mb.keys()]);
  for (const ref of allRefs) {
    const oa = ma.get(ref), ob = mb.get(ref);
    if (!oa) { added.push({ ref, obj: ob }); continue; }
    if (!ob) { removed.push({ ref, obj: oa }); continue; }
    // Property-level diff
    const propChanges = [];
    const allPids = new Set([...Object.keys(oa.properties), ...Object.keys(ob.properties)]);
    for (const pid of allPids) {
      const va = oa.properties[pid] ?? "";
      const vb = ob.properties[pid] ?? "";
      if (va !== vb) propChanges.push({ pid, old: va, new: vb });
    }
    if (propChanges.length) changed.push({ ref, a: oa, b: ob, propChanges });
    else same.push(ref);
  }
  return { added, removed, changed, same };
}

let _diffCache = null;
function getDiff() {
  if (!_diffCache) _diffCache = computeDiff();
  return _diffCache;
}
function invalidateDiff() { _diffCache = null; }

// ============ Unbound References explorer ============
// Build cached pivots from the unbound CSV
function getUnboundAnalysis(arc) {
  if (arc._unboundAnalysis) return arc._unboundAnalysis;
  const rows = arc.unbound;

  // Pivot: by Referring Item (the item with the broken ref)
  const byReferring = new Map();
  // Pivot: by Referenced Item (the dead thing being pointed to)
  const byReferenced = new Map();
  // Dead ADX prefix detection (pattern: ":<adx>:" before "/")
  const deadAdxCount = new Map();
  const liveAdxCount = new Map();

  for (const r of rows) {
    const referring = r["Referring Item"];
    const referenced = r["Referenced Item"];
    if (!byReferring.has(referring)) byReferring.set(referring, []);
    byReferring.get(referring).push(r);
    if (!byReferenced.has(referenced)) byReferenced.set(referenced, []);
    byReferenced.get(referenced).push(r);

    // Extract ADX prefix from referenced (the dead one)
    const refdAdx = referenced.split(":", 1)[0];
    deadAdxCount.set(refdAdx, (deadAdxCount.get(refdAdx) || 0) + 1);
    // And from referring (presumably a live ADX)
    const refgAdx = referring.split(":", 1)[0];
    liveAdxCount.set(refgAdx, (liveAdxCount.get(refgAdx) || 0) + 1);
  }

  // Patterns: dead ADX prefixes that DON'T match any live ADX → likely rename target
  const liveAdxes = new Set(liveAdxCount.keys());
  const renameSuggestions = [];
  for (const [deadPrefix, count] of deadAdxCount.entries()) {
    if (!liveAdxes.has(deadPrefix)) {
      // Try to suggest a target: live ADX with similar name
      let suggested = null;
      for (const live of liveAdxes) {
        // Pattern: same root, different suffix (-01 vs -02)
        const m1 = deadPrefix.match(/^(.+?)(-?\d+)$/);
        const m2 = live.match(/^(.+?)(-?\d+)$/);
        if (m1 && m2 && m1[1] === m2[1]) { suggested = live; break; }
        // Or any live that shares a long common prefix
        if (live.startsWith(deadPrefix.slice(0, Math.min(deadPrefix.length, 10)))) {
          suggested = suggested || live;
        }
      }
      renameSuggestions.push({ from: deadPrefix, to: suggested, count });
    }
  }
  renameSuggestions.sort((a, b) => b.count - a.count);

  arc._unboundAnalysis = {
    rows,
    byReferring,
    byReferenced,
    deadAdxCount,
    liveAdxCount,
    renameSuggestions,
  };
  return arc._unboundAnalysis;
}

function getUnboundArchive() {
  // Three-tier preference: explicit CSV (kind==="unbound") first, then any
  // archive that's already been scanned (arc.unbound populated), then any
  // scannable archive so we can offer to run the native scan.
  const slots = [state.selectedSlot, 0, 1];
  for (const s of slots) { const a = state.archives[s]; if (a && a.kind === "unbound") return a; }
  for (const s of slots) { const a = state.archives[s]; if (a && a.unbound) return a; }
  for (const s of slots) { const a = state.archives[s]; if (a && a._zip && a.kind !== "unbound") return a; }
  return null;
}

function renderUnboundTree(root) {
  const arc = getUnboundArchive();
  if (!arc) return;
  if (!arc.unbound) {
    // Scannable but not yet scanned — sidebar is empty until the scan runs.
    addSectionTitle(root, arc.name);
    const hint = document.createElement("div");
    hint.className = "tree-node";
    hint.style.padding = "8px 12px";
    hint.style.color = "var(--muted)";
    hint.style.fontFamily = "var(--sans)";
    hint.textContent = "Click \"Scan now\" in the main panel to populate.";
    root.appendChild(hint);
    return;
  }
  const an = getUnboundAnalysis(arc);
  const q = (state.treeFilter || "").toLowerCase();

  addSectionTitle(root, arc.name);

  // Pivot selectors as top-level "categories" in the tree
  const pivots = [
    { key: "patterns", label: "🛠 Detected patterns", count: an.renameSuggestions.length },
    { key: "byReferring", label: "By referring item", count: an.byReferring.size },
    { key: "byReferenced", label: "By referenced (dead) item", count: an.byReferenced.size },
    { key: "all", label: "All rows (flat)", count: an.rows.length },
  ];
  for (const p of pivots) {
    const el = document.createElement("div");
    el.className = "tree-node" + (state.unboundPivot === p.key ? " selected" : "");
    el.style.paddingLeft = "12px";
    el.innerHTML = `<span class="chevron"></span><span class="kind-icon">${p.key === 'patterns' ? '⚡' : '▸'}</span><span class="name"></span><span class="count">${p.count.toLocaleString()}</span>`;
    el.querySelector(".name").textContent = p.label;
    el.addEventListener("click", () => {
      state.unboundPivot = p.key;
      state.unboundPivotValue = null;
      renderTree();
      renderDetail();
    });
    root.appendChild(el);
  }

  // Show pivot values as sub-nodes
  const pivot = state.unboundPivot || "patterns";
  if (pivot === "byReferring" || pivot === "byReferenced") {
    const map = pivot === "byReferring" ? an.byReferring : an.byReferenced;
    const entries = [...map.entries()].sort((a, b) => b[1].length - a[1].length);
    addSectionTitle(root, `${pivot === "byReferring" ? "Referring" : "Referenced"} items (${entries.length})`);
    for (const [key, list] of entries) {
      if (q && !key.toLowerCase().includes(q)) continue;
      const el = document.createElement("div");
      el.className = "tree-node" + (state.unboundPivotValue === key ? " selected" : "");
      el.style.paddingLeft = "28px";
      const leaf = key.split(/[\.:\/]/).pop();
      el.innerHTML = `<span class="chevron"></span><span class="kind-icon">·</span><span class="name"></span><span class="count">${list.length.toLocaleString()}</span>`;
      el.querySelector(".name").textContent = leaf;
      el.title = key;
      el.addEventListener("click", () => {
        state.unboundPivotValue = key;
        renderDetail();
      });
      root.appendChild(el);
    }
  }
}

function renderUnboundDetail(body, crumb, classSel, objSearch) {
  classSel.style.display = "none";
  objSearch.style.display = "";
  objSearch.placeholder = "Filter rows…";
  objSearch.value = state.objSearch || "";
  const exportWrap = document.querySelector(".export-wrap");
  if (exportWrap) exportWrap.style.display = "none";

  const arc = getUnboundArchive();
  if (!arc) {
    crumb.textContent = "Drop a .dbexport or an Unbound References .csv to begin.";
    body.innerHTML = `<div class="empty"><div class="big">No archive loaded</div><div class="small">Drop a .dbexport — we'll scan it natively for unbound references. Or drop the SCT-exported "Unbound References" .csv if you already have one.</div></div>`;
    return;
  }
  if (!arc.unbound) {
    renderUnboundScanCTA(body, crumb, arc);
    return;
  }
  const an = getUnboundAnalysis(arc);
  const pivot = state.unboundPivot || "patterns";
  crumb.innerHTML = `<strong>${escapeHtml(arc.name)}</strong> · ${an.rows.length.toLocaleString()} unbound refs`;

  // Patterns view
  if (pivot === "patterns") {
    body.appendChild(renderUnboundPatterns(an));
    return;
  }

  // All view
  if (pivot === "all") {
    let rows = an.rows;
    if (state.objSearch) {
      const q = state.objSearch.toLowerCase();
      rows = rows.filter(r =>
        r["Referring Item"].toLowerCase().includes(q) ||
        r["Referenced Item"].toLowerCase().includes(q) ||
        r["Referring Attribute"].toLowerCase().includes(q) ||
        r["Referenced Attribute"].toLowerCase().includes(q)
      );
    }
    body.appendChild(renderUnboundActionBar(rows, "All rows"));
    body.appendChild(renderUnboundTable(rows));
    return;
  }

  // Pivot-value view (selected referring or referenced item)
  if (!state.unboundPivotValue) {
    body.innerHTML = `<div class="empty"><div class="big">Select a ${pivot === "byReferring" ? "referring" : "referenced"} item from the left</div><div class="small">Or click the "Detected patterns" tab to see the big bulk-fix opportunities.</div></div>`;
    return;
  }
  const map = pivot === "byReferring" ? an.byReferring : an.byReferenced;
  let rows = map.get(state.unboundPivotValue) || [];
  if (state.objSearch) {
    const q = state.objSearch.toLowerCase();
    rows = rows.filter(r =>
      r["Referring Item"].toLowerCase().includes(q) ||
      r["Referenced Item"].toLowerCase().includes(q) ||
      r["Referring Attribute"].toLowerCase().includes(q) ||
      r["Referenced Attribute"].toLowerCase().includes(q)
    );
  }
  body.appendChild(renderUnboundActionBar(rows, state.unboundPivotValue));
  body.appendChild(renderUnboundTable(rows));
}

function renderUnboundScanCTA(body, crumb, arc) {
  crumb.innerHTML = `<strong>${escapeHtml(arc.name)}</strong> · ready to scan`;
  const wrap = document.createElement("div");
  wrap.className = "obj-detail";
  wrap.innerHTML = `
    <h2 style="font-family: var(--sans); word-break: normal;">Scan archive for unbound references</h2>
    <div class="meta"><span>No SCT-exported CSV needed. We walk every XML in the archive (plus the Base64Zip-wrapped logic and graphics payloads), collect every ref-shaped string, and flag any whose target isn't defined in this archive.</span></div>
    <div style="margin-top: 14px;">
      <button class="btn btn-primary" id="runUnboundScan" style="font-size: 14px;">⚡ Scan now</button>
      <span id="scanStatus" style="margin-left: 12px; font-family: var(--sans); color: var(--muted);"></span>
    </div>
    <div class="meta" style="margin-top: 14px;"><span>Typical scan: 5–30 seconds depending on archive size. Large archives with many Programming / Graphics files (Base64Zip blocks) take longer because each gzipped payload is decoded.</span></div>
  `;
  body.appendChild(wrap);

  const btn = wrap.querySelector("#runUnboundScan");
  const status = wrap.querySelector("#scanStatus");
  btn.addEventListener("click", async () => {
    btn.disabled = true;
    btn.textContent = "Scanning…";
    try {
      await analyzeArchiveForUnbound(arc, msg => { status.textContent = msg; });
      // Refresh the view — getUnboundAnalysis will now find arc.unbound.
      renderTree();
      renderDetail();
    } catch (e) {
      console.error(e);
      status.textContent = "Scan failed: " + e.message;
      btn.textContent = "⚡ Scan now";
      btn.disabled = false;
    }
  });
}

function renderUnboundPatterns(an) {
  const wrap = document.createElement("div");
  wrap.className = "obj-detail";

  wrap.innerHTML = `<h2 style="font-family: var(--sans); word-break: normal;">⚡ Detected bulk-fix patterns</h2>
    <div class="meta"><span>Live ADX prefixes detected: <strong>${[...an.liveAdxCount.keys()].join(", ") || "(none)"}</strong></span></div>`;

  const intro = document.createElement("p");
  intro.style.color = "var(--ink-soft)";
  intro.style.maxWidth = "780px";
  intro.style.marginBottom = "20px";
