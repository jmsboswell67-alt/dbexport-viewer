<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Metasys Archive Viewer</title>
<style>
  :root {
    --bg: #FAFAF6;
    --bg-alt: #F2F0E8;
    --bg-card: #FFFFFF;
    --ink: #1E1E1C;
    --ink-soft: #5A584F;
    --ink-dim: #8B8A7E;
    --line: #E4E1D5;
    --line-soft: #EFEDE3;
    --accent: #B57633;
    --accent-soft: #F3E3CC;
    --good: #4E7A40;
    --good-soft: #DCE9D5;
    --bad: #A8453A;
    --bad-soft: #F0D7D3;
    --info: #4A6B8F;
    --info-soft: #DCE5F0;
    --mono: ui-monospace, "Cascadia Mono", "JetBrains Mono", Consolas, monospace;
    --sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    --radius: 8px;
    --shadow: 0 1px 2px rgba(0,0,0,.04), 0 4px 12px rgba(0,0,0,.04);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--ink);
    font-size: 14px;
    line-height: 1.45;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--line);
    background: var(--bg-card);
    display: flex;
    align-items: center;
    gap: 20px;
    flex-shrink: 0;
  }
  header h1 {
    margin: 0;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  header h1 .sub {
    font-weight: 400;
    color: var(--ink-dim);
    margin-left: 6px;
    font-size: 13px;
  }

  .slots { display: flex; gap: 10px; flex: 1; }
  .slot {
    flex: 1;
    max-width: 340px;
    border: 1px dashed var(--line);
    border-radius: var(--radius);
    padding: 8px 12px;
    background: var(--bg-alt);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    transition: all 0.15s ease;
    min-width: 0;
  }
  .slot:hover { border-color: var(--accent); background: var(--accent-soft); }
  .slot.drag { border-color: var(--accent); border-style: solid; background: var(--accent-soft); }
  .slot.loaded { border-style: solid; border-color: var(--line); background: var(--bg-card); }
  .slot .label { color: var(--ink-dim); flex-shrink: 0; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
  .slot .name { font-family: var(--mono); font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0; }
  .slot .count { color: var(--ink-dim); font-size: 12px; flex-shrink: 0; }
  .slot .clear {
    background: transparent;
    border: none;
    color: var(--ink-dim);
    cursor: pointer;
    font-size: 16px;
    padding: 0 4px;
    line-height: 1;
  }
  .slot .clear:hover { color: var(--bad); }
  input[type=file] { display: none; }

  .modes {
    display: flex;
    gap: 4px;
    background: var(--bg-alt);
    padding: 3px;
    border-radius: var(--radius);
  }
  .modes button {
    background: transparent;
    border: none;
    padding: 5px 12px;
    font-size: 13px;
    color: var(--ink-soft);
    cursor: pointer;
    border-radius: 6px;
    font-family: inherit;
  }
  .modes button.active {
    background: var(--bg-card);
    color: var(--ink);
    box-shadow: 0 1px 2px rgba(0,0,0,.06);
  }
  .modes button:disabled { color: var(--ink-dim); cursor: not-allowed; }

  main { display: flex; flex: 1; overflow: hidden; }

  aside.tree {
    width: 320px;
    flex-shrink: 0;
    border-right: 1px solid var(--line);
    background: var(--bg-card);
    overflow-y: auto;
    padding: 12px 0;
  }
  .tree-search {
    padding: 0 16px 12px;
    border-bottom: 1px solid var(--line-soft);
    margin-bottom: 8px;
  }
  .tree-search input {
    width: 100%;
    padding: 7px 10px;
    border: 1px solid var(--line);
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
    background: var(--bg);
    color: var(--ink);
  }
  .tree-search input:focus { outline: none; border-color: var(--accent); }

  .tree-node {
    padding: 4px 12px 4px 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 13px;
    user-select: none;
    border-left: 2px solid transparent;
  }
  .tree-node:hover { background: var(--bg-alt); }
  .tree-node.selected { background: var(--accent-soft); border-left-color: var(--accent); color: var(--ink); }
  .tree-node .chevron {
    width: 12px;
    text-align: center;
    color: var(--ink-dim);
    font-size: 10px;
    flex-shrink: 0;
    user-select: none;
  }
  .tree-node .chevron:hover { color: var(--ink); }
  .tree-node .kind-icon {
    width: 14px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--ink-dim);
    font-size: 11px;
    flex-shrink: 0;
  }
  .tree-node .icon {
    width: 14px; height: 14px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--ink-dim);
    font-size: 10px;
    flex-shrink: 0;
  }
  .tree-node .name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .tree-node .count {
    color: var(--ink-dim);
    font-size: 11px;
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
  }
  .tree-node.engine .name { font-weight: 600; }
  .tree-node.engine .kind-icon { color: var(--accent); }
  .tree-node.category .name { color: var(--ink-soft); font-weight: 500; }
  .tree-section-title {
    padding: 10px 16px 4px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-dim);
  }
  .tree-node.indent-1 { padding-left: 32px; }
  .tree-node.indent-2 { padding-left: 48px; }

  section.detail {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    background: var(--bg);
  }
  .detail-toolbar {
    padding: 10px 20px;
    border-bottom: 1px solid var(--line);
    background: var(--bg-card);
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }
  .detail-toolbar .crumb {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--ink-soft);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
  }
  .detail-toolbar .crumb strong { color: var(--ink); font-weight: 600; }
  .detail-toolbar select, .detail-toolbar input {
    padding: 5px 8px;
    border: 1px solid var(--line);
    border-radius: 6px;
    background: var(--bg);
    font-family: inherit;
    font-size: 12px;
    color: var(--ink);
  }
  .detail-toolbar input { width: 180px; }
  .export-btn {
    padding: 5px 10px;
    border: 1px solid var(--line);
    border-radius: 6px;
    background: var(--bg-card);
    font-family: inherit;
    font-size: 12px;
    color: var(--ink);
    cursor: pointer;
  }
  .export-btn:hover { background: var(--accent-soft); border-color: var(--accent); color: var(--ink); }
  .export-menu {
    position: absolute;
    top: calc(100% + 4px);
    right: 0;
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    z-index: 50;
    min-width: 220px;
    padding: 4px 0;
  }
  .export-menu button {
    display: block;
    width: 100%;
    text-align: left;
    background: transparent;
    border: none;
    padding: 8px 14px;
    font-family: inherit;
    font-size: 13px;
    color: var(--ink);
    cursor: pointer;
  }
  .export-menu button:hover { background: var(--accent-soft); color: var(--ink); }
  .export-scope {
    padding: 8px 14px 6px;
    font-size: 11px;
    color: var(--ink-dim);
    border-bottom: 1px solid var(--line-soft);
    margin-bottom: 4px;
    word-break: break-all;
  }
  .export-scope strong { color: var(--ink-soft); }

  .detail-body { flex: 1; overflow-y: auto; }

  .empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--ink-dim);
    text-align: center;
    padding: 20px;
  }
  .empty .big { font-size: 18px; margin-bottom: 8px; color: var(--ink-soft); }
  .empty .small { font-size: 13px; max-width: 460px; }

  /* Object table */
  table.objs {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  table.objs th {
    text-align: left;
    padding: 8px 16px;
    background: var(--bg-card);
    border-bottom: 1px solid var(--line);
    font-weight: 600;
    color: var(--ink-soft);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    position: sticky;
    top: 0;
    z-index: 1;
  }
  table.objs td {
    padding: 6px 16px;
    border-bottom: 1px solid var(--line-soft);
    vertical-align: top;
  }
  table.objs tr:hover td { background: var(--bg-alt); cursor: pointer; }
  table.objs .ref { font-family: var(--mono); font-size: 12px; }
  table.objs .ref .leaf { color: var(--ink); font-weight: 500; }
  table.objs .ref .path { color: var(--ink-dim); }
  table.objs .cid {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-soft);
    white-space: nowrap;
  }
  table.objs .cid .name { color: var(--ink); }
  table.objs tr.added td { background: var(--good-soft); }
  table.objs tr.removed td { background: var(--bad-soft); }
  table.objs tr.changed td { background: var(--info-soft); }
  table.objs .diffbadge {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 2px 6px;
    border-radius: 3px;
    margin-right: 6px;
  }
  .diffbadge.added { background: var(--good); color: white; }
  .diffbadge.removed { background: var(--bad); color: white; }
  .diffbadge.changed { background: var(--info); color: white; }

  /* Object detail */
  .obj-detail { padding: 20px; }
  .obj-detail h2 {
    margin: 0 0 4px;
    font-size: 18px;
    font-weight: 600;
    word-break: break-all;
    font-family: var(--mono);
  }
  .obj-detail .meta {
    display: flex;
    gap: 16px;
    margin-bottom: 20px;
    font-size: 12px;
    color: var(--ink-soft);
    flex-wrap: wrap;
  }
  .obj-detail .meta span strong {
    color: var(--ink);
    font-weight: 600;
    margin-left: 4px;
  }
  .obj-detail .props {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .obj-detail .prop {
    display: grid;
    grid-template-columns: 220px 1fr;
    border-bottom: 1px solid var(--line-soft);
    padding: 8px 16px;
    font-size: 13px;
  }
  .obj-detail .prop:last-child { border-bottom: none; }
  .obj-detail .prop .pname {
    color: var(--ink-soft);
    font-weight: 500;
  }
  .obj-detail .prop .pid {
    color: var(--ink-dim);
    font-family: var(--mono);
    font-size: 11px;
    margin-left: 6px;
  }
  .obj-detail .prop .pval {
    font-family: var(--mono);
    font-size: 12px;
    word-break: break-all;
    white-space: pre-wrap;
    color: var(--ink);
  }
  .obj-detail .prop.diff-changed { background: var(--info-soft); }
  .obj-detail .prop.empty .pval { color: var(--ink-dim); font-style: italic; }
  .obj-detail .prop.unnamed .pname { color: var(--ink-dim); }
  .obj-detail .prop.unnamed .pname .pid { color: var(--ink-dim); }
  .obj-detail details.unnamed-group {
    border-top: 1px dashed var(--line);
    padding: 8px 16px;
    background: var(--bg-alt);
  }
  .obj-detail details.unnamed-group summary {
    cursor: pointer;
    font-size: 12px;
    color: var(--ink-soft);
    user-select: none;
  }
  .obj-detail details.unnamed-group summary:hover { color: var(--ink); }
  .obj-detail details.unnamed-group[open] summary {
    margin-bottom: 8px;
    font-weight: 600;
    color: var(--ink);
  }
  .controller-card {
    margin: 0 20px 20px;
    padding: 16px 20px;
    border: 1px solid var(--accent);
    background: linear-gradient(0deg, var(--accent-soft) 0%, var(--bg-card) 100%);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
  }
  .controller-card .cc-header {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent);
    font-weight: 700;
    margin-bottom: 6px;
  }
  .controller-card .cc-title {
    font-size: 18px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 14px;
    word-break: break-word;
  }
  .controller-card .cc-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 14px 24px;
  }
  .controller-card .cc-grid .cc-cell {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .controller-card .cc-grid .cc-cell.full { grid-column: 1 / -1; }
  .controller-card .cc-grid .cc-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--ink-soft);
    font-weight: 600;
  }
  .controller-card .cc-grid .cc-value {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--ink);
    word-break: break-word;
  }
  .obj-detail .prop .pval.old {
    color: var(--bad);
    text-decoration: line-through;
    text-decoration-color: var(--bad);
    margin-bottom: 4px;
  }
  .obj-detail .prop .pval.new { color: var(--good); }

  /* Diff summary */
  .diff-summary {
    padding: 16px 20px;
    border-bottom: 1px solid var(--line);
    background: var(--bg-card);
    display: flex;
    gap: 12px;
  }
  .diff-pill {
    padding: 6px 12px;
    border-radius: 100px;
    font-size: 12px;
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .diff-pill .num { font-weight: 700; font-variant-numeric: tabular-nums; }
  .diff-pill.added { background: var(--good-soft); color: var(--good); }
  .diff-pill.removed { background: var(--bad-soft); color: var(--bad); }
  .diff-pill.changed { background: var(--info-soft); color: var(--info); }
  .diff-pill.same { background: var(--bg-alt); color: var(--ink-soft); }

  /* Drag overlay */
  .drop-overlay {
    position: fixed;
    inset: 0;
    background: rgba(181, 118, 51, 0.10);
    border: 4px dashed var(--accent);
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .drop-overlay.active { display: flex; }
  .drop-overlay .msg {
    background: var(--bg-card);
    padding: 20px 32px;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    font-size: 16px;
    font-weight: 500;
  }

  /* Loading */
  .loading {
    padding: 40px;
    text-align: center;
    color: var(--ink-dim);
  }
  .loading::after {
    content: '';
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid var(--line);
    border-top-color: var(--accent);
    border-radius: 50%;
    margin-left: 8px;
    vertical-align: middle;
    animation: spin 0.6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  footer {
    padding: 6px 20px;
    background: var(--bg-card);
    border-top: 1px solid var(--line);
    font-size: 11px;
    color: var(--ink-dim);
    flex-shrink: 0;
    display: flex;
    justify-content: space-between;
  }
</style>
</head>
<body>

<header>
  <h1>Metasys Archive Viewer <span class="sub">.dbexport</span></h1>
  <div class="slots">
    <label class="slot" id="slot-0">
      <span class="label">A</span>
      <span class="name" data-empty>drop a .dbexport here</span>
      <span class="count"></span>
      <button class="clear" type="button" style="display:none">×</button>
      <input type="file" accept=".dbexport,.caf,.zip,.csv">
    </label>
    <label class="slot" id="slot-1">
      <span class="label">B</span>
      <span class="name" data-empty>(optional, for diff)</span>
      <span class="count"></span>
      <button class="clear" type="button" style="display:none">×</button>
      <input type="file" accept=".dbexport,.caf,.zip,.csv">
    </label>
  </div>
  <div class="modes">
    <button data-mode="browse" class="active">Browse</button>
    <button data-mode="diff" disabled>Diff</button>
    <button data-mode="unbound" disabled>Unbound Refs</button>
    <button data-mode="audit" disabled>Audit</button>
    <button data-mode="graphics" disabled>Graphics</button>
    <button data-mode="logic" disabled>Logic</button>
  </div>
</header>

<main>
  <aside class="tree">
    <div class="tree-search">
      <input type="text" id="treeSearch" placeholder="Filter devices…">
    </div>
    <div id="treeRoot"></div>
  </aside>
  <section class="detail">
    <div class="detail-toolbar">
      <div class="crumb" id="crumb">Drop a Metasys <code>.dbexport</code> file to begin.</div>
      <select id="classFilter" style="display:none">
        <option value="">All classes</option>
      </select>
      <input type="text" id="objSearch" placeholder="Filter objects…" style="display:none">
      <div class="export-wrap" style="display:none; position: relative;">
        <button id="exportBtn" type="button" class="export-btn">Export ▾</button>
        <div id="exportMenu" class="export-menu" style="display:none">
          <div class="export-scope" id="exportScope"></div>
          <button data-fmt="csv-points" type="button">Points only — CSV</button>
          <button data-fmt="csv-all" type="button">All objects — CSV</button>
          <button data-fmt="csv-schedules" type="button">Schedules — CSV</button>
          <button data-fmt="csv-trends" type="button">Trend logs — CSV</button>
          <button data-fmt="csv-vendor-neutral" type="button">Vendor-neutral point list — CSV</button>
          <button data-fmt="json" type="button">Full data — JSON</button>
          <button data-fmt="as-built" type="button" style="border-top: 1px solid var(--line); font-weight: 600;">📄 As-Built Documentation (HTML→PDF)</button>
        </div>
      </div>
    </div>
    <div class="detail-body" id="detailBody">
      <div class="empty">
        <div class="big">No archive loaded</div>
        <div class="small">Drag a <code>.dbexport</code> file anywhere on this page, or click slot A above. Drop a second file into slot B to enable diff mode.</div>
      </div>
    </div>
  </section>
</main>

<footer>
  <span>All processing happens locally in your browser. No data is uploaded.</span>
  <span id="footerStats"></span>
</footer>

<div class="drop-overlay" id="dropOverlay">
  <div class="msg">Drop file to load</div>
</div>

<script>

// ============ CSV parser (RFC 4180 subset) ============
function parseCsv(text) {
  const rows = [];
  let row = [], field = "", inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], n = text[i + 1];
    if (inQuotes) {
      if (c === '"' && n === '"') { field += '"'; i++; }
      else if (c === '"') { inQuotes = false; }
      else { field += c; }
    } else {
      if (c === '"') inQuotes = true;
      else if (c === ",") { row.push(field); field = ""; }
      else if (c === "\n" || c === "\r") {
        if (field !== "" || row.length) { row.push(field); rows.push(row); row = []; field = ""; }
        if (c === "\r" && n === "\n") i++;
      } else field += c;
    }
  }
  if (field !== "" || row.length) { row.push(field); rows.push(row); }
  return rows;
}

function parseUnboundCsv(text) {
  const raw = parseCsv(text);
  if (!raw.length) return null;
  const header = raw[0];
  // BOM-strip the first cell
  if (header[0]) header[0] = header[0].replace(/^﻿/, "");
  const required = ["Archive", "Reference Type", "Referring Item", "Referring Attribute", "Referenced Item", "Referenced Attribute"];
  if (!required.every(c => header.includes(c))) return null;
  return raw.slice(1)
    .filter(r => r.some(v => v !== ""))
    .map(r => Object.fromEntries(header.map((h, i) => [h, (r[i] || "").trim()])));
}

// ============ Hierarchy builder ============
function parseRef(ref) {
  // ref examples:
  //   .dbexport: "DACC-ADX-02:DACC-NAE35-BCC/FC-1.FEC-3.OA-T"
  //   .dbexport: "DACC-ADX-02:DACC-NAE35-BCC/Schedule.Occupied Schedule"
  //   .dbexport: "DACC-ADX-02:DACC-NAE35-BCC" (the engine itself)
  //   .caf:      "8-1/575_1.556_1019.2_148864" (no ADX prefix)
  //   .caf:      "8-1" (the controller root)
  const colonIdx = ref.indexOf(":");
  let adx = "";
  let after = ref;
  if (colonIdx >= 0) {
    adx = ref.slice(0, colonIdx);
    after = ref.slice(colonIdx + 1);
  }
  const slashIdx = after.indexOf("/");
  if (slashIdx < 0) return { adx, engine: after, segments: [], path: "" };
  const engine = after.slice(0, slashIdx);
  const path = after.slice(slashIdx + 1);
  const segments = path.split(".");
  return { adx, engine, segments, path };
}

function categorizeFirstSegment(seg) {
  // Trunks / buses — keep first under an engine, since they contain the actual
  // equipment + points (the meat). Different JCI sites use different naming.
  //
  // MS/TP / Field Bus variants:
  //   "FC-1", "FC-2"          DACC convention
  //   "FCB"                    older NCE convention
  //   "Field Bus", "Field Bus2", "Field Bus  1"   SIU convention
  if (/^FC-\d+$/.test(seg)) return { label: "Field Bus " + seg, kind: "fieldbus" };
  if (/^FCB$/i.test(seg)) return { label: "Field Bus (FCB)", kind: "fieldbus" };
  if (/^Field\s*Bus/i.test(seg)) return { label: seg, kind: "fieldbus" };
  // N2 trunk variants:
  //   "N2 Trunk 1", "N2 Trunk  1"   DACC convention
  //   "N2-1", "N2-2"                 SIU convention
  if (/^N2(\s|-)/i.test(seg)) return { label: seg, kind: "n2trunk" };
  // BACnet trunk variants:
  //   "BACnet Trunk 001", "BACnet"   various conventions
  if (/^BACnet\s*Trunk/i.test(seg)) return { label: seg, kind: "bacnettrunk" };
  // LON trunk variants:
  if (/^LON\s*Trunk/i.test(seg)) return { label: seg, kind: "lontrunk" };
  // Other identifiable categories
  if (seg === "Programming") return { label: "Programming", kind: "programming" };
  if (seg === "System Programs") return { label: "System Programs", kind: "sysprograms" };
  if (seg === "Schedule") return { label: "Schedules", kind: "schedules" };
  if (seg === "Graphics") return { label: "Graphics", kind: "graphics" };
  if (seg.startsWith("$site")) return { label: "Site Configuration", kind: "site" };
  if (seg.startsWith("$Generic")) return { label: "Generic Archive", kind: "generic" };
  if (seg.startsWith("$Facility")) return { label: seg, kind: "generic" };
  return { label: seg, kind: "category" };
}

function buildHierarchy(arc) {
  const engines = new Map();
  for (const dev of arc.devices) {
    for (const obj of dev.objects) {
      const { engine: engineName, segments } = parseRef(obj.ref);
      if (!engineName) continue;
      let engine = engines.get(engineName);
      if (!engine) {
        engine = {
          label: engineName,
          kind: "engine",
          classid: "",
          obj: null,
          children: new Map(),
          totalCount: 0,
          key: engineName,
        };
        engines.set(engineName, engine);
      }
      if (segments.length === 0) {
        engine.classid = obj.classid;
        engine.obj = obj;
        continue;
      }
      let node = engine;
      let keyPath = engineName;
      for (let i = 0; i < segments.length; i++) {
        const seg = segments[i];
        keyPath = keyPath + "#" + seg;
        if (!node.children.has(seg)) {
          let label = seg;
          let kind = (i === segments.length - 1) ? "point" : "equipment";
          if (i === 0) {
            const cat = categorizeFirstSegment(seg);
            label = cat.label;
            kind = cat.kind;
          }
          node.children.set(seg, {
            label,
            kind,
            classid: "",
            obj: null,
            children: new Map(),
            totalCount: 0,
            key: keyPath,
          });
        }
        node = node.children.get(seg);
        if (i === segments.length - 1) {
          node.classid = obj.classid;
          node.obj = obj;
        }
      }
    }
  }
  for (const [_, engine] of engines) computeCounts(engine);
  return engines;
}

const PRESERVED_KINDS = new Set([
  "engine","fieldbus","n2trunk","bacnettrunk","lontrunk",
  "programming","sysprograms",
  "schedules","graphics","site","generic","category",
]);

// Detect "opaque" segment labels — purely numeric, or "<digits>_<digits>" CCT
// internal IDs. Returns true if the user would benefit from seeing the object's
// Description instead of the raw segment.
function isOpaqueSegment(s) {
  if (!s) return true;
  if (/^\d+$/.test(s)) return true;          // "200015"
  if (/^\d+[_\-.]\d+$/.test(s)) return true;  // "307_2", "8-1", "1.2"
  if (/^\$\d+$/.test(s)) return true;         // "$4687" (CCT logic sub-instance)
  return false;
}

function computeCounts(node) {
  let count = node.obj ? 1 : 0;
  for (const [_, child] of node.children) count += computeCounts(child);
  node.totalCount = count;

  // For .caf files, segments are opaque "<classid>_<objectid>" tokens like
  // "307_2" or "956_4123" — substituting the object's Description gives much
  // better tree readability ("SA Bus", "Discharge Air Temperature").
  //
  // For .dbexport files, segments are already meaningful names like
  // "DACC-NAE35-BCC" or "FC-1.FEC-3.OA-T", and the Description is just
  // supplementary info — swapping it in loses the device name and can collapse
  // distinct items (e.g., two NAEs serving the same building both show as
  // "Mary Miller Center"). Only swap when the segment is OPAQUE.
  if (node.obj && !node._labelFromDescription && isOpaqueSegment(node.label)) {
    const desc = decodeValue(node.obj.properties["28"] || "");
    if (desc && desc.length > 0 && desc !== "(empty)" && desc !== node.label) {
      node._segmentLabel = node.label;
      node.label = desc;
      node._labelFromDescription = true;
    }
  }

  // Preserve segment-categorized kinds (Field Bus, Schedules, etc.).
  // For generic "point"/"equipment" placeholders, re-derive from classid or children.
  if (PRESERVED_KINDS.has(node.kind)) {
    return count;
  }
  if (node.obj) {
    node.kind = deriveSemanticKind(node);
  } else if (node.children.size > 0) {
    node.kind = "equipment";
  }
  return count;
}

function deriveSemanticKind(node) {
  const c = parseInt(node.classid, 10);
  // Engines / supervisors
  // 862 IP_FEC controller-device-root added from tcollins2 dictionary harvest.
  if ([192, 425, 448, 613, 651, 862, 871, 872].includes(c)) return "engine";
  // Controllers / equipment
  // Expanded with the HVAC/control equipment classes tcollins2 contributed:
  // VAV Balancer (631), Dual Duct Endpoint (633), Device Enable Determination (701),
  // Equipment Interlock (702), Capacity Calculation (705), Load Calculator (706),
  // Blocking Protection (707), Pump Selector (708), Chiller Selector (709),
  // Lead Compensator (721), Near Optimal OL Cooling Tower (724), Tower Selector (745),
  // Heat Exchanger Selector (768), SA Bus Device Integration (910), Device/Boiler/
  // Chiller Stagers (916/917/918). These are functional-equipment objects that
  // own logic-block children, so they belong above logic in the tree.
  if ([197, 278, 508, 631, 633, 701, 702, 705, 706, 707, 708, 709,
       721, 724, 745, 768, 910, 916, 917, 918].includes(c)) return "equipment";
  // Schedules
  if ([263, 519].includes(c)) return "schedule";
  // Graphics
  if (c === 344) return "graphic";
  // Trend logs
  if (c === 155 || c === 20) return "trendlog";
  // Alarms
  // 704 Device Alarm Class added from tcollins2 dictionary harvest.
  if ([156, 172, 704].includes(c)) return "alarm";
  // Programming / logic blocks
  // Big expansion from tcollins2 dictionary harvest. The CCT block library
  // lives mostly in the 523-595 range (Input/Output Float/Enum/Boolean Blocks,
  // PID, math, compare, timer, latch, sequencer, etc.) plus scattered higher IDs
  // (612 Box Flow Test, 614 Reliability Merge, 715/716 Override Check,
  // 776 Expression, 779 Fault Manager, 798 Global Sequencer, 880 Moving Avg
  // Filter). Previously these were misclassified as "point" because the
  // catch-all "500 <= c <= 606" rule below grabbed them — that's now narrowed
  // so this range correctly routes to logic.
  if ([146, 336, 337, 338, 342].includes(c)) return "logic";
  if (c >= 523 && c <= 595) return "logic";
  if ([612, 614, 715, 716, 776, 779, 798, 880].includes(c)) return "logic";
  // Logic sub-blocks (the $NNN anchors inside Programming graphs)
  if ([257, 326, 327, 328, 329, 337, 362].includes(c)) return "logic";
  // Folder
  if (c === 176) return "folder";
  // BACnet & FEC point classes
  // Narrowed the 500-606 catch-all to avoid claiming the logic-block range
  // above. Real point/mapper classes are 500-522 (BACnet std mappers),
  // 596-606 (FEC mappers); remote I/O 670-674 (RAI/RAO/RBI/RBO) and 628
  // (Net Sensor AI) added from tcollins2.
  if (c >= 0 && c <= 25) return "point";
  if (c >= 500 && c <= 522) return "point";
  if (c >= 596 && c <= 606) return "point";
  if (c >= 147 && c <= 152) return "point";
  if ([628, 670, 671, 672, 673, 674].includes(c)) return "point";
  // Fallback
  return node.children.size > 0 ? "equipment" : "point";
}

function getHierarchy(arc) {
  if (!arc._hierarchy) arc._hierarchy = buildHierarchy(arc);
  return arc._hierarchy;
}

function findNodeByKey(arc, key) {
  if (!key) return null;
  const hier = getHierarchy(arc);
  const parts = key.split("#");
  let node = hier.get(parts[0]);
  if (!node) return null;
  for (let i = 1; i < parts.length; i++) {
    node = node.children.get(parts[i]);
    if (!node) return null;
  }
  return node;
}

const KIND_ORDER = {
  engine: 0,
  // Trunks/buses contain the actual equipment + points — put them at the top
  // under an engine so the user doesn't have to scroll past 30 system-status
  // objects (alarm rates, CPU usage, BBMD, etc.) to find what they care about.
  fieldbus: 1, n2trunk: 2, bacnettrunk: 3, lontrunk: 4,
  programming: 5, sysprograms: 6,
  schedules: 7, graphics: 8, site: 9, generic: 10,
  folder: 11, category: 12,
  equipment: 13,
  schedule: 14, graphic: 15, logic: 16,
  point: 17, trendlog: 18, alarm: 19,
  other: 20,
};

function nodeAggregateClassCounts(node) {
  const counts = new Map();
  function walk(n) {
    if (n.classid) counts.set(n.classid, (counts.get(n.classid) || 0) + 1);
    for (const [_, c] of n.children) walk(c);
  }
  walk(node);
  return counts;
}

  mode: "browse",
  selectedSlot: 0,
  selectedDevice: null,     // diff-mode device filter
