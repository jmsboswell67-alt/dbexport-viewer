  intro.textContent = "Unbound references usually come from one of three causes: an ADX/engine rename leaving thousands of refs pointing to the old name, a controller deletion leaving orphaned graphics/programs, or a point rename. Below are the dead reference targets ranked by impact. For each, you can export the affected refs as a CSV for batch repointing in SCT — or, when a rename is the obvious fix, click \"Apply to archive\" to download a corrected .dbexport that imports back into SCT directly (same format SCT writes; restore via SCT's Import Archive workflow).";
  wrap.appendChild(intro);

  if (!an.renameSuggestions.length) {
    const note = document.createElement("p");
    note.textContent = "No dead-prefix patterns found — most unbound refs come from individually deleted items rather than a bulk rename.";
    wrap.appendChild(note);
    return wrap;
  }

  // Surface the available archive (for the Apply-to-archive action)
  const target = findArchiveForTransform();
  const archiveBanner = document.createElement("div");
  archiveBanner.style.marginBottom = "16px";
  archiveBanner.style.padding = "10px 14px";
  archiveBanner.style.borderRadius = "var(--radius)";
  archiveBanner.style.fontSize = "12px";
  if (target) {
    archiveBanner.style.background = "var(--good-soft)";
    archiveBanner.style.color = "var(--good)";
    archiveBanner.innerHTML = `<strong>Archive available for transform:</strong> ${escapeHtml(target.arc.name)} (slot ${target.slot === 0 ? "A" : "B"}). Click <em>Apply to archive</em> below to generate a fixed <code>.dbexport</code>.`;
  } else {
    archiveBanner.style.background = "var(--bg-alt)";
    archiveBanner.style.color = "var(--ink-soft)";
    archiveBanner.innerHTML = `<strong>No <code>.dbexport</code> loaded.</strong> Drop the corresponding archive in the other slot to enable <em>Apply to archive</em>. (You can still export the plan CSV.)`;
  }
  wrap.appendChild(archiveBanner);

  const tbl = document.createElement("table");
  tbl.className = "objs";
  tbl.innerHTML = `<thead><tr><th>Dead prefix</th><th>Likely rename target</th><th style="text-align:right;">Refs affected</th><th>Actions</th></tr></thead>`;
  const tbody = document.createElement("tbody");
  // Resolve the live archive once so we can compute the rename-confidence check
  const confidenceArc = target ? target.arc : null;
  for (const s of an.renameSuggestions) {
    const tr = document.createElement("tr");
    const canApply = !!target && !!s.to;
    let pillHtml = "";
    if (s.to && confidenceArc && confidenceArc._validRefs) {
      const c = computeRenameConfidence(confidenceArc, s.from, s.to);
      if (c) {
        const pct = Math.round(c.pct * 100);
        let bg = "var(--bad-soft)", fg = "var(--bad)", icon = "✗", verdict = "likely wrong target";
        if (pct >= 80)      { bg = "var(--good-soft)"; fg = "var(--good)"; icon = "✓"; verdict = "rename hypothesis confirmed"; }
        else if (pct >= 50) { bg = "#fef3c7"; fg = "#92400e"; icon = "⚠"; verdict = "shaky — audit before applying"; }
        const sampleNote = c.totalUnique > c.sampleSize ? ` (sampled ${c.sampleSize.toLocaleString()} of ${c.totalUnique.toLocaleString()})` : "";
        pillHtml = `<div style="margin-top:6px; display:inline-block; padding:3px 8px; border-radius:12px; background:${bg}; color:${fg}; font-size:11px; font-family:var(--sans);" title="${escapeHtml(c.landed.toLocaleString())} of ${escapeHtml(c.sampleSize.toLocaleString())} rewritten refs land on a defined object${sampleNote} — ${escapeHtml(verdict)}">${icon} ${pct}% of refs land on real objects</div>`;
      }
    }
    tr.innerHTML = `
      <td class="ref"><span class="leaf">${escapeHtml(s.from)}:</span></td>
      <td class="ref">
        <span class="leaf">${s.to ? escapeHtml(s.to) + ":" : "<span style=\"color:var(--ink-dim)\">(no clear match — items may have been deleted, not renamed)</span>"}</span>
        ${pillHtml}
      </td>
      <td class="cid" style="text-align:right; font-variant-numeric: tabular-nums;"><strong>${s.count.toLocaleString()}</strong></td>
      <td style="display: flex; gap: 4px; flex-wrap: wrap;">
        <button class="export-btn" data-prefix="${escapeHtml(s.from)}" data-target="${s.to ? escapeHtml(s.to) : ''}" data-action="${s.to ? 'plan' : 'delete'}">${s.to ? 'Export plan CSV' : 'Export delete list'}</button>
        ${canApply ? `<button class="export-btn" style="border-color: var(--accent); color: var(--accent); font-weight: 600;" data-prefix="${escapeHtml(s.from)}" data-target="${escapeHtml(s.to)}" data-action="apply">Apply to archive</button>` : ''}
      </td>
    `;
    tbody.appendChild(tr);
  }
  tbl.appendChild(tbody);
  wrap.appendChild(tbl);

  // Wire up the per-row buttons
  setTimeout(() => {
    wrap.querySelectorAll("button[data-prefix]").forEach(btn => {
      btn.addEventListener("click", async () => {
        const prefix = btn.dataset.prefix;
        const targetPrefix = btn.dataset.target;
        const action = btn.dataset.action;
        const arc = getUnboundArchive();
        const matching = arc.unbound.filter(r => r["Referenced Item"].startsWith(prefix + ":"));

        if (action === "plan") {
          exportRepointPlan(matching, prefix, targetPrefix);
        } else if (action === "delete") {
          exportDeleteList(matching, prefix);
        } else if (action === "apply") {
          const tgt = findArchiveForTransform();
          if (!tgt) { alert("No archive loaded to apply to."); return; }
          if (!confirm(`Apply repoint: replace "${prefix}:" with "${targetPrefix}:" everywhere in ${tgt.arc.name}?\n\nThis generates a new .dbexport file you can review or import.`)) return;
          const origText = btn.textContent;
          btn.textContent = "Generating…";
          btn.disabled = true;
          try {
            const result = await applyRepointToArchive(tgt.arc, prefix, targetPrefix);
            const fname = tgt.arc.name.replace(/\.dbexport$/i, "") + `_repointed_${cleanFilename(prefix)}_to_${cleanFilename(targetPrefix)}.dbexport`;
            downloadBlob(fname, "application/zip", await result.blob.arrayBuffer());
            btn.textContent = `✓ Done — ${result.totalReplacements.toLocaleString()} repls in ${result.filesTouched} files`;
            setTimeout(() => { btn.textContent = origText; btn.disabled = false; }, 6000);
          } catch (e) {
            console.error(e);
            alert("Apply failed: " + e.message);
            btn.textContent = origText;
            btn.disabled = false;
          }
        }
      });
    });
  }, 0);

  return wrap;
}

function renderUnboundActionBar(rows, label) {
  const bar = document.createElement("div");
  bar.className = "diff-summary";
  bar.style.justifyContent = "space-between";
  bar.style.alignItems = "center";
  // How many unique referring items in the current view are selected? Only those
  // visible-in-view counts shape the "delete selected" button — selections from
  // a prior filter that aren't visible right now are tracked but don't bloat the UI.
  const visibleReferring = new Set(rows.map(r => r["Referring Item"]));
  const selectedInView = [...state.unboundSelected].filter(r => visibleReferring.has(r));
  const hasSelected = selectedInView.length > 0;
  bar.innerHTML = `
    <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
      <span class="diff-pill same"><span class="num">${rows.length.toLocaleString()}</span> rows in view</span>
      <span style="font-size: 12px; color: var(--ink-soft); font-family: var(--mono);">${escapeHtml(label)}</span>
      ${hasSelected ? `<span class="diff-pill" style="background: var(--accent-soft); color: var(--accent);"><span class="num">${selectedInView.length.toLocaleString()}</span> item${selectedInView.length === 1 ? "" : "s"} selected</span>
        <button class="export-btn" id="clearSelected" style="font-size:11px; padding:2px 8px;">Clear selection</button>` : ''}
    </div>
    <div style="display: flex; gap: 6px; flex-wrap: wrap;">
      <button class="export-btn" id="dlFiltered">Download filtered (CSV)</button>
      <button class="export-btn" id="dlDeleteList">Download delete list (CSV)</button>
      ${hasSelected
        ? `<button class="export-btn" id="applyDeleteSelected" style="border-color: var(--accent); color: var(--accent); font-weight: 600;">Apply delete to selected (${selectedInView.length}) (.dbexport)</button>`
        : `<button class="export-btn" id="applyDelete" style="border-color: var(--accent); color: var(--accent); font-weight: 600;">Apply delete to archive (.dbexport)</button>`}
    </div>
  `;
  setTimeout(() => {
    bar.querySelector("#dlFiltered")?.addEventListener("click", () => exportUnboundFiltered(rows));
    bar.querySelector("#dlDeleteList")?.addEventListener("click", () => exportDeleteList(rows, "filtered"));
    bar.querySelector("#applyDelete")?.addEventListener("click", () => exportAppliedDeleteArchive(rows, label));
    bar.querySelector("#applyDeleteSelected")?.addEventListener("click", () => {
      // Build synthetic rows from the selection (only the items still visible
      // in the current view get acted on, so filter+select pairs are predictable)
      const synth = selectedInView.map(item => ({ "Referring Item": item }));
      exportAppliedDeleteArchive(synth, `selected_${selectedInView.length}`);
    });
    bar.querySelector("#clearSelected")?.addEventListener("click", () => {
      state.unboundSelected.clear();
      renderDetail();
    });
  }, 0);
  return bar;
}

function renderUnboundTable(rows) {
  const wrap = document.createElement("div");
  const capped = rows.slice(0, 2000);
  if (rows.length > capped.length) {
    const note = document.createElement("div");
    note.style.padding = "8px 16px";
    note.style.fontSize = "12px";
    note.style.color = "var(--ink-dim)";
    note.style.background = "var(--bg-alt)";
    note.style.borderBottom = "1px solid var(--line)";
    note.textContent = `Showing first ${capped.length.toLocaleString()} of ${rows.length.toLocaleString()}. Filter to narrow. Exports include the full set.`;
    wrap.appendChild(note);
  }
  // Per-row delete is only meaningful when the row's source is a standalone
  // file. Archive.xml-sourced rows would need surgical XML editing and are
  // flagged as SCT-manual instead, and their checkboxes are disabled.
  const isFileLevel = (src) => src && !/(^|[\\/])archive\.xml$/i.test(src);

  // The header checkbox acts on every file-level referring item in the
  // current filter — not just the capped 2,000 visible rows. With archives
  // where one item (like $site.UserTrees.DACC) accounts for thousands of
  // rows, the cap can be dominated by just a few items, so "select all in
  // view" feels broken if it's tied to the cap.
  const eligibleInView = new Set();
  for (const r of rows) {
    if (isFileLevel(r._source)) eligibleInView.add(r["Referring Item"]);
  }
  const allEligibleSelected = eligibleInView.size > 0 &&
    [...eligibleInView].every(item => state.unboundSelected.has(item));

  const tbl = document.createElement("table");
  tbl.className = "objs";
  tbl.innerHTML = `<thead><tr>
    <th style="width:28px; text-align:center;"><input type="checkbox" id="hdrSelect" ${allEligibleSelected ? "checked" : ""} title="Select all ${eligibleInView.size.toLocaleString()} file-level items matching the current filter"></th>
    <th>Type</th>
    <th>Referring Item · Attribute</th>
    <th>Referenced (dead) Item · Attribute</th>
  </tr></thead>`;
  const tbody = document.createElement("tbody");
  for (const r of capped) {
    const tr = document.createElement("tr");
    const fileLevel = isFileLevel(r._source);
    const isSelected = state.unboundSelected.has(r["Referring Item"]);
    if (isSelected) tr.style.background = "var(--accent-soft)";
    const referringLeaf = r["Referring Item"].split(/[\.:\/]/).pop();
    const referencedLeaf = r["Referenced Item"].split(/[\.:\/]/).pop();
    const sourceLine = r._source
      ? `<div style="font-size:10px; color:var(--ink-dim); font-family: var(--mono);">source: ${escapeHtml(r._source)}</div>`
      : "";
    const deleteBtn = fileLevel
      ? `<button class="export-btn row-delete" data-referring="${escapeHtml(r["Referring Item"])}" style="margin-top:4px; font-size:11px; padding:2px 8px;">🗑 Delete this item from archive</button>`
      : (r._source ? `<div style="font-size:10px; color:var(--ink-dim); margin-top:4px; font-style: italic;">object-level — delete in SCT manually</div>` : "");
    const checkboxCell = fileLevel
      ? `<input type="checkbox" class="row-select" data-referring="${escapeHtml(r["Referring Item"])}" ${isSelected ? "checked" : ""}>`
      : `<input type="checkbox" disabled title="Object-level item — must be deleted in SCT manually">`;
    tr.innerHTML = `
      <td style="text-align:center;">${checkboxCell}</td>
      <td class="cid">${escapeHtml(r["Reference Type"])}</td>
      <td class="ref">
        <div class="leaf">${escapeHtml(referringLeaf)}</div>
        <div class="path" style="font-size:11px;">${escapeHtml(r["Referring Item"])}</div>
        <div style="font-size:11px; color:var(--ink-soft);">attr: <strong>${escapeHtml(r["Referring Attribute"])}</strong></div>
        ${sourceLine}
        ${deleteBtn}
      </td>
      <td class="ref">
        <div class="leaf" style="color: var(--bad);">${escapeHtml(referencedLeaf)}</div>
        <div class="path" style="font-size:11px;">${escapeHtml(r["Referenced Item"])}</div>
        <div style="font-size:11px; color:var(--ink-soft);">attr: <strong>${escapeHtml(r["Referenced Attribute"])}</strong></div>
      </td>
    `;
    tbody.appendChild(tr);
  }
  setTimeout(() => {
    wrap.querySelectorAll("button.row-delete").forEach(btn => {
      btn.addEventListener("click", () => {
        const referring = btn.dataset.referring;
        exportAppliedDeleteArchive([{ "Referring Item": referring }], "single_" + (referring.split(/[\.:\/]/).pop() || "item"));
      });
    });
    wrap.querySelectorAll("input.row-select").forEach(cb => {
      cb.addEventListener("change", () => {
        const item = cb.dataset.referring;
        if (cb.checked) state.unboundSelected.add(item);
        else state.unboundSelected.delete(item);
        // Sync siblings (other rows for the same item visible in this view)
        // and the row highlight, without a full re-render
        wrap.querySelectorAll(`input.row-select[data-referring="${CSS.escape(item)}"]`).forEach(other => {
          other.checked = cb.checked;
          const row = other.closest("tr");
          if (row) row.style.background = cb.checked ? "var(--accent-soft)" : "";
        });
        // Refresh the action bar so the count + button label update
        const oldBar = document.querySelector(".diff-summary");
        if (oldBar?.nextElementSibling === wrap || oldBar?.parentElement?.contains(wrap)) {
          renderDetail();
        }
      });
    });
    wrap.querySelector("#hdrSelect")?.addEventListener("change", (e) => {
      const turnOn = e.target.checked;
      for (const item of eligibleInView) {
        if (turnOn) state.unboundSelected.add(item);
        else state.unboundSelected.delete(item);
      }
      renderDetail();
    });
  }, 0);
  tbl.appendChild(tbody);
  wrap.appendChild(tbl);
  return wrap;
}

// === Export helpers ===
function csvRow(cells) {
  return cells.map(c => {
    const s = String(c == null ? "" : c);
    return /[",\n\r]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
  }).join(",");
}

function exportUnboundFiltered(rows) {
  if (!rows.length) return;
  const header = ["Archive", "Reference Type", "Referring Item", "Referring Attribute", "Referenced Item", "Referenced Attribute"];
  const csv = [csvRow(header), ...rows.map(r => csvRow(header.map(h => r[h])))].join("\n") + "\n";
  downloadBlob(`unbound_filtered_${rows.length}.csv`, "text/csv;charset=utf-8", csv);
}

// Remove a set of Referring Items from a copy of the archive zip and return
// the new blob. File-level items (graphics, programs, user trees) are removed
// by deleting their XML file from the zip. Object-level items (refs whose
// source is a device's archive.xml) are skipped — surgically editing an
// archive.xml to remove one <object> while preserving its other thousands of
// objects is risky and is better done in SCT. The skipped list is returned
// so the UI can tell the tech which still need manual SCT deletion.
async function applyDeletesToArchive(arc, itemsToDelete) {
  if (!arc._zip) throw new Error("Archive not loaded as ZIP — cannot delete.");
  if (!arc.unbound) throw new Error("Run a scan first so we know where each item lives in the zip.");

  // Map: Referring Item -> first observed source file path (all rows of one item share the same source file)
  const referringToSource = new Map();
  for (const r of arc.unbound) {
    if (r._source && !referringToSource.has(r["Referring Item"])) {
      referringToSource.set(r["Referring Item"], r._source);
    }
  }

  const fileDeletions = new Set();
  const skippedObjects = [];
  const notFound = [];
  for (const item of itemsToDelete) {
    const src = referringToSource.get(item);
    if (!src) { notFound.push(item); continue; }
    if (/(^|[\\/])archive\.xml$/i.test(src)) {
      skippedObjects.push({ item, source: src });
      continue;
    }
    fileDeletions.add(src);
  }

  if (fileDeletions.size === 0) {
    return { blob: null, deletedFiles: [], skippedObjects, notFound };
  }

  const buf = await arc._zip.generateAsync({ type: "uint8array" });
  const zip = await JSZip.loadAsync(buf);
  for (const path of fileDeletions) {
    // Try the path as-stored first, then with normalized separators as a fallback.
    zip.remove(path);
    zip.remove(path.replace(/\\/g, "/"));
    zip.remove(path.replace(/\//g, "\\"));
  }
  const blob = await zip.generateAsync({ type: "blob", compression: "DEFLATE", compressionOptions: { level: 6 } });
  return { blob, deletedFiles: [...fileDeletions], skippedObjects, notFound };
}

// User-facing wrapper that confirms, runs the delete, downloads the result,
// and reports skipped object-level items so the tech knows what still needs
// to be cleaned up manually in SCT.
async function exportAppliedDeleteArchive(rows, label) {
  const items = [...new Set(rows.map(r => r["Referring Item"]))];
  if (!items.length) return;

  const tgt = findArchiveForTransform();
  if (!tgt) { alert("No source archive loaded — drop a .dbexport into slot A or B first."); return; }

  // Pre-classify so we can show an accurate breakdown in the confirm dialog
  const referringToSource = new Map();
  for (const r of tgt.arc.unbound || []) {
    if (r._source && !referringToSource.has(r["Referring Item"])) {
      referringToSource.set(r["Referring Item"], r._source);
    }
  }
  let fileCount = 0, objectCount = 0, notFoundCount = 0;
  for (const item of items) {
    const src = referringToSource.get(item);
    if (!src) { notFoundCount++; continue; }
    if (/(^|[\\/])archive\.xml$/i.test(src)) objectCount++;
    else fileCount++;
  }
  const cat = categorizeReferringItems(items);
  const catLines = [];
  if (cat.userTrees)   catLines.push(`  • ${cat.userTrees} user tree${cat.userTrees === 1 ? "" : "s"}`);
  if (cat.graphics)    catLines.push(`  • ${cat.graphics} graphics`);
  if (cat.programming) catLines.push(`  • ${cat.programming} programming logic block${cat.programming === 1 ? "" : "s"}`);
  if (cat.sysPrograms) catLines.push(`  • ${cat.sysPrograms} system program${cat.sysPrograms === 1 ? "" : "s"}`);
  if (cat.schedules)   catLines.push(`  • ${cat.schedules} schedule${cat.schedules === 1 ? "" : "s"}`);
  if (cat.other)       catLines.push(`  • ${cat.other} other`);

  const lines = [
    `Apply delete to archive — produce a new .dbexport with ${items.length.toLocaleString()} item${items.length === 1 ? "" : "s"} removed from ${tgt.arc.name}.`,
    "",
    "What would be deleted:",
    ...catLines,
    "",
    "Outcome:",
    `  • ${fileCount} file-level item${fileCount === 1 ? "" : "s"} (graphics / programs / user trees) — removed from the zip`,
  ];
  if (objectCount) lines.push(`  • ${objectCount} object-level item${objectCount === 1 ? "" : "s"} (inside a device's archive.xml) — SKIPPED, must be deleted in SCT manually after import`);
  if (notFoundCount) lines.push(`  • ${notFoundCount} item${notFoundCount === 1 ? "" : "s"} not located in scan results — SKIPPED`);
  lines.push("", "Output is a new .dbexport you can review or import via SCT's Restore Archive.", "", "Continue?");

  if (!confirm(lines.join("\n"))) return;

  try {
    const result = await applyDeletesToArchive(tgt.arc, items);
    if (!result.blob) {
      alert(`No file-level items were deleted. ${result.skippedObjects.length} object-level item${result.skippedObjects.length === 1 ? "" : "s"} would need manual SCT deletion.`);
      return;
    }
    const fname = tgt.arc.name.replace(/\.dbexport$/i, "") + `_deleted_${cleanFilename(label)}_${result.deletedFiles.length}.dbexport`;
    downloadBlob(fname, "application/zip", await result.blob.arrayBuffer());

    let summary = `✓ Removed ${result.deletedFiles.length} file${result.deletedFiles.length === 1 ? "" : "s"} from ${tgt.arc.name}.\nDownloaded: ${fname}`;
    if (result.skippedObjects.length) {
      const sample = result.skippedObjects.slice(0, 8).map(s => "  • " + s.item).join("\n");
      const more = result.skippedObjects.length > 8 ? `\n  • …and ${result.skippedObjects.length - 8} more` : "";
      summary += `\n\nSkipped ${result.skippedObjects.length} object-level item${result.skippedObjects.length === 1 ? "" : "s"} (need manual SCT delete):\n${sample}${more}`;
    }
    alert(summary);
  } catch (e) {
    console.error(e);
    alert("Apply delete failed: " + e.message);
  }
}

function categorizeReferringItems(items) {
  const b = { userTrees: 0, graphics: 0, programming: 0, schedules: 0, sysPrograms: 0, other: 0 };
  for (const item of items) {
    // Strip the "<ADX>:<engine>/" prefix to inspect the category segment
    const slashIdx = item.indexOf("/");
    const tail = slashIdx >= 0 ? item.slice(slashIdx + 1) : item;
    if (tail.startsWith("$site.UserTrees")) b.userTrees++;
    else if (tail.startsWith("Graphics.")) b.graphics++;
    else if (tail.startsWith("Programming.")) b.programming++;
    else if (tail.startsWith("System Programs.")) b.sysPrograms++;
    else if (tail.startsWith("Schedule")) b.schedules++;
    else b.other++;
  }
  return b;
}

function exportDeleteList(rows, label) {
  // Output one row per UNIQUE Referring Item — the items the user would delete in SCT
  const items = [...new Set(rows.map(r => r["Referring Item"]))];
  if (!items.length) return;
  const b = categorizeReferringItems(items);
  const breakdown = [];
  if (b.userTrees)   breakdown.push(`  • ${b.userTrees} user tree${b.userTrees === 1 ? "" : "s"} (custom navigation)`);
  if (b.graphics)    breakdown.push(`  • ${b.graphics} graphics`);
  if (b.programming) breakdown.push(`  • ${b.programming} programming logic block${b.programming === 1 ? "" : "s"}`);
  if (b.sysPrograms) breakdown.push(`  • ${b.sysPrograms} system program${b.sysPrograms === 1 ? "" : "s"}`);
  if (b.schedules)   breakdown.push(`  • ${b.schedules} schedule${b.schedules === 1 ? "" : "s"}`);
  if (b.other)       breakdown.push(`  • ${b.other} other`);

  const msg = [
    `Delete list export — ${items.length.toLocaleString()} unique item${items.length === 1 ? "" : "s"} will be written to CSV.`,
    "",
    "Breakdown of what would be deleted in SCT:",
    ...breakdown,
    "",
    "Importing this list into SCT for a bulk-delete REMOVES these items from your archive — graphics, programs, and user trees disappear entirely, not just the broken refs inside them.",
    "",
    "If the unbound refs come from an ADX rename (e.g. DACC-ADX-01 → DACC-ADX-02), use \"Apply to archive\" instead — it repoints every broken ref while keeping every item intact.",
    "",
    "Continue with the delete list export?",
  ].join("\n");
  if (!confirm(msg)) return;

  const csv = [csvRow(["Item to delete"]), ...items.map(i => csvRow([i]))].join("\n") + "\n";
  downloadBlob(`delete_list_${cleanFilename(label)}_${items.length}.csv`, "text/csv;charset=utf-8", csv);
}

// Locate an archive (not unbound) that we can apply a transform to
function findArchiveForTransform() {
  for (const slot of [0, 1]) {
    const a = state.archives[slot];
    if (a && a.kind !== "unbound" && a._zip) return { arc: a, slot };
  }
  return null;
}

function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"); }

// Gzip helpers using native browser streams
async function gunzipText(b64) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  const stream = new Response(new Blob([bytes])).body.pipeThrough(new DecompressionStream("gzip"));
  const buf = await new Response(stream).arrayBuffer();
  return new TextDecoder("utf-8").decode(buf);
}

async function gzipTextToBase64(text) {
  const bytes = new TextEncoder().encode(text);
  const stream = new Response(new Blob([bytes])).body.pipeThrough(new CompressionStream("gzip"));
  const buf = new Uint8Array(await new Response(stream).arrayBuffer());
  // Convert to base64 in chunks to avoid stack-size issues on large payloads
  let bin = "";
  const chunkSize = 0x8000;
  for (let i = 0; i < buf.length; i += chunkSize) {
    bin += String.fromCharCode.apply(null, buf.subarray(i, i + chunkSize));
  }
  return btoa(bin);
}

// Walks <Base64Zip>…</Base64Zip> blocks in an XML file: decodes, runs the
// substitution on the decoded text, re-encodes. Returns {text, replacements}.
async function processBase64ZipBlocks(text, fromRe, replacement) {
  const re = /<Base64Zip([^>]*)>([\s\S]*?)<\/Base64Zip>/g;
  let out = "", lastIdx = 0, totalRepls = 0;
  let m;
  while ((m = re.exec(text)) !== null) {
    out += text.slice(lastIdx, m.index);
    const attrs = m[1];
    const b64 = m[2].trim();
    try {
      const inner = await gunzipText(b64);
      const innerRe = new RegExp(fromRe.source, fromRe.flags);
      const matches = inner.match(innerRe);
      if (matches && matches.length > 0) {
        innerRe.lastIndex = 0;
        const newInner = inner.replace(innerRe, replacement);
        const newB64 = await gzipTextToBase64(newInner);
        out += `<Base64Zip${attrs}>${newB64}</Base64Zip>`;
        totalRepls += matches.length;
      } else {
        out += m[0];
      }
    } catch (e) {
      // Couldn't decode — keep original
      out += m[0];
    }
    lastIdx = m.index + m[0].length;
  }
  out += text.slice(lastIdx);
  return { text: out, replacements: totalRepls };
}

async function applyRepointToArchive(arc, fromPrefix, toPrefix) {
  if (!arc._zip) throw new Error("Original archive zip not preserved — cannot rewrite.");
  const buf = await arc._zip.generateAsync({ type: "uint8array" });
  const zip = await JSZip.loadAsync(buf);
  const fromRe = new RegExp(escapeRegex(fromPrefix) + ":", "g");
  const replacement = toPrefix + ":";
  const targets = [];
  zip.forEach((path, entry) => {
    if (!entry.dir && /\.xml$/i.test(path)) targets.push(path);
  });

  let totalReplacements = 0;
  let filesTouched = 0;

  for (const path of targets) {
    const entry = zip.file(path);
    if (!entry) continue;
    let text = await entry.async("string");
    let fileRepls = 0;
    const original = text;

    // Direct text substitution in the outer XML
    if (text.includes(fromPrefix + ":")) {
      const matches = text.match(fromRe);
      text = text.replace(fromRe, replacement);
      if (matches) fileRepls += matches.length;
    }

    // Substitution inside Base64Zip-wrapped content
    if (text.includes("<Base64Zip")) {
      const r = await processBase64ZipBlocks(text, fromRe, replacement);
      text = r.text;
      fileRepls += r.replacements;
    }

    if (text !== original) {
      zip.file(path, text);
      filesTouched++;
      totalReplacements += fileRepls;
    }
  }

  const blob = await zip.generateAsync({ type: "blob", compression: "DEFLATE", compressionOptions: { level: 6 } });
  return { blob, totalReplacements, filesTouched };
}

// ============ Native unbound-ref scanner ============
// Walks every XML in arc._zip (plus Base64Zip-wrapped payloads) and collects
// every ref-shaped substring whose target isn't in the archive's defined ref
// set. Output rows match the SCT "Unbound References" CSV shape so the
// existing analyzer + Apply-to-archive pipeline works without changes.
//
// Pragmatics:
// - We attribute refs found in archive.xml per-object/per-property (best fidelity).
// - For other XMLs ($site.UserTrees, security, userdictionary, Programming, ...),
//   we synthesize a Referring Item from the filename stem.
// - We dedupe at (referring, attr, referenced) so we don't double-count when
//   the same ref appears many times in one property payload.
// - The match regex is conservative: it allows the chars Metasys actually uses
//   in real refs and stops at XML/attribute boundaries. Some pathological cases
//   (two refs jammed together with no separator) may over-consume by a word;
//   those still surface in the right ADX-prefix pattern bucket, so the
//   bulk-fix UX is unaffected.
// ADX/Engine: no spaces (real Metasys hostnames don't contain them — DACC-NAE35-BCC, etc).
// Path: spaces allowed because real path segments do (e.g. "Programming.OAT SHARE", "N2 Trunk 1.CT-AHU-4 FEC-17").
const REF_MATCH_RE = /([A-Za-z0-9][A-Za-z0-9_\-]{0,79}):([A-Za-z0-9][A-Za-z0-9_\-]{0,79})\/([A-Za-z0-9_\-.$ ()]{1,500})/g;

async function analyzeArchiveForUnbound(arc, onProgress) {
  if (!arc._zip) throw new Error("Archive not loaded as ZIP — cannot scan.");
  if (arc._derivedUnboundRows) return arc._derivedUnboundRows;

  // 1) Build:
  //   - validRefs: the universe of defined refs (anything an object actually defines)
  //   - definedADXes: set of ADX-portion names (the part before the first colon
  //     in any object's ref). In Metasys, a site's ADX name often appears as
  //     BOTH the ADX prefix AND a self-engine (e.g. DACC-ADX-02:DACC-ADX-02/...)
  //     so the engine name is not a reliable "this is just an engine" signal.
  //   - definedEngines: set of engine-portion names (between the colon and slash).
  //   - folderToDeviceCtx: maps each device's zip folder to its "<ADX>:<engine>"
  //     prefix, so we can synthesize sensible Referring Items for non-archive.xml files
  const validRefs = new Set();
  const definedADXes = new Set();
  const definedEngines = new Set();
  const folderToDeviceCtx = new Map();
  for (const dev of arc.devices) {
    let ctx = null;
    for (const obj of dev.objects) {
      if (!obj.ref) continue;
      validRefs.add(obj.ref);
      const colonIdx = obj.ref.indexOf(":");
      if (colonIdx < 0) continue;
      const slashIdx = obj.ref.indexOf("/", colonIdx + 1);
      const adx = obj.ref.slice(0, colonIdx);
      const engine = slashIdx >= 0 ? obj.ref.slice(colonIdx + 1, slashIdx) : obj.ref.slice(colonIdx + 1);
      definedADXes.add(adx);
      if (engine) definedEngines.add(engine);
      if (!ctx) ctx = adx + ":" + engine;
    }
    if (ctx && dev.folder) {
      folderToDeviceCtx.set(dev.folder, ctx);
      folderToDeviceCtx.set(dev.folder.replace(/\\/g, "/"), ctx);
    }
  }

  const seen = new Set();
  const rows = [];
  // Reverse-lookup index: every ref-shaped string we see (bound or unbound)
  // maps to a list of places it's used. Powers "Referenced by (N)" in the
  // Browse-mode object detail.
  const refIndex = new Map();
  const indexSeen = new Set();   // dedupe (target | referring | attr | source)
  const pushRow = (referringItem, referringAttr, candidate, sourceFile) => {
    let ref = candidate.replace(/[\s.,;:)\]]+$/, "");
    if (!ref.includes("/") || !ref.includes(":")) return;
    const adx = ref.split(":", 1)[0];
    if (!/[A-Za-z]/.test(adx)) return;        // pure-digit prefix = IP/timestamp fragment
    if (adx === "data") return;                // inline data URL (data:image/png/...) from graphics assets
    // Engine-as-ADX false positive only matters if the captured ADX is
    // *exclusively* an engine name — when it's also a real ADX (common pattern
    // where the site's main ADX appears as both ADX and self-engine in its
    // refs), we must NOT reject, or every legitimate same-ADX ref disappears.
    if (definedEngines.has(adx) && !definedADXes.has(adx)) return;

    // Index every ref (bound or unbound) — reverse lookup needs both.
    const indexKey = ref + "|" + referringItem + "|" + referringAttr + "|" + sourceFile;
    if (!indexSeen.has(indexKey)) {
      indexSeen.add(indexKey);
      if (!refIndex.has(ref)) refIndex.set(ref, []);
      refIndex.get(ref).push({ referringItem, referringAttr, source: sourceFile });
    }

    // Below this line we only care about UNBOUND refs (the original scan output).
    if (validRefs.has(ref)) return;
    const key = referringItem + "|" + referringAttr + "|" + ref;
    if (seen.has(key)) return;
    seen.add(key);
    rows.push({
      "Archive": arc.name,
      "Reference Type": "Reference",
      "Referring Item": referringItem,
      "Referring Attribute": referringAttr,
      "Referenced Item": ref,
      "Referenced Attribute": "",
      "_source": sourceFile,
    });
  };

  // 2) Per-object/per-property scan against the already-parsed devices.
  if (onProgress) onProgress("Scanning archive objects…");
  let scannedObjects = 0;
  for (const dev of arc.devices) {
    const sourceFile = (dev.folder ? dev.folder + "/" : "") + "archive.xml";
    for (const obj of dev.objects) {
      for (const [propId, rawXml] of Object.entries(obj.properties || {})) {
        if (!rawXml || rawXml.indexOf(":") < 0) continue;
        REF_MATCH_RE.lastIndex = 0;
        let m;
        while ((m = REF_MATCH_RE.exec(rawXml)) !== null) {
          pushRow(obj.ref, propLabel(propId), m[0], sourceFile);
        }
      }
      scannedObjects++;
    }
  }

  // 3) Walk every other XML file that lives inside a known device folder.
  // Files at the archive root (archiveobject.xml, navtree.xml, Cdm*.xml) are
  // metadata/ontology — not where unbound point/graphic refs live, and they
  // produced confusing "Live ADX" entries when their filenames leaked through
  // as Referring Items. Skipping them is the right call.
  const buf = await arc._zip.generateAsync({ type: "uint8array" });
  const zip = await JSZip.loadAsync(buf);
  const xmlPaths = [];
  zip.forEach((path, entry) => {
    if (entry.dir) return;
    if (!/\.xml$/i.test(path)) return;
    if (/(^|[\\/])archive\.xml$/i.test(path)) return;        // covered by per-object pass
    // security.xml and userdictionary.xml contain credential hashes and
    // local text labels, not refs to fix. Their base62-shaped hash tokens
    // match the ref regex by accident (e.g. "18A:BHlOM5rrB9azAov/5xAkFw").
    if (/(^|[\\/])security\.xml$/i.test(path)) return;
    if (/(^|[\\/])userdictionary\.xml$/i.test(path)) return;
    const norm = path.replace(/\\/g, "/");
    const folder = norm.replace(/\/[^/]+$/, "");
    if (!folderToDeviceCtx.has(folder)) return;              // archive-root metadata — skip
    xmlPaths.push(path);
  });

  for (let i = 0; i < xmlPaths.length; i++) {
    const path = xmlPaths[i];
    if (onProgress && (i % 10 === 0)) {
      onProgress(`Scanning ${i + 1}/${xmlPaths.length} device files… (${rows.length.toLocaleString()} unbound so far)`);
      await new Promise(r => setTimeout(r, 0));
    }
    const entry = zip.file(path);
    if (!entry) continue;
    let text;
    try { text = await entry.async("string"); } catch (e) { continue; }

    // Synthesize Referring Item as "<ADX>:<engine>/<file-stem>" so the
    // patterns analyzer's ADX-split logic gets the real ADX out, not a
    // filename like "MasterLayer" or "Programming.XXX".
    const norm = path.replace(/\\/g, "/");
    const folder = norm.replace(/\/[^/]+$/, "");
    const stem = norm.replace(/^.*\//, "").replace(/\.xml$/i, "");
    const ctx = folderToDeviceCtx.get(folder);
    const fileLabel = ctx + "/" + stem;

    // 3a) Outer XML scan — but FIRST strip every Base64Zip block. Their
    // gzip+base64 payload bytes can happen to match the ref regex and
    // produce nonsense rows like "bXBzYWx0:..." that polluted the patterns
    // view. We rescan their decoded contents in step 3b.
    const outerText = text.replace(/<Base64Zip[^>]*>[\s\S]*?<\/Base64Zip>/g, "");
    if (outerText.indexOf(":") >= 0) {
      REF_MATCH_RE.lastIndex = 0;
      let m;
      while ((m = REF_MATCH_RE.exec(outerText)) !== null) {
        pushRow(fileLabel, "(file content)", m[0], path);
      }
    }

    // 3b) Decoded Base64Zip payloads (Programming logic, Graphics bindings)
    if (text.indexOf("<Base64Zip") >= 0) {
      const blockRe = /<Base64Zip[^>]*>([\s\S]*?)<\/Base64Zip>/g;
      let bm;
      while ((bm = blockRe.exec(text)) !== null) {
        const b64 = bm[1].trim();
        if (!b64) continue;
        let inner;
        try { inner = await gunzipText(b64); } catch (e) { continue; }
        if (inner.indexOf(":") < 0) continue;
        REF_MATCH_RE.lastIndex = 0;
        let im;
        while ((im = REF_MATCH_RE.exec(inner)) !== null) {
          pushRow(fileLabel, "(logic / graphic binding)", im[0], path);
        }
      }
    }
  }

  if (onProgress) onProgress(`Scan complete: ${rows.length.toLocaleString()} unbound references found across ${scannedObjects.toLocaleString()} objects and ${xmlPaths.length.toLocaleString()} device files.`);

  arc._derivedUnboundRows = rows;
  arc._validRefs = validRefs;          // used by the rename-confidence check in the patterns view
  arc._refIndex = refIndex;            // reverse-lookup: ref -> [{ referringItem, referringAttr, source }]
  arc.unbound = rows;
  delete arc._unboundAnalysis;
  return rows;
}

// For a rename suggestion (fromPrefix -> toPrefix), rewrite every unique
// dead target and check what fraction land on a defined object in this
// archive. High % = the rename hypothesis is right. Low % = same-ADX
// deletions, not a rename — Apply-to-archive would just shuffle the broken refs.
function computeRenameConfidence(arc, fromPrefix, toPrefix) {
  if (!arc._validRefs || !toPrefix) return null;
  const fromColon = fromPrefix + ":";
  const toColon = toPrefix + ":";
  const targets = new Set();
  for (const r of arc.unbound) {
    if (r["Referenced Item"].startsWith(fromColon)) targets.add(r["Referenced Item"]);
  }
  const unique = [...targets];
  // Set lookups are O(1) — even tens of thousands runs in single-digit ms.
  let landed = 0;
  for (let i = 0; i < unique.length; i++) {
    const rewritten = toColon + unique[i].slice(fromColon.length);
    if (arc._validRefs.has(rewritten)) landed++;
  }
  const N = unique.length;
  return { landed, sampleSize: N, totalUnique: N, pct: N ? landed / N : 0 };
}

function exportRepointPlan(rows, fromPrefix, toPrefix) {
  // Generate find/replace plan: each row gets a "fixed" referenced item
  const header = ["Referring Item", "Referring Attribute", "Old Referenced Item", "New Referenced Item", "Action"];
  const lines = [csvRow(header)];
  for (const r of rows) {
    const oldRef = r["Referenced Item"];
    const newRef = oldRef.replace(new RegExp("^" + fromPrefix.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + ":"), toPrefix + ":");
    lines.push(csvRow([
      r["Referring Item"],
      r["Referring Attribute"],
      oldRef,
      newRef,
      "Repoint",
    ]));
  }
  const csv = lines.join("\n") + "\n";
  downloadBlob(`repoint_${cleanFilename(fromPrefix)}_to_${cleanFilename(toPrefix)}_${rows.length}.csv`, "text/csv;charset=utf-8", csv);
}

// ============ Graphics binding extractor + Graphics-mode views ============
//
// Every dbexport contains graphic files (Graphics.<Building>.<Name>.xml for the
// older TSEGraph format, .xaml for the newer WPF format). Both are gzipped+
// base64 wrapped in a <Base64Zip> envelope. Inside, point bindings appear as
// embedded item-reference strings — "<ADX>:<Engine>/<bus>.<equipment>.<point>".
//
// This extractor decodes each graphic and pulls every distinct Metasys item
// ref out via regex. The result is a bidirectional index: graphic→points and
// point→graphics. Useful for "what graphics break if I delete this point?" and
// "what points does this graphic reference?".

async function extractGraphicBindings(arc) {
  if (arc._graphicBindings) return arc._graphicBindings;
  if (!arc._zip) {
    arc._graphicBindings = { bindings: [], graphics: [], byGraphic: new Map(), byPoint: new Map() };
    return arc._graphicBindings;
  }

  // Find every Graphics.*.xml or .xaml that's not a UserTrees navView
  const paths = [];
  arc._zip.forEach((path, entry) => {
    if (entry.dir) return;
    const lower = path.toLowerCase();
    if (lower.includes("usertrees")) return;
    if (!lower.includes("graphics.") && !lower.includes("graphics\\.")) return;
    if (!lower.endsWith(".xml") && !lower.endsWith(".xaml")) return;
    paths.push(path);
  });

  // Item-ref pattern. Matches "<ADX>:<Engine>/<path>" where path is dot/word chars.
  // Single greedy match (no nested quantifiers) — avoids catastrophic backtracking
  // that happens with patterns like [\w\.\- ]+(?:\.[\w\-]+)+ on large strings.
  const REF_RE = /[A-Z][A-Za-z0-9\-]{1,40}:[A-Za-z0-9\-]{1,40}\/[A-Za-z0-9_\-. ]{1,200}/g;

  const bindings = [];
  const graphics = [];
  const byGraphic = new Map();
  const byPoint = new Map();

  let processed = 0;
  for (const path of paths) {
    const entry = arc._zip.file(path);
    if (!entry) continue;
    let text;
    try { text = await entry.async("string"); }
    catch (e) { continue; }

    // Decode <Base64Zip> wrapper if present
    const m = text.match(/<Base64Zip[^>]*>([\s\S]*?)<\/Base64Zip>/);
    if (m) {
      try { text = await gunzipText(m[1].trim()); }
      catch (e) { /* leave as-is */ }
    }

    const filename = path.replace(/^.*[\\\/]/, "");
    const isXaml = filename.toLowerCase().endsWith(".xaml");
    const graphicName = filename.replace(/\.(xml|xaml)$/i, "").replace(/^Graphics\./i, "");

    const found = new Set();
    let mm;
    REF_RE.lastIndex = 0;
    while ((mm = REF_RE.exec(text)) !== null) {
      // Require at least one "." in the path part (filters out short non-point refs)
      const m2 = mm[0];
      const slashIdx = m2.indexOf("/");
      if (slashIdx < 0) continue;
      const pathPart = m2.slice(slashIdx + 1);
      // Trim trailing punctuation that the regex may have swept up
      const trimmed = m2.replace(/[\s.,;"'<>)\]}]+$/, "");
      // Must have at least one dot in path AND not contain whitespace at boundaries
      if (!pathPart.includes(".")) continue;
      if (trimmed.length < 8) continue;
      found.add(trimmed);
    }

    // Exclude refs to OTHER graphics (the navigation buttons between graphics).
    // A graphic ref's path includes "/Graphics." — point refs don't.
    const pointRefs = [...found].filter(r => !/\/Graphics\./i.test(r));

    graphics.push({
      name: graphicName,
      format: isXaml ? "xaml" : "xml",
      path,
      bindingCount: pointRefs.length,
    });
    byGraphic.set(graphicName, pointRefs);

    for (const ref of pointRefs) {
      bindings.push({ graphic: graphicName, pointRef: ref, format: isXaml ? "xaml" : "xml" });
      if (!byPoint.has(ref)) byPoint.set(ref, []);
      byPoint.get(ref).push(graphicName);
    }

    // Yield to the event loop every 5 files so the UI doesn't freeze
    if (++processed % 5 === 0) await new Promise(r => setTimeout(r, 0));
  }

  // Sort
  graphics.sort((a, b) => b.bindingCount - a.bindingCount || a.name.localeCompare(b.name));

  arc._graphicBindings = { bindings, graphics, byGraphic, byPoint };
  return arc._graphicBindings;
}

function getGraphicsArchive() {
  for (const slot of [state.selectedSlot, 0, 1]) {
    const a = state.archives[slot];
    if (a && a._zip && a.kind !== "unbound") return a;
  }
  return null;
}

function renderGraphicsTree(root) {
  const arc = getGraphicsArchive();
  if (!arc) return;
  // Async hint: if not yet extracted, show "Indexing…" placeholder
  if (!arc._graphicBindings) {
    const el = document.createElement("div");
    el.className = "tree-node";
    el.style.padding = "12px 16px";
    el.style.color = "var(--ink-dim)";
    el.textContent = "Indexing graphics…";
    root.appendChild(el);
    extractGraphicBindings(arc).then(() => { renderTree(); renderDetail(); });
    return;
  }
  const an = arc._graphicBindings;

  addSectionTitle(root, arc.name);

  const pivots = [
    { key: "byGraphic", label: "By graphic",          count: an.graphics.length, icon: "◐" },
    { key: "byPoint",   label: "By bound point",      count: an.byPoint.size,    icon: "·" },
    { key: "orphans",   label: "Unbound graphics",    count: an.graphics.filter(g => g.bindingCount === 0).length, icon: "○" },
  ];
  for (const p of pivots) {
    const el = document.createElement("div");
    el.className = "tree-node" + (state.graphicsPivot === p.key ? " selected" : "");
    el.style.paddingLeft = "12px";
    el.innerHTML = `<span class="chevron"></span><span class="kind-icon">${p.icon}</span><span class="name"></span><span class="count">${p.count.toLocaleString()}</span>`;
    el.querySelector(".name").textContent = p.label;
    el.addEventListener("click", () => {
      state.graphicsPivot = p.key;
      state.graphicsSelection = null;
      renderTree();
      renderDetail();
    });
    root.appendChild(el);
  }

  const q = (state.treeFilter || "").toLowerCase();
  if (state.graphicsPivot === "byGraphic" || state.graphicsPivot === "orphans") {
    addSectionTitle(root, `Graphics (${an.graphics.length})`);
    const list = state.graphicsPivot === "orphans"
      ? an.graphics.filter(g => g.bindingCount === 0)
      : an.graphics;
    for (const g of list) {
      if (q && !g.name.toLowerCase().includes(q)) continue;
      const el = document.createElement("div");
      el.className = "tree-node" + (state.graphicsSelection === g.name ? " selected" : "");
      el.style.paddingLeft = "28px";
      el.innerHTML = `<span class="chevron"></span><span class="kind-icon">◐</span><span class="name"></span><span class="count">${g.bindingCount.toLocaleString()}</span>`;
      el.querySelector(".name").textContent = g.name;
      el.title = g.path;
      el.addEventListener("click", () => {
        state.graphicsSelection = g.name;
        renderDetail();
      });
      root.appendChild(el);
    }
  } else if (state.graphicsPivot === "byPoint") {
    // Sort points by graphic-reference count desc
    const entries = [...an.byPoint.entries()].sort((a, b) => b[1].length - a[1].length || a[0].localeCompare(b[0]));
    addSectionTitle(root, `Bound points (${entries.length})`);
    for (const [ref, refGraphics] of entries) {
      if (q && !ref.toLowerCase().includes(q)) continue;
      const el = document.createElement("div");
      el.className = "tree-node" + (state.graphicsSelection === ref ? " selected" : "");
      el.style.paddingLeft = "28px";
      const leaf = ref.split(/[\.:\/]/).pop();
      el.innerHTML = `<span class="chevron"></span><span class="kind-icon">·</span><span class="name"></span><span class="count">${refGraphics.length}</span>`;
      el.querySelector(".name").textContent = leaf;
      el.title = ref;
      el.addEventListener("click", () => {
        state.graphicsSelection = ref;
        renderDetail();
      });
      root.appendChild(el);
    }
  }
}

function renderGraphicsDetail(body, crumb, classSel, objSearch) {
  classSel.style.display = "none";
  objSearch.style.display = "";
  objSearch.placeholder = "Filter…";
  objSearch.value = state.objSearch || "";
  const exportWrap = document.querySelector(".export-wrap");
  if (exportWrap) exportWrap.style.display = "none";

  const arc = getGraphicsArchive();
  if (!arc) {
    crumb.textContent = "Load a .dbexport to begin.";
    body.innerHTML = `<div class="empty"><div class="big">No archive loaded</div></div>`;
    return;
  }
  if (!arc._graphicBindings) {
    crumb.innerHTML = `<strong>${escapeHtml(arc.name)}</strong> · indexing graphics…`;
    body.innerHTML = `<div class="loading">Indexing graphic bindings</div>`;
    return;
  }
  const an = arc._graphicBindings;
  const pivot = state.graphicsPivot || "byGraphic";

  // Header
  crumb.innerHTML = `<strong>${escapeHtml(arc.name)}</strong> · ${an.graphics.length} graphics · ${an.byPoint.size.toLocaleString()} distinct bound points · ${an.bindings.length.toLocaleString()} total bindings`;

  // Summary
  if (!state.graphicsSelection) {
    return renderGraphicsSummary(body, an, pivot);
  }

  if (pivot === "byGraphic" || pivot === "orphans") {
    return renderGraphicDetail(body, an, state.graphicsSelection);
  }
  if (pivot === "byPoint") {
    return renderPointDetail(body, an, state.graphicsSelection);
  }
}

function renderGraphicsSummary(body, an, pivot) {
  const wrap = document.createElement("div");
  wrap.className = "obj-detail";

  if (pivot === "orphans") {
    const orphans = an.graphics.filter(g => g.bindingCount === 0);
    wrap.innerHTML = `<h2 style="font-family: var(--sans); word-break: normal;">○ Unbound graphics</h2>
      <p style="color: var(--ink-soft); max-width: 760px;">Graphics with no point bindings detected. These are usually navigation pages (button-only menus that link to other graphics) or graphics imported from a different site whose refs no longer resolve.</p>`;
    if (!orphans.length) {
      wrap.innerHTML += `<p>None — every graphic has at least one point binding.</p>`;
    } else {
      const tbl = document.createElement("table");
      tbl.className = "objs";
      tbl.innerHTML = `<thead><tr><th>Graphic</th><th>Format</th></tr></thead>`;
      const tbody = document.createElement("tbody");
      for (const g of orphans) {
        const tr = document.createElement("tr");
        tr.innerHTML = `<td class="ref"><span class="leaf">${escapeHtml(g.name)}</span></td>
                       <td class="cid">${escapeHtml(g.format)}</td>`;
        tr.addEventListener("click", () => { state.graphicsSelection = g.name; renderDetail(); });
        tbody.appendChild(tr);
      }
      tbl.appendChild(tbody);
      wrap.appendChild(tbl);
    }
    body.appendChild(wrap);
    return;
  }

  wrap.innerHTML = `<h2 style="font-family: var(--sans); word-break: normal;">Graphic bindings overview</h2>
    <p style="color: var(--ink-soft); max-width: 760px;">Click a graphic on the left to see every point it references, or switch to "By bound point" to find every graphic that references a specific point. Useful for answering "what graphics break if I delete this point?".</p>`;

  // Top 15 most-binding graphics
  const top = an.graphics.slice(0, 15);
  const tbl = document.createElement("table");
  tbl.className = "objs";
  tbl.innerHTML = `<thead><tr><th>Graphic</th><th>Format</th><th style="text-align:right;">Bindings</th></tr></thead>`;
  const tbody = document.createElement("tbody");
  for (const g of top) {
    const tr = document.createElement("tr");
    tr.innerHTML = `<td class="ref"><span class="leaf">◐ ${escapeHtml(g.name)}</span></td>
                   <td class="cid">${escapeHtml(g.format)}</td>
                   <td class="cid" style="text-align:right; font-variant-numeric: tabular-nums;">${g.bindingCount.toLocaleString()}</td>`;
    tr.addEventListener("click", () => { state.graphicsSelection = g.name; renderDetail(); });
    tbody.appendChild(tr);
  }
  tbl.appendChild(tbody);

  const cap = document.createElement("h3");
  cap.style.cssText = "margin: 20px 0 8px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--ink-soft);";
  cap.textContent = `Top ${top.length} graphics by binding count (of ${an.graphics.length})`;
  wrap.appendChild(cap);
  wrap.appendChild(tbl);

  body.appendChild(wrap);
}

function renderGraphicDetail(body, an, graphicName) {
  const refs = an.byGraphic.get(graphicName) || [];
  let filtered = refs;
  if (state.objSearch) {
    const q = state.objSearch.toLowerCase();
    filtered = refs.filter(r => r.toLowerCase().includes(q));
  }

  const wrap = document.createElement("div");
  wrap.className = "obj-detail";
  wrap.innerHTML = `<h2 style="font-family: var(--sans); word-break: normal;">◐ ${escapeHtml(graphicName)}</h2>
    <div class="meta">
      <span>Bindings: <strong>${refs.length.toLocaleString()}</strong></span>
      ${refs.length !== filtered.length ? `<span>Showing: <strong>${filtered.length.toLocaleString()}</strong></span>` : ""}
    </div>`;

  // Group by engine for readability
  const byEngine = new Map();
  for (const r of filtered) {
    const eng = (r.split(":")[1] || "").split("/")[0];
    if (!byEngine.has(eng)) byEngine.set(eng, []);
    byEngine.get(eng).push(r);
  }
  for (const [eng, list] of byEngine) {
    const h = document.createElement("h3");
    h.style.cssText = "margin: 16px 0 6px; font-size: 13px; color: var(--ink);";
    h.textContent = `${eng} (${list.length})`;
    wrap.appendChild(h);
    const tbl = document.createElement("table");
    tbl.className = "objs";
    tbl.innerHTML = `<thead><tr><th>Item reference</th><th>Leaf (point name)</th></tr></thead>`;
    const tbody = document.createElement("tbody");
    list.sort();
    for (const r of list) {
      const leaf = r.split(/[\.:\/]/).pop();
      const tr = document.createElement("tr");
      tr.innerHTML = `<td class="ref"><span class="path">${escapeHtml(r.slice(0, r.length - leaf.length))}</span><span class="leaf">${escapeHtml(leaf)}</span></td>
                     <td class="cid"><strong>${escapeHtml(leaf)}</strong></td>`;
      tbody.appendChild(tr);
    }
    tbl.appendChild(tbody);
    wrap.appendChild(tbl);
  }

  // Export button
  const exportBar = document.createElement("div");
  exportBar.style.cssText = "margin-top: 16px; display: flex; gap: 6px;";
  exportBar.innerHTML = `<button class="export-btn" id="exportBindings">Download bindings (CSV)</button>`;
  wrap.appendChild(exportBar);
  setTimeout(() => {
    document.getElementById("exportBindings")?.addEventListener("click", () => {
      const csv = ["graphic,point_ref,leaf"];
      for (const r of refs) {
        const leaf = r.split(/[\.:\/]/).pop();
        csv.push(`${csvCell(graphicName)},${csvCell(r)},${csvCell(leaf)}`);
      }
      downloadBlob(`graphic_${cleanFilename(graphicName)}_bindings.csv`, "text/csv;charset=utf-8", csv.join("\n") + "\n");
    });
  }, 0);

  body.appendChild(wrap);
}

function renderPointDetail(body, an, pointRef) {
  const refGraphics = an.byPoint.get(pointRef) || [];
  let filtered = refGraphics;
  if (state.objSearch) {
    const q = state.objSearch.toLowerCase();
    filtered = refGraphics.filter(g => g.toLowerCase().includes(q));
  }

  const wrap = document.createElement("div");
  wrap.className = "obj-detail";
  const leaf = pointRef.split(/[\.:\/]/).pop();
  wrap.innerHTML = `<h2 style="font-family: var(--sans); word-break: normal;">· ${escapeHtml(leaf)}</h2>
    <div class="meta">
      <span>Item Reference: <strong>${escapeHtml(pointRef)}</strong></span>
    </div>
    <div class="meta">
      <span>Referenced by: <strong>${refGraphics.length.toLocaleString()}</strong> graphic${refGraphics.length === 1 ? "" : "s"}</span>
    </div>
    <p style="color: var(--ink-soft); max-width: 780px; margin: 12px 0;">If you delete or rename this point, every graphic listed below will need its binding updated or it will display as broken.</p>`;

  if (!filtered.length) {
    wrap.innerHTML += `<p>No graphics match the current filter.</p>`;
    body.appendChild(wrap);
    return;
  }

  const tbl = document.createElement("table");
  tbl.className = "objs";
  tbl.innerHTML = `<thead><tr><th>Graphic</th></tr></thead>`;
  const tbody = document.createElement("tbody");
  for (const g of filtered.slice().sort()) {
    const tr = document.createElement("tr");
    tr.innerHTML = `<td class="ref"><span class="leaf">◐ ${escapeHtml(g)}</span></td>`;
    tr.addEventListener("click", () => {
      state.graphicsPivot = "byGraphic";
      state.graphicsSelection = g;
      renderTree();
      renderDetail();
    });
    tbody.appendChild(tr);
  }
  tbl.appendChild(tbody);
  wrap.appendChild(tbl);
  body.appendChild(wrap);
}

function csvCell(v) {
  const s = String(v == null ? "" : v);
  return /[",\n\r]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
}

// ============ Logic / Programming visualizer ============
//
// Programming/*.xml and System Programs/*.xml files inside an engine folder
// contain TSEGraph (Tom Sawyer Graph Editor Toolkit) XML wrapped in a
// Base64Zip envelope. The format encodes:
//
//   <topology>
//     <node>NODEID<type>T</type><text>LABEL</text>
//       <geometry><x>...</x><y>...</y><width>...</width><height>...</height></geometry>
//       <shape>...</shape>
//       <connector>PORTID...<attrNum>ATTR</attrNum></connector>  (each port on the node)
//       ...
//     </node>
//     <edge>EDGEID
//       <source>NODEID</source><target>NODEID</target>
//       <geometry>
//         <sourceConnector>PORTID</sourceConnector>
//         <targetConnector>PORTID</targetConnector>
//         <point><x>X</x><y>Y</y></point>...   (routing waypoints)
//       </geometry>
//     </edge>
//   </topology>
//
// This is enough to render a real logic diagram: nodes as boxes at their
// (x,y,w,h) coordinates, edges as polylines through the waypoints.

function parseTSEGraph(xml) {
  const nodes = [];
  // Each <node>ID<type>T</type>[<text>L</text>]<geometry>... — capture geometry and body.
  // The body may contain nested <connector> elements (ports).
  const nodeRe = /<node>(\d+)<type>([^<]*)<\/type>(?:<text>([^<]*)<\/text>)?<geometry><visible>true<\/visible><x>([\-\d.eE+]+)<\/x><y>([\-\d.eE+]+)<\/y><width>([\-\d.eE+]+)<\/width><height>([\-\d.eE+]+)<\/height>([\s\S]*?)<\/node>/g;
  let m;
  while ((m = nodeRe.exec(xml)) !== null) {
    const id = m[1];
    const type = m[2];
    const text = m[3] || "";
    const x = parseFloat(m[4]);
    const y = parseFloat(m[5]);
    const w = parseFloat(m[6]);
    const h = parseFloat(m[7]);
    const body = m[8];

    // Extract ports — only the ones at the TOP level of the node body (not
    // those nested inside edges or inner nodes, which shouldn't happen here).
    const ports = [];
    const portRe = /<connector>(\d+)<geometry>([\s\S]*?)<\/geometry>(?:<attrNum>(-?\d+)<\/attrNum>)?(?:<attrNumReal>(-?\d+)<\/attrNumReal>)?/g;
    let pm;
    while ((pm = portRe.exec(body)) !== null) {
      const portGeom = pm[2];
      // Magnified-X/Y are relative offsets from node center (range -0.5 to 0.5
      // typically), useful for placing the port on the node edge.
      const mxMatch = portGeom.match(/<magnifiedX>([\-\d.eE+]+)<\/magnifiedX>/);
      const myMatch = portGeom.match(/<magnifiedY>([\-\d.eE+]+)<\/magnifiedY>/);
      ports.push({
        id: pm[1],
        attrNum: pm[3] ? parseInt(pm[3], 10) : null,
        magnifiedX: mxMatch ? parseFloat(mxMatch[1]) : 0,
        magnifiedY: myMatch ? parseFloat(myMatch[1]) : 0,
      });
    }

    // Extract attribute reference (which point/attribute this node represents)
    // Reference comes from sibling <reference>...</reference> at node level OR via the first port's attrNum
    const refMatch = body.match(/<reference>([^<]+)<\/reference>/);
    const reference = refMatch ? refMatch[1] : "";

    nodes.push({ id, type, text, x, y, w, h, ports, reference });
  }

  // Edges — top-level <edge> elements
  const edges = [];
  const edgeRe = /<edge>(\d+)<source>(\d+)<\/source><target>(\d+)<\/target>([\s\S]*?)<\/edge>/g;
  while ((m = edgeRe.exec(xml)) !== null) {
    const id = m[1];
    const source = m[2];
    const target = m[3];
    const body = m[4];

    const srcPortM = body.match(/<sourceConnector>(\d+)<\/sourceConnector>/);
    const tgtPortM = body.match(/<targetConnector>(\d+)<\/targetConnector>/);
    // Waypoints — collect all <point><x>X</x><y>Y</y></point> in the edge geometry
    const waypoints = [];
    const wpRe = /<point><x>([\-\d.eE+]+)<\/x><y>([\-\d.eE+]+)<\/y><\/point>/g;
    let wm;
    while ((wm = wpRe.exec(body)) !== null) {
      waypoints.push({ x: parseFloat(wm[1]), y: parseFloat(wm[2]) });
    }
    const refMatch = body.match(/<reference>([^<]+)<\/reference>/);

    edges.push({
      id, source, target,
      sourcePort: srcPortM ? srcPortM[1] : null,
      targetPort: tgtPortM ? tgtPortM[1] : null,
      waypoints,
      reference: refMatch ? refMatch[1] : "",
    });
  }

  // Compute viewBox from node bounds
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const n of nodes) {
    minX = Math.min(minX, n.x);
    minY = Math.min(minY, n.y);
    maxX = Math.max(maxX, n.x + n.w);
    maxY = Math.max(maxY, n.y + n.h);
  }
  for (const e of edges) {
    for (const p of e.waypoints) {
      minX = Math.min(minX, p.x);
      minY = Math.min(minY, p.y);
      maxX = Math.max(maxX, p.x);
      maxY = Math.max(maxY, p.y);
    }
  }
  const pad = 40;
  const viewBox = nodes.length
    ? { x: minX - pad, y: minY - pad, w: (maxX - minX) + 2 * pad, h: (maxY - minY) + 2 * pad }
    : null;

  return { nodes, edges, viewBox };
}

function renderLogicSvg(parsed) {
  const SVG_NS = "http://www.w3.org/2000/svg";
  const wrap = document.createElement("div");
  wrap.style.cssText = "width: 100%; height: 600px; overflow: auto; background: #FAFAF6; border: 1px solid var(--line); border-radius: var(--radius);";

  if (!parsed.viewBox) {
    wrap.innerHTML = `<div class="empty"><div class="small">No renderable nodes in this logic.</div></div>`;
    return wrap;
  }

  const svg = document.createElementNS(SVG_NS, "svg");
  svg.setAttribute("viewBox", `${parsed.viewBox.x} ${parsed.viewBox.y} ${parsed.viewBox.w} ${parsed.viewBox.h}`);
  // Scale to fit width, preserve aspect ratio
  svg.setAttribute("preserveAspectRatio", "xMidYMid meet");
  svg.style.cssText = "width: 100%; height: 100%; display: block; cursor: default;";

  // Edges first (so they go under nodes)
  for (const e of parsed.edges) {
    if (e.waypoints.length < 2) continue;
    const poly = document.createElementNS(SVG_NS, "polyline");
    poly.setAttribute("points", e.waypoints.map(p => `${p.x},${p.y}`).join(" "));
    poly.setAttribute("stroke", "#5A584F");
    poly.setAttribute("stroke-width", "1.5");
    poly.setAttribute("fill", "none");
    poly.setAttribute("stroke-linejoin", "round");
    poly.setAttribute("data-edge-id", e.id);
    // Arrow at the target end
    const last = e.waypoints[e.waypoints.length - 1];
    const prev = e.waypoints[e.waypoints.length - 2];
    poly.style.markerEnd = "url(#logicArrow)";
    svg.appendChild(poly);
  }

  // Arrow marker
  const defs = document.createElementNS(SVG_NS, "defs");
  defs.innerHTML = `<marker id="logicArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#5A584F" />
  </marker>`;
  svg.appendChild(defs);

  // Nodes
  for (const n of parsed.nodes) {
    const g = document.createElementNS(SVG_NS, "g");
    g.setAttribute("data-node-id", n.id);

    const rect = document.createElementNS(SVG_NS, "rect");
    rect.setAttribute("x", n.x);
    rect.setAttribute("y", n.y);
    rect.setAttribute("width", n.w);
    rect.setAttribute("height", n.h);
    rect.setAttribute("fill", "#FFFFFF");
    rect.setAttribute("stroke", "#B57633");
    rect.setAttribute("stroke-width", "1.2");
    rect.setAttribute("rx", "3");
    g.appendChild(rect);

    // Ports as small circles on the node edges
    for (const p of n.ports) {
      // magnifiedX/Y are typically in [-0.5, 0.5] indicating the port's
      // position as a fraction from the node center. Map to actual coords.
      const cx = n.x + n.w / 2 + p.magnifiedX * n.w;
      const cy = n.y + n.h / 2 + p.magnifiedY * n.h;
      const circle = document.createElementNS(SVG_NS, "circle");
      circle.setAttribute("cx", cx);
      circle.setAttribute("cy", cy);
      circle.setAttribute("r", "2");
      circle.setAttribute("fill", "#B57633");
      g.appendChild(circle);
    }

    // Label — fit text inside the node
    if (n.text) {
      const text = document.createElementNS(SVG_NS, "text");
      text.setAttribute("x", n.x + n.w / 2);
      text.setAttribute("y", n.y + n.h / 2);
      text.setAttribute("text-anchor", "middle");
      text.setAttribute("dominant-baseline", "middle");
      text.setAttribute("font-size", Math.min(10, n.h / 2.5));
      text.setAttribute("font-family", "ui-sans-serif, system-ui, sans-serif");
      text.setAttribute("fill", "#1E1E1C");
      text.style.pointerEvents = "none";
      text.textContent = n.text.length > 24 ? n.text.slice(0, 22) + "…" : n.text;
      g.appendChild(text);

      // Tooltip
      const title = document.createElementNS(SVG_NS, "title");
      title.textContent = `${n.text}\nNode ${n.id} (type ${n.type})\n${n.ports.length} port${n.ports.length === 1 ? "" : "s"}`;
      g.appendChild(title);
    }

    svg.appendChild(g);
  }

  wrap.appendChild(svg);
  return wrap;
}

async function getLogicArchive() {
  for (const slot of [state.selectedSlot, 0, 1]) {
    const a = state.archives[slot];
    if (a && a._zip && a.kind !== "unbound") return a;
  }
  return null;
}

async function indexLogicFiles(arc) {
  if (arc._logicFiles) return arc._logicFiles;
  if (!arc._zip) {
    arc._logicFiles = [];
    return [];
  }
  const files = [];
  arc._zip.forEach((path, entry) => {
    if (entry.dir) return;
    if (!path.endsWith(".xml")) return;
    const fname = path.replace(/^.*[\\\/]/, "");
    if (fname.startsWith("Programming.") || fname.startsWith("System Programs.")) {
      // Engine folder is everything before the last separator
      const engine = path.replace(/[\\\/][^\\\/]*$/, "");
      files.push({ path, fname, engine, name: fname.replace(/\.xml$/i, "") });
    }
  });
  files.sort((a, b) => a.engine.localeCompare(b.engine) || a.name.localeCompare(b.name));
  arc._logicFiles = files;
  return files;
}

async function loadLogicFile(arc, path) {
  const cache = arc._logicCache || (arc._logicCache = new Map());
  if (cache.has(path)) return cache.get(path);
  const entry = arc._zip.file(path);
  if (!entry) return null;
  let text = await entry.async("string");
  const m = text.match(/<Base64Zip[^>]*>([\s\S]*?)<\/Base64Zip>/);
  if (m) {
    try { text = await gunzipText(m[1].trim()); }
    catch (e) { return null; }
  }
  const parsed = parseTSEGraph(text);
  cache.set(path, parsed);
  return parsed;
}

function renderLogicTree(root) {
  const arc = state.archives[state.selectedSlot] || state.archives[0] || state.archives[1];
  if (!arc || !arc._zip) return;

  if (!arc._logicFiles) {
    const el = document.createElement("div");
    el.className = "tree-node";
    el.style.padding = "12px 16px";
    el.style.color = "var(--ink-dim)";
    el.textContent = "Indexing logic files…";
    root.appendChild(el);
    indexLogicFiles(arc).then(() => { renderTree(); renderDetail(); });
    return;
  }

  const q = (state.treeFilter || "").toLowerCase();
  addSectionTitle(root, arc.name);

  // Group by engine
  const byEngine = new Map();
  for (const f of arc._logicFiles) {
    if (q && !f.name.toLowerCase().includes(q)) continue;
    const engineName = f.engine.replace(/^.*[\\\/]/, "").replace(/^[A-Z][\w\-]*ADX[-_]?\d+/, "");
    if (!byEngine.has(engineName)) byEngine.set(engineName, []);
    byEngine.get(engineName).push(f);
  }

  for (const [eng, files] of byEngine) {
    const engEl = document.createElement("div");
    engEl.className = "tree-node engine";
    engEl.style.paddingLeft = "8px";
    engEl.innerHTML = `<span class="chevron">▾</span><span class="kind-icon">◉</span><span class="name"></span><span class="count">${files.length}</span>`;
    engEl.querySelector(".name").textContent = eng || "(root)";
    root.appendChild(engEl);
    for (const f of files) {
      const el = document.createElement("div");
      el.className = "tree-node" + (state.logicSelection === f.path ? " selected" : "");
      el.style.paddingLeft = "28px";
      el.innerHTML = `<span class="chevron"></span><span class="kind-icon">λ</span><span class="name"></span>`;
      el.querySelector(".name").textContent = f.name;
      el.title = f.path;
      el.addEventListener("click", () => {
        state.logicSelection = f.path;
        renderTree();
        renderDetail();
      });
      root.appendChild(el);
    }
  }
}

async function renderLogicDetail(body, crumb, classSel, objSearch) {
  classSel.style.display = "none";
  objSearch.style.display = "none";
  const exportWrap = document.querySelector(".export-wrap");
  if (exportWrap) exportWrap.style.display = "none";

  const arc = state.archives[state.selectedSlot] || state.archives[0] || state.archives[1];
  if (!arc || !arc._zip) {
    crumb.textContent = "Load a .dbexport (or .caf) to begin.";
    body.innerHTML = `<div class="empty"><div class="big">No archive loaded</div></div>`;
    return;
  }

  if (!state.logicSelection) {
    crumb.innerHTML = `<strong>${escapeHtml(arc.name)}</strong>`;
    const intro = document.createElement("div");
    intro.className = "obj-detail";
    intro.innerHTML = `<h2 style="font-family: var(--sans); word-break: normal;">Logic / Programming viewer</h2>
      <p style="color: var(--ink-soft); max-width: 800px;">Select a Programming or System Programs file from the left to render its CCT logic as a live SVG diagram. Nodes are placed at their original CCT canvas coordinates; edges show the routing CCT used. Hover any node for its type and port count.</p>
      <p style="color: var(--ink-soft); max-width: 800px;">This is the foundation for a multi-session arc toward full CCT-style rendering. Future sessions add block-type-specific symbols, point-binding values inline, and proper port placement on node edges. For now it's a faithful layout, just stylized as boxes.</p>`;
    body.appendChild(intro);
    return;
  }

  crumb.innerHTML = `<strong>${escapeHtml(arc.name)}</strong> / <strong>${escapeHtml(state.logicSelection.replace(/^.*[\\\/]/, "").replace(/\.xml$/, ""))}</strong>`;

  body.innerHTML = `<div class="loading">Decoding logic file</div>`;
  let parsed;
  try {
    parsed = await loadLogicFile(arc, state.logicSelection);
  } catch (e) {
    console.error(e);
    body.innerHTML = `<div class="empty"><div class="big">Decode error</div><div class="small">${escapeHtml(e.message)}</div></div>`;
    return;
  }
  if (!parsed) {
    body.innerHTML = `<div class="empty"><div class="small">Could not parse this logic file.</div></div>`;
    return;
  }

  body.innerHTML = "";

  // Header metadata
  const header = document.createElement("div");
  header.className = "obj-detail";
  header.innerHTML = `<h2 style="font-family: var(--sans); word-break: normal;">λ ${escapeHtml(state.logicSelection.replace(/^.*[\\\/]/, "").replace(/\.xml$/, ""))}</h2>
    <div class="meta">
      <span>Nodes: <strong>${parsed.nodes.length}</strong></span>
      <span>Edges: <strong>${parsed.edges.length}</strong></span>
      <span>Distinct node types: <strong>${new Set(parsed.nodes.map(n => n.type)).size}</strong></span>
      <span>Canvas: <strong>${parsed.viewBox ? `${Math.round(parsed.viewBox.w)} × ${Math.round(parsed.viewBox.h)}` : "n/a"}</strong></span>
    </div>`;
  body.appendChild(header);

  // SVG diagram
  body.appendChild(renderLogicSvg(parsed));

  // Node inventory table below
  const tbl = document.createElement("div");
  tbl.className = "obj-detail";
  tbl.style.marginTop = "20px";
  tbl.innerHTML = `<h3 style="margin: 0 0 10px; font-size: 13px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--ink-soft);">Nodes (${parsed.nodes.length})</h3>`;
  const t = document.createElement("table");
  t.className = "objs";
  t.innerHTML = `<thead><tr><th>ID</th><th>Type</th><th>Label</th><th>Position</th><th>Size</th><th>Ports</th></tr></thead>`;
  const tbody = document.createElement("tbody");
  for (const n of parsed.nodes.slice(0, 200)) {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td class="cid">${escapeHtml(n.id)}</td>
      <td class="cid">${escapeHtml(n.type)}</td>
      <td class="ref"><span class="leaf">${escapeHtml(n.text || "—")}</span></td>
      <td class="cid">${Math.round(n.x)}, ${Math.round(n.y)}</td>
      <td class="cid">${Math.round(n.w)} × ${Math.round(n.h)}</td>
      <td class="cid" style="text-align:right;">${n.ports.length}</td>
    `;
    tbody.appendChild(tr);
  }
  t.appendChild(tbody);
  tbl.appendChild(t);
  body.appendChild(tbl);
}

// Structural comparison of two archives — independent of whether their refs
// overlap. Designed for cross-site comparison (different ADX names, no shared
// refs) but also useful when diffing two snapshots of the same site (gives a
// quick "are the totals stable?" sanity check).
function archiveStats(arc) {
  // Class buckets the user actually cares about
  // Added 628 (Net Sensor AI) and 670-674 (Remote I/O: RIO DEV, RAI, RAO, RBI,
  // RBO) from tcollins2 dictionary — these are point-class equivalents that
  // exist on FEC-with-remote-I/O sites and were previously uncounted.
  const POINT_CLASSES = new Set(["0","1","2","3","4","5","13","19","165","174","175","176","500","501","502","503","504","505","513","514","515","599","600","601","602","603","604","605","606","628","670","671","672","673","674"]);
  const stats = {
    deviceCount: arc.devices.length,
    objectCount: 0,
    pointCount: 0,
    scheduleCount: 0,
    alarmCount: 0,
    graphicCount: 0,
    programmingCount: 0,
    classDistribution: new Map(),  // classid -> count
    adxes: new Set(),
    engineNames: new Set(),
  };
  for (const dev of arc.devices) {
    for (const obj of dev.objects) {
      stats.objectCount++;
      if (POINT_CLASSES.has(obj.classid)) stats.pointCount++;
      if (obj.classid === "17" || obj.classid === "263") stats.scheduleCount++;
      if (/Alarm|alarm/.test(classLabel(obj.classid))) stats.alarmCount++;
      if (obj.classid === "344" || obj.classid === "357") stats.graphicCount++;
      if (obj.classid === "177" || obj.classid === "130") stats.programmingCount++;
      stats.classDistribution.set(obj.classid, (stats.classDistribution.get(obj.classid) || 0) + 1);
      if (obj.ref) {
        const colonIdx = obj.ref.indexOf(":");
        if (colonIdx >= 0) {
          stats.adxes.add(obj.ref.slice(0, colonIdx));
          const slashIdx = obj.ref.indexOf("/", colonIdx + 1);
          stats.engineNames.add(slashIdx >= 0 ? obj.ref.slice(colonIdx + 1, slashIdx) : obj.ref.slice(colonIdx + 1));
        }
      }
    }
  }
  return stats;
}

function renderArchiveComparisonStats(arcA, arcB) {
  const sA = archiveStats(arcA);
  const sB = archiveStats(arcB);
  const wrap = document.createElement("div");
  wrap.className = "obj-detail";
  wrap.style.background = "var(--bg-alt)";
  wrap.style.padding = "16px";
  wrap.style.borderRadius = "var(--radius)";
  wrap.style.marginBottom = "16px";

  const formatCell = (a, b) => {
    if (a === b) return `<td style="text-align:right;">${a.toLocaleString()}</td><td style="text-align:right;">${b.toLocaleString()}</td><td style="text-align:center; color: var(--ink-dim);">—</td>`;
    const delta = b - a;
    const sign = delta > 0 ? "+" : "";
    const color = delta > 0 ? "var(--good)" : "var(--bad)";
    return `<td style="text-align:right;">${a.toLocaleString()}</td><td style="text-align:right;">${b.toLocaleString()}</td><td style="text-align:center; color: ${color}; font-weight: 600;">${sign}${delta.toLocaleString()}</td>`;
  };

  const adxA = [...sA.adxes].join(", ") || "—";
  const adxB = [...sB.adxes].join(", ") || "—";

  wrap.innerHTML = `
    <h3 style="font-family: var(--sans); margin: 0 0 12px 0; font-size: 14px;">📊 Structural comparison</h3>
    <table style="width: auto; font-size: 12px;">
      <thead>
        <tr><th style="min-width: 200px;">Metric</th><th style="min-width: 100px; text-align:right;">${escapeHtml(arcA.name.slice(0, 30))}</th><th style="min-width: 100px; text-align:right;">${escapeHtml(arcB.name.slice(0, 30))}</th><th style="min-width: 60px; text-align:center;">Δ</th></tr>
      </thead>
      <tbody>
        <tr><th>ADX server(s)</th><td colspan="2" style="font-family: var(--mono); font-size: 11px;">${escapeHtml(adxA)} <span style="color: var(--ink-dim);">→</span> ${escapeHtml(adxB)}</td><td></td></tr>
        <tr><th>Controllers / engines</th>${formatCell(sA.deviceCount, sB.deviceCount)}</tr>
        <tr><th>Total objects</th>${formatCell(sA.objectCount, sB.objectCount)}</tr>
        <tr><th>Data points (AI/AO/AV/BI/BO/BV/MI/MV/FEC)</th>${formatCell(sA.pointCount, sB.pointCount)}</tr>
        <tr><th>Schedules</th>${formatCell(sA.scheduleCount, sB.scheduleCount)}</tr>
        <tr><th>Alarm-related objects</th>${formatCell(sA.alarmCount, sB.alarmCount)}</tr>
        <tr><th>Graphics</th>${formatCell(sA.graphicCount, sB.graphicCount)}</tr>
        <tr><th>Programming logic blocks</th>${formatCell(sA.programmingCount, sB.programmingCount)}</tr>
        <tr><th>Distinct ADX names</th>${formatCell(sA.adxes.size, sB.adxes.size)}</tr>
        <tr><th>Distinct engine names</th>${formatCell(sA.engineNames.size, sB.engineNames.size)}</tr>
        <tr><th>Avg objects per controller</th>${formatCell(Math.round(sA.objectCount / Math.max(1, sA.deviceCount)), Math.round(sB.objectCount / Math.max(1, sB.deviceCount)))}</tr>
      </tbody>
    </table>
  `;

  // Class distribution — top 10 classes by combined count, side-by-side
  const combinedClassCounts = new Map();
  for (const [cid, n] of sA.classDistribution) combinedClassCounts.set(cid, (combinedClassCounts.get(cid) || 0) + n);
  for (const [cid, n] of sB.classDistribution) combinedClassCounts.set(cid, (combinedClassCounts.get(cid) || 0) + n);
  const topClasses = [...combinedClassCounts.entries()].sort((a, b) => b[1] - a[1]).slice(0, 12);

  const classTable = document.createElement("div");
  classTable.style.marginTop = "16px";
  classTable.innerHTML = `
    <h4 style="font-family: var(--sans); margin: 0 0 8px 0; font-size: 12px; color: var(--ink-soft);">Top 12 object classes (combined)</h4>
    <table style="width: auto; font-size: 12px;">
      <thead>
        <tr><th style="min-width: 220px;">Class</th><th style="min-width: 80px; text-align:right;">A</th><th style="min-width: 80px; text-align:right;">B</th><th style="min-width: 60px; text-align:center;">Δ</th></tr>
      </thead>
      <tbody>
        ${topClasses.map(([cid]) => {
          const a = sA.classDistribution.get(cid) || 0;
          const b = sB.classDistribution.get(cid) || 0;
          return `<tr><td>${escapeHtml(classLabel(cid))} <span style="color: var(--ink-dim); font-size: 10px;">(cid ${cid})</span></td>${formatCell(a, b)}</tr>`;
        }).join("")}
      </tbody>
    </table>
  `;
  wrap.appendChild(classTable);

  return wrap;
}

function renderDiffDetail(body, crumb, classSel, objSearch) {
  classSel.style.display = "none";
  objSearch.style.display = "";

  const a = state.archives[0], b = state.archives[1];
  if (!a || !b) {
    crumb.textContent = "Load two archives to diff.";
    body.innerHTML = `<div class="empty"><div class="big">Diff mode needs two files</div><div class="small">Drop a second .dbexport into slot B.</div></div>`;
    return;
  }

  const diff = getDiff();

  // Object detail in diff mode
  if (state.selectedObject) {
    return renderDiffObjectDetail(body, crumb, diff);
  }

  crumb.innerHTML = `<strong>${escapeHtml(a.name)}</strong> → <strong>${escapeHtml(b.name)}</strong>`;

  // Build rows to show
  let rows = [];
